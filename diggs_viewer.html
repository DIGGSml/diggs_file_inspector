<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DIGGS File Content Viewer</title>
<style id="leaflet-css">
/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}
/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */
/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */
.leaflet-container .leaflet-overlay-pane svg {
	max-width: none !important;
	max-height: none !important;
	}
.leaflet-container .leaflet-marker-pane img,
.leaflet-container .leaflet-shadow-pane img,
.leaflet-container .leaflet-tile-pane img,
.leaflet-container img.leaflet-image-layer,
.leaflet-container .leaflet-tile {
	max-width: none !important;
	max-height: none !important;
	width: auto;
	padding: 0;
	}

.leaflet-container img.leaflet-tile {
	/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */
	mix-blend-mode: plus-lighter;
}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}
.leaflet-container {
	-webkit-tap-highlight-color: transparent;
}
.leaflet-container a {
	-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);
}
.leaflet-tile {
	filter: inherit;
	visibility: hidden;
	}
.leaflet-tile-loaded {
	visibility: inherit;
	}
.leaflet-zoom-box {
	width: 0;
	height: 0;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	z-index: 800;
	}
/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */
.leaflet-overlay-pane svg {
	-moz-user-select: none;
	}

.leaflet-pane         { z-index: 400; }

.leaflet-tile-pane    { z-index: 200; }
.leaflet-overlay-pane { z-index: 400; }
.leaflet-shadow-pane  { z-index: 500; }
.leaflet-marker-pane  { z-index: 600; }
.leaflet-tooltip-pane   { z-index: 650; }
.leaflet-popup-pane   { z-index: 700; }

.leaflet-map-pane canvas { z-index: 100; }
.leaflet-map-pane svg    { z-index: 200; }

.leaflet-vml-shape {
	width: 1px;
	height: 1px;
	}
.lvml {
	behavior: url(#default#VML);
	display: inline-block;
	position: absolute;
	}

/* control positioning */

.leaflet-control {
	position: relative;
	z-index: 800;
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}
.leaflet-top,
.leaflet-bottom {
	position: absolute;
	z-index: 1000;
	pointer-events: none;
	}
.leaflet-top {
	top: 0;
	}
.leaflet-right {
	right: 0;
	}
.leaflet-bottom {
	bottom: 0;
	}
.leaflet-left {
	left: 0;
	}
.leaflet-control {
	float: left;
	clear: both;
	}
.leaflet-right .leaflet-control {
	float: right;
	}
.leaflet-top .leaflet-control {
	margin-top: 10px;
	}
.leaflet-bottom .leaflet-control {
	margin-bottom: 10px;
	}
.leaflet-left .leaflet-control {
	margin-left: 10px;
	}
.leaflet-right .leaflet-control {
	margin-right: 10px;
	}

/* zoom and fade animations */

.leaflet-fade-anim .leaflet-popup {
	opacity: 0;
	-webkit-transition: opacity 0.2s linear;
	   -moz-transition: opacity 0.2s linear;
	        transition: opacity 0.2s linear;
	}
.leaflet-fade-anim .leaflet-map-pane .leaflet-popup {
	opacity: 1;
	}
.leaflet-zoom-animated {
	-webkit-transform-origin: 0 0;
	    -ms-transform-origin: 0 0;
	        transform-origin: 0 0;
	}
svg.leaflet-zoom-animated {
	will-change: transform;
}

.leaflet-zoom-anim .leaflet-zoom-animated {
	-webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1);
	   -moz-transition:    -moz-transform 0.25s cubic-bezier(0,0,0.25,1);
	        transition:         transform 0.25s cubic-bezier(0,0,0.25,1);
	}
.leaflet-zoom-anim .leaflet-tile,
.leaflet-pan-anim .leaflet-tile {
	-webkit-transition: none;
	   -moz-transition: none;
	        transition: none;
	}

.leaflet-zoom-anim .leaflet-zoom-hide {
	visibility: hidden;
	}

/* cursors */

.leaflet-interactive {
	cursor: pointer;
	}
.leaflet-grab {
	cursor: -webkit-grab;
	cursor:    -moz-grab;
	cursor:         grab;
	}
.leaflet-crosshair,
.leaflet-crosshair .leaflet-interactive {
	cursor: crosshair;
	}
.leaflet-popup-pane,
.leaflet-control {
	cursor: auto;
	}
.leaflet-dragging .leaflet-grab,
.leaflet-dragging .leaflet-grab .leaflet-interactive,
.leaflet-dragging .leaflet-marker-draggable {
	cursor: move;
	cursor: -webkit-grabbing;
	cursor:    -moz-grabbing;
	cursor:         grabbing;
	}

/* marker & overlays interactivity */
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-image-layer,
.leaflet-pane > svg path,
.leaflet-tile-container {
	pointer-events: none;
	}

.leaflet-marker-icon.leaflet-interactive,
.leaflet-image-layer.leaflet-interactive,
.leaflet-pane > svg path.leaflet-interactive,
svg.leaflet-image-layer.leaflet-interactive path {
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}

/* visual tweaks */

.leaflet-container {
	background: #ddd;
	outline-offset: 1px;
	}
.leaflet-container a {
	color: #0078A8;
	}
.leaflet-zoom-box {
	border: 2px dotted #38f;
	background: rgba(255,255,255,0.5);
	}

/* general typography */
.leaflet-container {
	font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
	font-size: 12px;
	font-size: 0.75rem;
	line-height: 1.5;
	}

/* general toolbar styles */

.leaflet-bar {
	box-shadow: 0 1px 5px rgba(0,0,0,0.65);
	border-radius: 4px;
	}
.leaflet-bar a {
	background-color: #fff;
	border-bottom: 1px solid #ccc;
	width: 26px;
	height: 26px;
	line-height: 26px;
	display: block;
	text-align: center;
	text-decoration: none;
	color: black;
	}
.leaflet-bar a,
.leaflet-control-layers-toggle {
	background-position: 50% 50%;
	background-repeat: no-repeat;
	display: block;
	}
.leaflet-bar a:hover,
.leaflet-bar a:focus {
	background-color: #f4f4f4;
	}
.leaflet-bar a:first-child {
	border-top-left-radius: 4px;
	border-top-right-radius: 4px;
	}
.leaflet-bar a:last-child {
	border-bottom-left-radius: 4px;
	border-bottom-right-radius: 4px;
	border-bottom: none;
	}
.leaflet-bar a.leaflet-disabled {
	cursor: default;
	background-color: #f4f4f4;
	color: #bbb;
	}

.leaflet-touch .leaflet-bar a {
	width: 30px;
	height: 30px;
	line-height: 30px;
	}
.leaflet-touch .leaflet-bar a:first-child {
	border-top-left-radius: 2px;
	border-top-right-radius: 2px;
	}
.leaflet-touch .leaflet-bar a:last-child {
	border-bottom-left-radius: 2px;
	border-bottom-right-radius: 2px;
	}

/* zoom control */

.leaflet-control-zoom-in,
.leaflet-control-zoom-out {
	font: bold 18px 'Lucida Console', Monaco, monospace;
	text-indent: 1px;
	}

.leaflet-touch .leaflet-control-zoom-in, .leaflet-touch .leaflet-control-zoom-out  {
	font-size: 22px;
	}

	box-shadow: 0 1px 5px rgba(0,0,0,0.4);

	border-radius: 5px;

/* ── DESIGN SYSTEM ───────────────────────────────── */
:root {
  --bg:         #0d1117;

/* ── LOAD SCREEN ─────────────────────────────────── */
#load-screen {
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.load-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:48px 56px;
  text-align:center;
  max-width:580px;
  width:90%;
  box-shadow:var(--shadow);
}
.load-logo {
  margin-bottom:6px;
}
.load-subtitle {
  color:var(--text-muted);font-size:13px;margin-bottom:36px;
}
.drop-zone {
  border:2px dashed var(--border);
  border-radius:8px;
  padding:36px 24px;
  cursor:pointer;
  transition:border-color .2s, background .2s;
  position:relative;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color:var(--accent);
  background:rgba(232,160,69,.05);
}
.drop-icon {
  font-size:40px;margin-bottom:12px;opacity:.5;
}
.drop-text {
  font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;
}
.drop-hint {
  font-size:12px;color:var(--text-muted);
}
#file-input {
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.load-error {
  margin-top:16px;padding:10px 14px;

  border-radius:6px;color:#FF3333;

.load-spinner {
  margin-top:20px;display:none;
  color:var(--text-muted);font-size:13px;

.spinner-ring {
  display:inline-block;width:18px;height:18px;
  border:2px solid var(--surface3);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:8px;

/* ── HEADER ──────────────────────────────────────── */
#app-header {
  background:var(--surface);

}
#assoc-content {
  display:none;flex:1;overflow-y:auto;overflow-x:auto;padding:12px 16px;
}
/* ── SF ASSOC SECTION (badge grid + assoc panel) ─── */
.sf-assoc-section { padding:12px 16px;border-bottom:1px solid var(--border); }
.sf-assoc-section-title {
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px;
}
.assoc-badge-grid {
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
}
.assoc-badge {
  display:flex;align-items:center;justify-content:space-between;
  gap:6px;padding:7px 10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--text);
  transition:background .12s,border-color .12s;
  text-align:left;
}
.assoc-badge:hover { background:var(--surface3);border-color:var(--text-muted); }
.assoc-badge.active { border-color:var(--accent);color:var(--accent); }
.assoc-badge .badge-label { flex:1;white-space:normal;line-height:1.3; }
.assoc-badge .badge-count {
  font-size:11px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;
  font-family:var(--font-mono);
}
.assoc-badge.active .badge-count { color:var(--accent); }
/* Assoc panel table — auto-width, not full-width */
#assoc-content .sub-table { width:auto;min-width:360px;max-width:100%; }
.leaflet-tile-pane { filter:brightness(.75) saturate(.6) hue-rotate(185deg); }
.leaflet-container { font-family:var(--font-ui); }
.leaflet-popup-content-wrapper {
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);box-shadow:var(--shadow);
}
.leaflet-popup-tip { background:var(--surface2); }
.popup-title { font-family:var(--font-title);font-size:13px;font-weight:600;margin-bottom:6px; }
.popup-row { display:flex;justify-content:space-between;gap:12px;font-size:12px;margin:2px 0; }
.popup-row .label { color:var(--text-muted); }
.popup-row .value { color:var(--accent);font-family:var(--font-mono); }
.popup-btn {
  display:block;width:100%;margin-top:10px;
  background:var(--accent);color:#000;border:none;
  border-radius:4px;padding:6px;font-size:12px;font-weight:600;
  cursor:pointer;text-align:center;
}
.popup-btn:hover { background:#f0b060; }

/* ── TABLE PANEL ─────────────────────────────────── */
#table-panel {
  overflow:hidden;display:flex;flex-direction:column;
  flex:1;min-width:0;
}
.tab-bar {
  display:flex;background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 16px;gap:4px;flex-shrink:0;
}
.tab-btn {
  background:transparent;border:none;
  border-bottom:2px solid transparent;
  padding:10px 14px;
  font-family:var(--font-ui);font-size:13px;font-weight:500;
  color:var(--text-muted);cursor:pointer;
  transition:color .15s,border-color .15s;white-space:nowrap;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--text);border-bottom-color:var(--accent); }
.tab-btn .badge {
  background:var(--surface3);border-radius:10px;
  padding:1px 7px;font-size:11px;margin-left:6px;color:var(--text-muted);
}
.tab-btn.active .badge { background:var(--accent);color:#000; }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ── PROJECT SELECTOR ─────────────────────────────── */
.project-bar {
  padding:6px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
/* single flex row: label | ⓘ button | dropdown */
.project-bar-row {
  display:flex;align-items:center;gap:8px;
}
.project-bar-label {
  font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;
  flex-shrink:0;
}
.project-info-btn {
  background:transparent;border:1px solid var(--border);border-radius:10px;
  padding:2px 8px;font-size:11px;color:var(--text-muted);cursor:pointer;
  font-family:var(--font-ui);transition:color .12s,border-color .12s,background .12s;
  white-space:nowrap;flex-shrink:0;
}
.project-info-btn:hover { color:var(--text);border-color:var(--text-muted); }
.project-info-btn.open { background:var(--surface2);color:var(--text);border-color:var(--text-muted); }
.project-dropdown {
  background:var(--surface3);border:1.5px solid var(--accent);border-radius:6px;
  padding:4px 8px;font-family:var(--font-ui);font-size:12px;color:var(--text);
  cursor:pointer;flex:1;min-width:0;max-width:340px;
  appearance:auto;-webkit-appearance:auto;
}
.project-dropdown:focus { outline:none;box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 40%,transparent); }
.project-dropdown option { background:var(--surface2);color:var(--text); }
/* Collapsible project detail pane */
#project-detail-pane {
  display:none;overflow-y:auto;max-height:260px;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;flex-shrink:0;
}
#project-detail-pane.open { display:block; }
.proj-detail-row {
  display:flex;gap:10px;padding:3px 0;font-size:12px;border-bottom:1px solid var(--surface2);
}
.proj-detail-row:last-child { border-bottom:none; }
.proj-detail-key {
  color:var(--text-muted);font-weight:600;min-width:110px;flex-shrink:0;font-size:11px;padding-top:1px;
}
.proj-detail-val { color:var(--text);word-break:break-word; }

/* ── GENERIC KV TABLE (renderKVTable) ─────────────── */
.kv-row {
  display:flex;gap:10px;padding:3px 0;font-size:12px;border-bottom:1px solid var(--surface2);
}
.kv-row:last-child { border-bottom:none; }
.kv-key {
  color:var(--text-muted);font-weight:600;min-width:110px;flex-shrink:0;font-size:11px;padding-top:1px;
}
.kv-val { color:var(--text);word-break:break-word;flex:1; }
.kv-section-header {
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent);padding:8px 0 2px;border-bottom:1px solid var(--border);margin-bottom:2px;
}
.kv-section-header:first-child { padding-top:2px; }
/* Nested KV table rendered inside a kv-val cell */
.kv-nested {
  border-left:2px solid var(--border);padding-left:8px;margin-top:2px;width:100%;
}
.kv-nested .kv-row { font-size:11px;padding:2px 0; }
.kv-nested .kv-key { min-width:90px;font-size:10px; }
.kv-nested + .kv-nested { margin-top:6px; }

/* ── PROJECT INFO POPUP ───────────────────────────── */
.proj-popup-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;
  display:flex;align-items:center;justify-content:center;
}
.proj-popup {
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  min-width:340px;max-width:560px;max-height:80vh;overflow-y:auto;
  padding:20px 24px;box-shadow:0 8px 32px rgba(0,0,0,.5);position:relative;
}
.proj-popup h3 {
  font-size:14px;font-weight:700;color:var(--text);margin:0 0 12px;padding-right:24px;
}
.proj-popup-close {
  position:absolute;top:14px;right:16px;background:none;border:none;
  color:var(--text-muted);font-size:18px;cursor:pointer;line-height:1;
}
.proj-popup-close:hover { color:var(--text); }
.proj-popup-row {
  display:flex;gap:8px;margin-bottom:6px;font-size:12.5px;
}
.proj-popup-key {
  color:var(--text-muted);font-weight:600;min-width:110px;flex-shrink:0;
}
.proj-popup-val { color:var(--text);word-break:break-word; }
.table-scroll { overflow:auto;flex:1; }
table.data-table { width:100%;border-collapse:collapse;font-size:12.5px; }
table.data-table thead { position:sticky;top:0;z-index:2; }
table.data-table th {
  background:var(--surface2);color:var(--text-muted);
  font-weight:500;font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;padding:8px 12px;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
table.data-table td {
  padding:8px 12px;border-bottom:1px solid var(--surface2);
  color:var(--text);white-space:nowrap;
}
table.data-table tbody tr { cursor:pointer;transition:background .1s; }
table.data-table tbody tr:hover { background:var(--surface2); }
table.data-table tbody tr.selected {
  background:rgba(232,160,69,.12);
  outline:1px solid rgba(232,160,69,.3);
  outline-offset:-1px;
}
.mono { font-family:var(--font-mono);font-size:12px; }
.tag-bh { color:var(--bh-color);font-weight:500; }
.tag-cpt { color:var(--cpt-color);font-weight:500; }
.depth-val { color:var(--accent3);font-family:var(--font-mono); }
/* Mini clickable link used in SF table Parent/Installations cells */
.sf-link {
  display:inline-block;cursor:pointer;
  color:var(--accent);text-decoration:underline;text-underline-offset:2px;
  font-size:11.5px;white-space:nowrap;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;vertical-align:middle;
}
.sf-link:hover { color:#f0b060; }
/* Stacked name cell: primary name on top, codeSpace beneath */
.sf-name-primary { font-weight:500;color:var(--text); }
.sf-name-code { font-size:10.5px;color:var(--text-muted);margin-top:1px; }
/* Collapsed installation list */
.sf-install-more {
  display:inline-block;font-size:10.5px;color:var(--text-muted);
  cursor:pointer;margin-top:2px;
}
.sf-install-more:hover { color:var(--text); }

/* ── GP_MultiTrack sub-table rows ───────────────── */
tr.mt-header { background:var(--surface2) !important; }
tr.mt-header td { font-weight:600;color:var(--text); }
tr.mt-header:hover { background:var(--surface3) !important; }
tr.mt-header.expanded td:first-child::before { content:'▾ ';font-size:10px;color:var(--text-muted); }
tr.mt-header:not(.expanded) td:first-child::before { content:'▸ ';font-size:10px;color:var(--text-muted); }
tr.mt-subtable-row { background:var(--surface) !important;cursor:default; }
tr.mt-subtable-row:hover { background:var(--surface) !important; }
tr.mt-subtable-row td { padding:0;border-bottom:2px solid var(--border); }
table.mt-subtable {
  width:100%;border-collapse:collapse;font-size:12px;background:#12171d;
}
table.mt-subtable td {
  padding:6px 16px 6px 28px;border-bottom:1px solid var(--surface2);
  color:var(--text);white-space:nowrap;
}
table.mt-subtable tr { cursor:pointer;transition:background .1s; }
table.mt-subtable tr:last-child td { border-bottom:none; }
table.mt-subtable tr:hover { background:var(--surface2); }
table.mt-subtable tr.mt-member-selected { background:rgba(232,160,69,.15); }

/* ── DETAIL PANEL ────────────────────────────────── */
#detail-panel {
  flex:0 0 25vw;min-height:0;min-width:200px;
  overflow:hidden;
  background:var(--surface);
  display:flex;flex-direction:column;
}
#detail-placeholder {
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--text-dim);gap:12px;padding:20px;
}
#detail-placeholder .ph-icon { font-size:48px;opacity:.3; }
#detail-placeholder p { font-size:13px;text-align:center;max-width:200px; }
#detail-content { flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0; }
#detail-content-fixed { flex-shrink:0;overflow-y:auto;max-height:55%; }
#detail-content-scroll { flex:1;overflow-y:auto;min-height:0; }
.detail-header {
  padding:16px 20px 14px;border-bottom:1px solid var(--border);
  background:var(--surface2);position:sticky;top:0;z-index:5;
}
.detail-header .detail-type {
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:1px;color:var(--text-muted);margin-bottom:4px;
}
.detail-header .detail-name {
  font-family:var(--font-title);font-size:20px;font-weight:700;color:var(--text);
}
.detail-meta-grid {
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--border);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}
.meta-cell { background:var(--surface);padding:10px 16px; }
.meta-cell .meta-label {
  font-size:10px;text-transform:uppercase;
  letter-spacing:.5px;color:#8b96a8;margin-bottom:2px;
}
.meta-cell .meta-value {
  font-family:var(--font-mono);font-size:13px;color:var(--accent);font-weight:500;
}
.detail-section { padding:14px 16px;border-bottom:1px solid var(--border); }
.section-title {
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.section-title::after { content:'';flex:1;height:1px;background:var(--surface3); }
.sub-table { width:100%;border-collapse:collapse;font-size:12px; }
.sub-table th {
  background:var(--surface2);color:var(--text-muted);
  font-size:10px;font-weight:500;text-transform:uppercase;
  letter-spacing:.3px;padding:6px 10px;text-align:left;
  border-bottom:1px solid var(--border);
}
.sub-table td {
  padding:6px 10px;border-bottom:1px solid var(--surface2);
  color:var(--text);vertical-align:top;
}
.sub-table tbody tr:nth-child(even) td { background:rgba(255,255,255,.02); }
.lith-code {
  display:inline-block;padding:1px 7px;border-radius:3px;
  font-family:var(--font-mono);font-size:11px;font-weight:600;
  background:var(--surface3);color:var(--accent);
}
.cpt-plots-section { padding:12px 16px; overflow:visible; }
.cpt-plots-title {
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.cpt-plots-title::after { content:'';flex:1;height:1px;background:var(--surface3); }
#cpt-canvas-area, #cpt-canvas-area-assoc {
  display:flex;flex-direction:row;gap:10px;
  width:100%;
  overflow-x:auto;overflow-y:auto;
  padding-bottom:8px;
  scrollbar-width:thin;
  scrollbar-color:var(--accent) var(--surface2);
}
#cpt-canvas-area::-webkit-scrollbar, #cpt-canvas-area-assoc::-webkit-scrollbar { height:6px; }
#cpt-canvas-area::-webkit-scrollbar-track, #cpt-canvas-area-assoc::-webkit-scrollbar-track { background:var(--surface2); border-radius:3px; }
#cpt-canvas-area::-webkit-scrollbar-thumb, #cpt-canvas-area-assoc::-webkit-scrollbar-thumb { background:var(--accent); border-radius:3px; }
.cpt-plot-wrapper { flex:0 0 calc(20% - 8px);min-width:150px;position:relative; }

/* ── Well SVG plot styles ─────────────────────────── */
.well-plots-area { padding:4px 0 8px 0; overflow-x:auto; }
.well-plot-svg { border-radius:6px; overflow:hidden; min-width:80%; width:80%; display:block; }
.meas-meta-row { display:flex;flex-wrap:wrap;gap:6px;padding:6px 10px 8px 10px; }
.meas-meta-chip {
  font-size:11px;padding:2px 8px;border-radius:10px;
  background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);
}
.cpt-plot-toolbar {
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-family:monospace;color:#8b949e;
  padding-bottom:4px;
}
.empty-state { padding:32px 20px;text-align:center;color:var(--text-dim);font-size:13px; }
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text);}
@media(max-width:900px){
  #main-layout{ flex-direction:column; }
  #left-col{ flex:0 0 auto;border-right:none;border-bottom:1px solid var(--border); }
  #table-panel{ flex:0 0 40vh; }
  #map-panel{ flex:0 0 40vh;border-top:none; }
  #h-drag{ display:none; }
  #v-drag, #v-drag2{ display:none; }
  #detail-panel{ flex:0 0 60vh;min-width:0;border-top:1px solid var(--border); }
  #assoc-panel{ flex:0 0 40vh;min-width:0;border-left:none;border-top:1px solid var(--border); }
}

/* ── SELECTED MARKER PULSE ───────────────────────────────── */
@keyframes markerPulse {
  0%   { transform: scale(1);   opacity: 1; }
  50%  { transform: scale(1.5); opacity: .7; }
  100% { transform: scale(1);   opacity: 1; }
}
@keyframes markerRing {
  0%   { transform: scale(1);   opacity: .8; }
  100% { transform: scale(2.8); opacity: 0; }
}
.marker-selected-inner {
  animation: markerPulse 1s ease-in-out infinite;
}
.marker-selected-ring {
  animation: markerRing 1s ease-out infinite;
}

/* ── Axis-swap warning banner ───────────────────────── */
.axis-warn-banner {
  background: rgba(30, 20, 0, 0.92);
  border: 1px solid #e8a045;
  color: #f0c060;
  padding: 7px 12px;
  border-radius: 6px;
  font-size: 12px;
  max-width: 340px;
  line-height: 1.5;
  pointer-events: auto;
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
}
.axis-warn-banner em { color: #ffd080; font-style: normal; font-weight: 600; }

.datum-tag { font-size:10px; opacity:0.65; font-family:var(--font-ui,sans-serif); }
.well-link { color:var(--accent); cursor:pointer; text-decoration:underline; font-size:11.5px; white-space:nowrap; }
.well-link:hover { color:#79c0ff; }
.well-links-cell { font-size:11.5px; line-height:1.7; }

/* ── Measurement procedure blocks ─────────────────────────────── */
.meas-section { padding-top:4px; }
.meas-proc-block { margin-bottom:10px; border:1px solid rgba(255,255,255,.07); border-radius:6px; overflow:hidden; }
.meas-proc-header {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px; background:rgba(255,255,255,.04);
  cursor:pointer; user-select:none;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.meas-proc-header:hover { background:rgba(255,255,255,.07); }
.meas-proc-arrow { color:var(--accent);font-size:11px;width:12px;flex-shrink:0; }
.meas-proc-name  { font-weight:600;font-size:13px;color:var(--text-bright);flex:1; }
.meas-proc-count { font-size:11px;color:var(--text-muted);flex-shrink:0; }
.meas-proc-body  { padding:8px 8px 4px; overflow-x:auto; }

/* Measurement table tweaks */
.meas-table th { white-space:nowrap; text-transform:none; letter-spacing:0; }
.meas-table td { white-space:nowrap; }
.col-uom { font-size:10px; color:var(--text-muted); font-weight:400; display:block; }
.muted-dash { color:var(--text-dim) !important; text-align:center; }

/* PPD dissipation trace plots */
.ppd-plot-wrap { margin: 12px 0 8px; }
.ppd-plot-label { font-size:11px; color:var(--text-muted); margin-bottom:4px; font-style:italic; }
.ppd-plot-container { width:80%; min-width:80%; }

/* ── Borehole descriptor / SF detail section 4 ── */
.kv-equip-link {
  color:var(--accent);cursor:pointer;text-decoration:underline;
  text-underline-offset:2px;font-size:12px;
}
.kv-equip-link:hover { color:#f0b060; }
.kv-interval-wrap { overflow-x:auto; margin-top:4px; }
.kv-backfill-header {
  font-size:11px;color:var(--text-muted);font-style:italic;
  padding:3px 0 1px;border-top:1px dashed var(--border);margin-top:6px;
}
.kv-backfill-header:first-child { border-top:none; margin-top:0; }
/* Info icon for interval table complex columns */
.col-info-icon {
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:50%;
  background:var(--accent);color:#000;font-size:11px;font-weight:700;
  cursor:pointer;line-height:1;user-select:none;flex-shrink:0;
}
.col-info-icon:hover { background:#f0b060; }
/* Generic detail popup (replaces equipment-modal) */
#detail-popup { display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.72);align-items:center;justify-content:center; }
#detail-popup.open { display:flex; }
#detail-popup-inner {
  background:var(--bg-panel,var(--surface));border:1px solid var(--border);
  border-radius:8px;padding:20px;max-width:560px;width:92%;max-height:82vh;
  overflow-y:auto;position:relative;
}
#detail-popup-title {
  font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;
  padding-right:28px;
}
#detail-popup-close {
  position:absolute;top:10px;right:12px;background:none;border:none;
  color:var(--text-muted);font-size:18px;cursor:pointer;line-height:1;
}
#detail-popup-close:hover { color:var(--text); }
</style>

<!-- ═══════════════════════ LOAD SCREEN ════════════════════════ -->

  <!-- MAIN -->
  <div id="main-layout">
    <!-- LEFT COLUMN: SF Summary (top) + Map (bottom) -->
    <div id="left-col">
      <div id="table-panel">
        <!-- PROJECT SELECTOR (shown when file has ≥1 project) -->
        <div class="project-bar" id="project-bar" style="display:none">
          <div class="project-bar-row">
            <span class="project-bar-label">Project</span>
            <!-- dropdown always used (no pills) -->
            <select id="project-dropdown" class="project-dropdown" style="display:none"
                    onchange="selectProject(this.value)"></select>
            <!-- ⓘ info button — shown only when Project element exists in file -->
            <button id="project-info-btn" class="project-info-btn" style="display:none"
                    title="View project details" onclick="toggleProjectDetail(DIGGS_ACTIVE_PROJECT)">ⓘ Info</button>
          </div>
        </div>
        <!-- COLLAPSIBLE PROJECT DETAIL PANE -->
        <div id="project-detail-pane"></div>

        <div id="sf-tab-bar" class="tab-bar">
          <!-- populated dynamically by buildSFTabs() -->
        </div>
        <!-- SF table panels are inserted here by buildSFTabs() -->
      </div>

      <!-- H-drag: resize table vs map height within left-col -->
      <div id="h-drag" title="Drag to resize"></div>

      <!-- MAP at bottom of left-col -->
      <div id="map-panel"><div id="map"></div></div>
    </div>

    <!-- V-drag: resize left-col vs detail-panel width -->
    <div id="v-drag" class="v-drag" title="Drag to resize"></div>

    <!-- CENTER COLUMN: SF Detail Panel -->
    <div id="detail-panel">
      <div id="detail-placeholder">
        <div class="ph-icon">◎</div>
        <p>Click a row or map marker to view details</p>
      </div>
      <div id="detail-content" style="display:none"></div>
    </div>

    <!-- V-drag 2: resize detail-panel vs assoc-panel width -->
    <div id="v-drag2" class="v-drag" title="Drag to resize"></div>

    <!-- RIGHT COLUMN: SF Association Panel -->
    <div id="assoc-panel">
      <div id="assoc-placeholder">
        <div class="ph-icon">⊞</div>
        <p>Associated data will appear here when a feature is selected</p>
      </div>
      <div id="assoc-header"></div>
      <div id="assoc-content"></div>
    </div>
  </div>

// Geographic CRS EPSG codes — coordinates are (lon, lat), no proj transform needed
const GEO_CRS = new Set([4326,4979,4269,4267,4258,4230,4277,4283,7844,4289]);

// Vertical-only CRS codes (elevation datums — never used for horizontal transform)
const VERT_CRS = new Set([5703,5714,5715,5773,8228,6360,5701,6357,6358,
  5702,5706,5711,5705,5709,5621,3855,6647,4979]);

// Embedded vertical CRS unit lookup (name + elevation unit)
const VERT_CRS_INFO = {
  5703: { name:'NAVD88',       unit:'m'    },
  8228: { name:'NAVD88',       unit:'ft'   },
  6360: { name:'NAVD88',       unit:'ftUS' },
  5702: { name:'NGVD29',       unit:'ft'   },

/**
 * Get elevation unit for a vertical CRS EPSG code.
 * Returns a Promise<{ name, unit }> — checks embedded table first, then epsg.io.
 */
async function getVertCRSInfo(vertEPSG) {
  if (!vertEPSG) return null;
  if (VERT_CRS_INFO[vertEPSG]) return VERT_CRS_INFO[vertEPSG];

  // Online fallback: fetch proj4 string from epsg.io and parse +vunits/+vto_meter
  try {
    const r = await fetch(`https://epsg.io/${vertEPSG}.proj4`,
                          { signal: AbortSignal.timeout(4000) });
    if (!r.ok) return null;
    const proj4str = (await r.text()).trim();
    if (!proj4str || proj4str.startsWith('<')) return null;

    // Parse unit from proj4 string
    let unit = 'm';  // default
    const vm = proj4str.match(/\+vunits=(\S+)/);
    if (vm) {
      unit = { 'm':'m','ft':'ft','us-ft':'ftUS','us-in':'in' }[vm[1]] || vm[1];
    } else {
      const tm = proj4str.match(/\+vto_meter=([\d.]+)/);
      if (tm) {
        const v = parseFloat(tm[1]);
        if (Math.abs(v - 1.0)    < 1e-9)  unit = 'm';
        else if (Math.abs(v - 0.3048) < 1e-7) unit = 'ft';
        else if (v > 0.30479 && v < 0.30482)  unit = 'ftUS';
        else unit = `(×${v}m)`;
      }
    }
    const info = { name: `EPSG:${vertEPSG}`, unit };
    VERT_CRS_INFO[vertEPSG] = info;  // cache for session
    return info;
  } catch { return null; }
}

/**
 * Parse EPSG code(s) from any OGC srsName string.
 * Returns { horiz: number|null, vert: number|null }
 */
function parseEPSG(srsName) {
  if (!srsName) return { horiz: null, vert: null };
  const s = srsName.trim();

  // Compound CRS: extract both components
  if (s.includes('crs-compound') || s.toLowerCase().includes('compound')) {
    const decoded = s.replace(/%26/gi, '&').replace(/&amp;/gi, '&');
    const codes = [...decoded.matchAll(/EPSG[/:](?:\w+\/)?(\d+)/gi)].map(m => parseInt(m[1]));
    const nonVert = codes.filter(c => !VERT_CRS.has(c));
    const vert    = codes.find(c =>  VERT_CRS.has(c)) || null;
    return { horiz: nonVert[0] || null, vert };
  }

  // URN: urn:ogc:def:crs:EPSG::4326  or  urn:ogc:def:crs:EPSG:6.6:4326
  let m = s.match(/urn:ogc:def:crs:EPSG:[^:]*:(\d+)/i);
  if (m) return { horiz: parseInt(m[1]), vert: null };

  // HTTP/HTTPS URI: .../EPSG/0/26911  or  epsg.xml#4326
  m = s.match(/EPSG[/:](?:[\d.]+[/:])?(\d+)/i);
  if (m) return { horiz: parseInt(m[1]), vert: null };

  // Fragment: #4326
  m = s.match(/#(\d+)$/);
  if (m) return { horiz: parseInt(m[1]), vert: null };

  return { horiz: null, vert: null };
}

/**
 * Convert coordinates to WGS84 [lat, lon] for Leaflet.
 * pos: array of numbers from gml:pos (in srsName axis order)
 * srsName: the srsName attribute string
 * Returns { lat, lon, elev, horizEPSG, vertEPSG, transformed, warning }
 */
function toWGS84(pos, srsName) {
  const result = { lat: null, lon: null, elev: null,
                   horizEPSG: null, vertEPSG: null,
                   transformed: false, axisSwapped: false, warning: null };

  if (!pos || pos.length < 2) {
    result.warning = 'No coordinates'; return result;
  }

  const { horiz, vert } = parseEPSG(srsName);
  result.horizEPSG = horiz;
  result.vertEPSG  = vert;
  result.elev      = pos.length >= 3 ? pos[2] : null;

  // Geographic CRS — EPSG axis order is LAT, LON
  if (!horiz || GEO_CRS.has(horiz)) {
    let lat = pos[0], lon = pos[1];
    let axisSwapped = false;

    // Detect legacy lon,lat mis-encoding:
    // Step 1: if |first value| > 90 it cannot be a latitude → definitely swapped
    if (Math.abs(pos[0]) > 90) {
      lat = pos[1]; lon = pos[0];
      axisSwapped = true;
    }
    // Step 2: if |second value| > 90 it must be longitude → already lat,lon (correct)
    else if (Math.abs(pos[1]) > 90) {
      lat = pos[0]; lon = pos[1];
    }
    // Step 3: both in [-90,90]. If first coord is negative, assume legacy lon,lat swap.
    // Known limitation: correctly-encoded S+W hemisphere locations (e.g. southern S. America)
    // will also trigger this — acceptable per project convention.
    else if (pos[0] < 0) {
      lat = pos[1]; lon = pos[0];
      axisSwapped = true;
    }

    result.lat = lat;
    result.lon = lon;
    if (axisSwapped) {
      result.axisSwapped = true;
      result.warning = `Axis order corrected: coordinates appear to be encoded as lon,lat `
        + `(legacy convention) rather than the EPSG-standard lat,lon. `
        + `Values swapped automatically (original: ${pos[0]}, ${pos[1]}).`;
    }
    return result;
  }

  // Projected CRS — need proj4 transform
  const key = `EPSG:${horiz}`;
  if (typeof proj4 === 'undefined') {
    result.warning = 'proj4js not loaded'; return result;
  }

  let def = CRS_DEFS[key];
  if (!def) {
    result.warning = `EPSG:${horiz} not in embedded table — cannot plot`;
    return result;
  }

  try {
    // proj4 always returns [lon, lat] after transform to geographic
    const [lon, lat] = proj4(key, 'EPSG:4326', [pos[0], pos[1]]);
    // Sanity check — valid WGS84 range
    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
      result.warning = `EPSG:${horiz} transform produced out-of-range coords (${lat.toFixed(4)}, ${lon.toFixed(4)})`;
      return result;
    }
    result.lat = lat;
    result.lon = lon;
    result.transformed = true;
  } catch (e) {
    result.warning = `EPSG:${horiz} transform failed: ${e.message}`;
  }
  return result;
}

/** Fetch a proj4 definition from epsg.io (online fallback for unknown codes) */
async function fetchEPSGDef(epsg) {
  try {
    const r = await fetch(`https://epsg.io/${epsg}.proj4`, { signal: AbortSignal.timeout(4000) });
    if (!r.ok) return null;
    const def = (await r.text()).trim();
    if (!def || def.startsWith('<')) return null;  // HTML error page
    proj4.defs(`EPSG:${epsg}`, def);
    CRS_DEFS[`EPSG:${epsg}`] = def;  // cache for this session
    return def;
  } catch { return null; }
}

/** Detect the DIGGS namespace actually used in this document and update NS.diggs */
function detectDiggsNS(doc) {
  const root = doc.documentElement;
  // Check the root element's own namespace first
  if (root.namespaceURI && root.namespaceURI.includes('diggsml.org')) {
    NS.diggs = root.namespaceURI;
    return root.namespaceURI;
  }
  // Walk ALL declared namespace attributes (xmlns or xmlns:xxx) on root
  for (const attr of root.attributes) {
    if (attr.value && attr.value.includes('diggsml.org')) {
      NS.diggs = attr.value;
      return attr.value;
    }
  }
  // Fallback: check first child element namespace
  for (const child of root.children) {
    if (child.namespaceURI && child.namespaceURI.includes('diggsml.org')) {
      NS.diggs = child.namespaceURI;
      return child.namespaceURI;
    }
  }
  return NS.diggs; // unchanged
}

/**
 * Namespace-robust element lookup.
 * In DIGGS documents, elements may appear with:
 *   - the diggs: prefix  (namespaceURI = NS.diggs)
 *   - no prefix as default namespace (namespaceURI = NS.diggs, same URI)
 *   - no prefix with no default namespace (namespaceURI = null/empty)
 * This helper tries NS.diggs first, then falls back to null-namespace,
 * so it works regardless of how the document declares its namespaces.
 */
function xpathNS(doc, expr, ctx) {
  return doc.evaluate(expr, ctx || doc, p => NS[p] || null,
    XPathResult.ANY_TYPE, null);
}

function xNodes(doc, expr, ctx) {
  const r = xpathNS(doc, expr, ctx || doc);
  const out = [];
  let n;
  while ((n = r.iterateNext())) out.push(n);
  return out;
}

function xFirst(doc, expr, ctx) {
  return xNodes(doc, expr, ctx)[0] || null;
}

function xText(doc, expr, ctx) {
  const n = xFirst(doc, expr, ctx);
  return n ? (n.textContent || n.nodeValue || '').trim() : '';
}

//                               Transect, GroutTrenchCutoffWall)
//                 polygon     → rendered as polygon border from featureExtent
//                               NOTE: currently all planar SF types are set to 'point'
//                               because featureExtent is commonly in local coords.
//                               Change to 'polygon' once local CRS transform is implemented.
//                 installation→ child of another SF; no independent map marker
//                 none        → no map marker (GP_MultiTrack; rendered via member tracklines)
//   depthPath   : XPath (relative to SF element) for depth/length value, or null
//   marker      : visual style for map display. Fields vary by mapGeom:
//     For point markers:
//       shape   : 'circle' | 'diamond' | 'square'
//       color   : fill color (CSS color string)
//       border  : border/stroke color
//       size    : diameter/side in px (normal state)
//       opacity : fill opacity (0–1)
//     For line markers (mapGeom === 'line'):
//       color   : line color
//       weight  : line width in px
//       opacity : line opacity (0–1)

// ══════════════════════════════════════════════════════════════
//  FILE LOADING
// ══════════════════════════════════════════════════════════════
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const loadError  = document.getElementById('load-error');
const loadSpinner= document.getElementById('load-spinner');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

function showError(msg) {
  loadError.textContent = msg;
  loadError.style.display = 'block';
  loadSpinner.style.display = 'none';
}

function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.xml' || '.diggs')) {
    showError('Please select a DIGGS XML file (.xml or .diggs)');
    return;
  }
  loadError.style.display = 'none';
  loadSpinner.style.display = 'block';

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(e.target.result, 'application/xml');
      const parseErr = xmlDoc.querySelector('parsererror');
      if (parseErr) throw new Error('XML parse error: ' + parseErr.textContent.slice(0, 120));
      // Defer to next tick so spinner renders
      setTimeout(() => {
        try {
          loadDIGGS(xmlDoc, file.name);
        } catch(err) {
          showError('Error reading DIGGS data: ' + err.message);
          console.error(err);
        }
      }, 30);
    } catch(err) {
      showError(err.message);
    }
  };
  reader.readAsText(file);
}

//  PROJECT RESOLUTION
// ══════════════════════════════════════════════════════════════

/**
 * Parse all projectRef fragments in the document; for each unique fragment
 * look up the matching Project element (if present). Build DIGGS_PROJECTS[].
 * Returns the array of project objects.
 */
function parseProjects(doc) {
  DIGGS_PROJECTS = [];

  // 1. Collect all unique fragment IDs from every projectRef attribute
  const allRefs = xNodes(doc, '//*[@xlink:href]');
  const fragmentIds = new Set();
  for (const el of allRefs) {
    // Only elements named projectRef
    if (el.localName !== 'projectRef') continue;
    const href = el.getAttributeNS(NS.xlink, 'href') || el.getAttribute('xlink:href') || '';
    const frag = href.replace(/^#/, '').trim();
    if (frag) fragmentIds.add(frag);
  }

  // 2. For each fragment, look up the Project element and build label
  for (const frag of fragmentIds) {
    const projEl = doc.querySelector(`[*|id="${frag}"]`);
    // Is it actually a Project element?
    const isProject = projEl && projEl.localName === 'Project';

    let label, titleHtml, namesHtml;
    if (isProject) {
      // Collect only direct gml:name children of the Project element (not descendants inside BA etc.)
      const nameEls = [...projEl.childNodes].filter(
        n => n.nodeType === 1 && n.localName === 'name' && n.namespaceURI === NS.gml
      );
      if (nameEls.length) {
        label     = nameEls[0].textContent.trim() || frag;  // first name only — for pill/dropdown
        titleHtml = nameEls.map(n => escHtml(n.textContent.trim())).join(' / ');  // all names — for popup title
        namesHtml = nameEls.map(n => {
          const cs  = n.getAttribute('codeSpace');
          const val = escHtml(n.textContent.trim());
          return cs ? `${val} <span style="color:var(--text-muted);font-size:11px">(${escHtml(cs)})</span>` : val;
        }).join('<br>');
      } else {
        label     = frag;
        titleHtml = escHtml(frag);
        namesHtml = escHtml(frag);
      }
    } else {
      label     = frag;
      titleHtml = escHtml(frag);
      namesHtml = escHtml(frag);
    }

    DIGGS_PROJECTS.push({
      id:       frag,
      label,
      titleHtml,
      namesHtml,
      el:       isProject ? projEl : null,
      featureIds: null  // filled in step 3
    });
  }

  // 2b. Also pick up any Project elements in the document that weren't referenced
  //     by any projectRef (e.g. test files with project geometry but no SFs yet)
  const knownIds = new Set(DIGGS_PROJECTS.map(p => p.id));
  for (const projEl of doc.getElementsByTagName('*')) {
    if (projEl.localName !== 'Project') continue;
    const gmlId = projEl.getAttributeNS(NS.gml, 'id') || projEl.getAttribute('gml:id');
    if (!gmlId || knownIds.has(gmlId)) continue;
    const nameEls = [...projEl.childNodes].filter(
      n => n.nodeType === 1 && n.localName === 'name'
    );
    let label, titleHtml, namesHtml;
    if (nameEls.length) {
      label     = nameEls[0].textContent.trim() || gmlId;
      titleHtml = nameEls.map(n => escHtml(n.textContent.trim())).join(' / ');
      namesHtml = nameEls.map(n => {
        const cs  = n.getAttribute('codeSpace');
        const val = escHtml(n.textContent.trim());
        return cs ? `${val} <span style="color:var(--text-muted);font-size:11px">(${escHtml(cs)})</span>` : val;
      }).join('<br>');
    } else {
      label = titleHtml = namesHtml = escHtml(gmlId);
    }
    DIGGS_PROJECTS.push({ id: gmlId, label, titleHtml, namesHtml, el: projEl, featureIds: new Set() });
    knownIds.add(gmlId);
  }

  // 3. For each project, collect which SF gml:ids reference it
  const allSFs = [...DIGGS_SF.values()].flat();
  for (const proj of DIGGS_PROJECTS) {
    const ids = new Set();
    for (const sf of allSFs) {
      if (sf.projectRefs && sf.projectRefs.includes(proj.id)) {
        ids.add(sf.id);
      }
    }
    proj.featureIds = ids;
  }

  // Unreferenced SFs (no projectRef) are shown under all projects — no synthetic entry needed.

  // Build BA map: gml:id → name for all BusinessAssociate elements in the document.
  DIGGS_BA_MAP = {};
  for (const baEl of doc.getElementsByTagName('*')) {
    if (baEl.localName !== 'BusinessAssociate') continue;
    const baId = baEl.getAttributeNS(NS.gml, 'id') || baEl.getAttribute('gml:id');
    const nameEl = [...baEl.childNodes].find(n => n.nodeType === 1 && n.localName === 'name');
    if (baId && nameEl) DIGGS_BA_MAP[baId] = nameEl.textContent.trim();
  }

  return DIGGS_PROJECTS;
}

//
//  Each complex element type is described by a field config array.
//  renderFields(el, fields) processes the array and returns RenderItem[].
//  itemsToHtml(items) serializes RenderItem[] to an HTML string.
//
//  RenderItem shape:
//    { text, bold, italic, meta, indent, block }  — plain text, auto-escaped
//    { html, bold, italic, meta, indent, block }  — pre-built safe HTML
//
//  Field spec keys:
//    path        XPath relative to context element (omit to use element itself)
//    multi       iterate all matching nodes (default false)
//    format      key into FORMAT_FN registry
//    fields      nested field config array — recurse into matched node
//    bold/italic/meta/indent/block  display flags (block defaults true)
//    omitIfEmpty skip entry if no value found (default true)
// ══════════════════════════════════════════════════════════════

// ── RenderItem factory ────────────────────────────────────────
function makeRenderItem(value, spec, isHtml = false) {
  const item = {
    bold:   spec.bold   || false,
    italic: spec.italic || false,
    meta:   spec.meta   || false,
    indent: spec.indent || false,
    block:  spec.block  !== false,
    label:  spec.label  || '',
  };
  if (isHtml) item.html = value;
  else        item.text = value;
  return item;
}

// ── Serializer ────────────────────────────────────────────────
function itemsToHtml(items) {
  if (!items || !items.length) return '';
  return items.map(item => {
    const content = item.html !== undefined ? item.html : escHtml(item.text || '');
    if (!content) return '';
    const styles = [
      item.bold   ? 'font-weight:600'                        : '',
      item.italic ? 'font-style:italic'                      : '',
      item.meta   ? 'font-size:11px;color:var(--text-muted)' : '',
      item.indent ? 'padding-left:0.5em'                     : '',
    ].filter(Boolean).join(';');
    const tag = item.block !== false ? 'div' : 'span';
    const labelHtml = item.label
      ? `<span style="color:var(--text-muted);font-size:10px;font-weight:600;margin-right:4px;text-transform:uppercase;letter-spacing:.04em">${escHtml(item.label)}</span>`
      : '';
    const inner = `${labelHtml}${content}`;
    return styles
      ? `<${tag} style="${styles}">${inner}</${tag}>`
      : `<${tag}>${inner}</${tag}>`;
  }).join('');
}

// ── Generic renderer ─────────────────────────────────────────
// Field spec keys:
//   path        XPath relative to context (omit to use element itself)
//   multi       iterate all matching nodes (default false)
//   format      key into FORMAT_FN registry
//   fields      nested field config array — recurse into matched node
//   composite   [{path, format, prefix, suffix}] — join parts into one string
//   separator   string between composite parts (default '')
//   label/bold/italic/meta/indent/block  display flags
function renderFields(el, fields) {
  if (!el || !fields) return [];
  const items = [];
  for (const spec of fields) {
    const nodes   = spec.path ? evalXPath(el, spec.path) : [el];
    const targets = spec.multi ? nodes : nodes.slice(0, 1);
    for (const node of targets) {
      if (!node) continue;
      let result = [];
      if (spec.composite) {
        // Composite: assemble multiple sub-paths into one plain string
        const sep   = spec.separator || '';
        const parts = spec.composite.map(sub => {
          const subNodes = sub.path ? evalXPath(node, sub.path) : [node];
          if (!subNodes.length) return '';
          const fn  = sub.format && FORMAT_FN[sub.format];
          const raw = fn ? fn(subNodes[0]) : nodeText(subNodes[0]);
          if (!raw) return '';
          return (sub.prefix || '') + raw + (sub.suffix || '');
        }).filter(Boolean);
        const val = parts.join(sep);
        if (val) result = [makeRenderItem(val, spec)];
      } else if (spec.fields) {
        // Nested recursion — propagate indent from spec
        result = renderFields(node, spec.fields)
          .map(item => spec.indent ? { ...item, indent: true } : item);
      } else if (spec.format) {
        const fn = FORMAT_FN[spec.format];
        if (!fn) continue;
        const raw = fn(node);
        if (Array.isArray(raw)) {
          result = raw.map(item => spec.indent ? { ...item, indent: true } : item);
        } else if (raw) {
          const hasHtml = /<[a-z]/i.test(raw);
          result = [makeRenderItem(raw, spec, hasHtml)];
        }
      } else {
        const val = nodeText(node);
        if (val) result = [makeRenderItem(val, spec)];
      }
      if ((spec.omitIfEmpty !== false) && !result.length) continue;
      items.push(...result);
    }
  }
  return items;
}

// ── FORMAT_FN registry ───────────────────────────────────────
// Each function receives an XML node/element.
// Returns a plain string, an HTML string, or a RenderItem[].
const FORMAT_FN = {

  // Format a date/datetime text node → plain string mm/dd/yyyy
  date(node) {
    return formatDiggsDate(nodeText(node));
  },

  // Format a gml:TimePositionType node → MM/DD/YYYY, H:MM AM/PM when a
  // non-midnight time component is present; MM/DD/YYYY for date-only or midnight.
  dateTimePos(node) {
    return formatDiggsDateTime(nodeText(node));
  },

  // Format a measure element: numeric text + uom attribute → "value uom"
  measure(node) {
    if (!node) return '';
    const val = nodeText(node);
    if (!val) return '';
    const uom = (node.getAttribute && node.getAttribute('uom')) || '';
    return uom ? `${val} ${uom}` : val;
  },

  // Render a rolePerformed element → display string.
  // Priority: element text content (the actual coded value) → codeSpace # fragment
  // (converted from camelCase/underscore to Title Case) → empty string.
  humanizeRole(node) {
    if (!node) return '';
    const text = nodeText(node).trim();
    if (text) return text;
    // Fallback: derive label from codeSpace URI fragment, title-cased
    const cs   = (node.getAttribute && node.getAttribute('codeSpace')) || '';
    const frag = cs.includes('#') ? cs.split('#').pop() : '';
    if (!frag) return '';
    return frag.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  },

  // Resolve a businessAssociate property element → plain name string only.
  // Used where only a name string is needed (e.g. remark author line).
  resolveBAName(node) {
    if (!node) return '';
    const embBA = [...node.childNodes].find(n => n.nodeType === 1 && n.localName === 'BusinessAssociate');
    if (embBA) {
      const nameEl = [...embBA.childNodes].find(n => n.nodeType === 1 && n.localName === 'name');
      return nameEl ? nodeText(nameEl) : '';
    }
    const href = (node.getAttributeNS(NS.xlink, 'href') || node.getAttribute('xlink:href') || '').replace(/^#/, '');
    return href ? (DIGGS_BA_MAP[href] || href) : '';
  },

  // Render all gml:name children of any element.
  // Each name renders as "value (codeSpace)" if codeSpace present, else "value".
  // Returns RenderItem[] — one item per name, stacking vertically.
  gmlNames(node) {
    if (!node) return [];
    const nameEls = [...node.childNodes].filter(n => n.nodeType === 1 && n.localName === 'name');
    return nameEls.map(n => {
      const val = nodeText(n);
      const cs  = (n.getAttribute && n.getAttribute('codeSpace')) || '';
      const text = cs ? `${val} (${cs})` : val;
      return text ? makeRenderItem(text, {}) : null;
    }).filter(Boolean);
  },

  // Render an emailAddress element as a mailto: link → HTML string
  emailLink(node) {
    if (!node) return '';
    const addr = nodeText(node);
    if (!addr) return '';
    return `<a href="mailto:${escHtml(addr)}" style="color:var(--accent)">${escHtml(addr)}</a>`;
  },

  // Render a fileURL element as a hyperlink.
  // Uses sibling gml:name as label if present, otherwise the URL itself.
  // → HTML string
  fileLink(node) {
    if (!node) return '';
    const url = nodeText(node);
    if (!url) return '';
    const parent = node.parentNode;
    let label = '';
    if (parent) {
      const nameEl = [...parent.childNodes].find(n => n.nodeType === 1 && n.localName === 'name');
      if (nameEl) label = nodeText(nameEl);
    }
    label = label || url;
    return `<a href="${escHtml(url)}" target="_blank" rel="noopener" style="color:var(--accent)">${escHtml(label)}</a>`;
  },

  // Render a phoneNumber element — prepends type attribute if present
  phoneNumber(node) {
    if (!node) return '';
    const num  = nodeText(node);
    if (!num) return '';
    const type = (node.getAttribute && node.getAttribute('type')) || '';
    return type ? `${type}: ${num}` : num;
  },

  // Assemble a TimeInterval element into a single inline plain string.
  // Used by TIME_INTERVAL_FIELDS (for labeled nested-KV rows) and by
  // KV_FORMAT.renderTimeInterval (plain-text pipeline).
  //
  // Same-day rule: if start and end are both dateTime values sharing the same
  // calendar date (YYYY-MM-DD portion equal), render as:
  //   MM/DD/YYYY (HH:MM – HH:MM)
  // Otherwise render as the existing date [– date] [(duration)] form.
  timeIntervalInline(node) {
    if (!node) return '';
    const tiEl = node.localName === 'TimeInterval' ? node
      : [...node.childNodes].find(n => n.nodeType === 1 && n.localName === 'TimeInterval');
    if (!tiEl) return '';
    const getNS = name =>
      tiEl.getElementsByTagNameNS(NS.diggs, name)[0] ||
      tiEl.getElementsByTagNameNS(NS.gml,   name)[0];
    const startRaw = nodeText(getNS('start'));
    const endRaw   = nodeText(getNS('end'));
    const durEl    = getNS('duration');
    const durVal   = durEl ? nodeText(durEl).trim() : '';
    const durUom   = durEl ? (durEl.getAttribute('uom') || '') : '';
    const durFrag  = durUom.includes('#') ? durUom.split('#').pop() : durUom;
    const dur      = durVal ? `${durVal}${durFrag ? '\u00a0' + durFrag : ''}` : '';

    // ── Same-day time-range check ────────────────────────────────────────────
    // Both values must contain a 'T' (i.e. be dateTime, not date-only) and
    // share the same YYYY-MM-DD prefix.
    if (startRaw && endRaw && startRaw.includes('T') && endRaw.includes('T')) {
      const startDate = startRaw.split('T')[0];
      const endDate   = endRaw.split('T')[0];
      if (startDate === endDate) {
        // Extract HH:MM from each raw string (first two time components)
        const timePart = raw => {
          const t = raw.split('T')[1] || '';
          const parts = t.split(':');
          return parts.length >= 2 ? `${parts[0]}:${parts[1]}` : t.slice(0, 5);
        };
        const dateLabel = formatDiggsDate(startRaw);  // MM/DD/YYYY
        const t1 = timePart(startRaw);
        const t2 = timePart(endRaw);
        let out = `${dateLabel} (${t1}\u00a0\u2013\u00a0${t2})`;
        if (dur) out += ` (${dur})`;
        return out;
      }
    }

    // ── Default rendering ────────────────────────────────────────────────────
    // When only one date is present and it carries a time component, render it
    // with time in MM/DD/YYYY, H:MM AM/PM format.
    const onlyOne = (startRaw && !endRaw) || (!startRaw && endRaw);
    const soloRaw = startRaw || endRaw;
    if (onlyOne && soloRaw && soloRaw.includes('T')) {
      let out = formatDiggsDateTime(soloRaw);
      if (dur) out += ` (${dur})`;
      return out;
    }
    const start = formatDiggsDate(startRaw);
    const end   = formatDiggsDate(endRaw);
    let out = start || '';
    if (end && start) out += ` \u2013 ${end}`;
    else if (end)     out  = end;
    if (dur) out += ` (${dur})`;
    return out;
  },

  // Render a TimeInterval element → HTML string via TIME_INTERVAL_FIELDS.
  timeInterval(node) {
    if (!node) return '';
    const tiEl = node.localName === 'TimeInterval' ? node
      : [...node.childNodes].find(n => n.nodeType === 1 && n.localName === 'TimeInterval');
    if (!tiEl) return '';
    return itemsToHtml(renderFields(tiEl, TIME_INTERVAL_FIELDS));
  },

  // Render a diggs:time property element containing a TimeInterval → nested KV div
  renderTimeIntervalNested(node) {
    const el = resolvePropertyEl(node, 'TimeInterval');
    return el ? renderNestedKV(el, TIME_INTERVAL_FIELDS) : '';
  },

  // Uniform property-wrapper renderers. resolvePropertyEl handles embedded child
  // or xlink:href fallback; xlink only fires in practice for BA and AssociatedFile.
  renderRemarkNested(node) {
    const el = resolvePropertyEl(node, 'Remark');
    return el ? renderNestedKV(el, REMARK_FIELDS) : '';
  },

  renderBANested(node) {
    const el = resolvePropertyEl(node, 'BusinessAssociate');
    if (el) return renderNestedKV(el, BUSINESS_ASSOCIATE_FIELDS);
    // Last resort: xlink target not in document — show name string only
    const name = FORMAT_FN.resolveBAName(node);
    return name ? `<div class="kv-nested"><span style="font-weight:600">${escHtml(name)}</span></div>` : '';
  },

  renderAssocFileNested(node) {
    const el = resolvePropertyEl(node, 'AssociatedFile');
    return el ? renderNestedKV(el, ASSOCIATED_FILE_FIELDS) : '';
  },

  renderRoleNested(node) {
    const roleEl = resolvePropertyEl(node, 'Role');
    if (!roleEl) return '';
    const items = [];
    const rpEls = evalXPath(roleEl, 'diggs:rolePerformed');
    if (rpEls.length) {
      const role = FORMAT_FN.humanizeRole(rpEls[0]);
      if (role) items.push(makeRenderItem(role, { bold: true }));
    }
    const tiEls = evalXPath(roleEl, 'diggs:timePerformed/diggs:TimeInterval');
    if (tiEls.length) {
      const str = FORMAT_FN.timeIntervalInline(tiEls[0]);
      if (str) items.push(makeRenderItem(str, { meta: true, label: 'Time' }));
    }
    for (const baNode of evalXPath(roleEl, 'diggs:businessAssociate')) {
      const html = FORMAT_FN.renderBANested(baNode);
      if (html) items.push(makeRenderItem(html, { indent: true }, true));
    }
    for (const rNode of evalXPath(roleEl, 'diggs:remark')) {
      const html = FORMAT_FN.renderRemarkNested(rNode);
      if (html) items.push(makeRenderItem(html, { indent: true, meta: true }, true));
    }
    const inner = itemsToHtml(items);
    return inner ? `<div class="kv-nested">${inner}</div>` : '';
  },

  renderAddress(node) {
    const el = resolvePropertyEl(node, 'Address');
    return el ? renderNestedKV(el, ADDRESS_FIELDS) : '';
  },

  // Render a diggs:Parameter element → "name: value uom" plain string
  renderParameter(node) {
    if (!node) return '';
    const name  = nodeText(evalXPath(node, 'diggs:parameterName')[0]);
    const val   = nodeText(evalXPath(node, 'diggs:parameterValue')[0]);
    const units = nodeText(evalXPath(node, 'diggs:parameterUnits')[0]);
    if (!name && !val) return '';
    let out = name || '';
    if (val) out += out ? `: ${val}` : val;
    if (units) out += `\u00a0${units}`;
    return out;
  },

  // Render a diggs:value (CostType) element → "amount currency"
  renderCost(node) {
    if (!node) return '';
    const amount   = nodeText(node);
    const currency = node.getAttribute('currency') || '';
    if (!amount) return '';
    return currency ? `${amount}\u00a0${currency}` : amount;
  },

  // ── Borehole descriptor helpers ─────────────────────────────

  // Resolve measure element value + uom attribute → "value uom"
  // Identical to FORMAT_FN.measure but callable from renderFields spec
  measureAttr(node) {
    return FORMAT_FN.measure(node);
  },

  // Resolve plunge — check diggs:plunge first, fall back to diggs:holePlunge.
  // Returns '' if Deviated or Vertical (caller suppresses row).
  // node is the diggs:centerLine/diggs:LinearExtent element (passed from rawFormat).
  resolvePlunge(node) {
    // Determine orientation from the same LinearExtent node
    const orient = FORMAT_FN._boreholeOrientationFromLE(node);
    if (orient !== 'Inclined') return '';
    // Walk up to Borehole element
    const bhEl = FORMAT_FN._bhFromLE(node);
    if (!bhEl) return '';
    const plungeEl = bhEl.getElementsByTagNameNS(NS.diggs, 'plunge')[0]
                  || bhEl.getElementsByTagNameNS(NS.diggs, 'holePlunge')[0];
    if (!plungeEl) return '';
    const val = nodeText(plungeEl);
    if (!val) return '';
    const uom = plungeEl.getAttribute('uom') || '';
    return uom ? `${val}\u00a0${uom}` : val;
  },

  // Resolve bearing — check diggs:bearing first, fall back to diggs:holeBearing.
  // Returns '' if Deviated or Vertical.
  resolveBearing(node) {
    const orient = FORMAT_FN._boreholeOrientationFromLE(node);
    if (orient !== 'Inclined') return '';
    const bhEl = FORMAT_FN._bhFromLE(node);
    if (!bhEl) return '';
    const bearingEl = bhEl.getElementsByTagNameNS(NS.diggs, 'bearing')[0]
                   || bhEl.getElementsByTagNameNS(NS.diggs, 'holeBearing')[0];
    if (!bearingEl) return '';
    const val = nodeText(bearingEl);
    if (!val) return '';
    const uom = bearingEl.getAttribute('uom') || '';
    return uom ? `${val}\u00a0${uom}` : val;
  },

  // Compute borehole orientation from a LinearExtent element.
  // Returns 'Vertical' | 'Inclined' | 'Deviated' | ''
  _boreholeOrientationFromLE(leEl) {
    if (!leEl) return '';
    const posListEl = leEl.getElementsByTagNameNS(NS.gml, 'posList')[0];
    if (!posListEl) return '';
    const txt = posListEl.textContent.trim();
    if (!txt) return '';
    const dim = parseInt(leEl.getAttribute('srsDimension') || '3') || 3;
    const tokens = txt.split(/\s+/).map(Number);
    const nTuples = Math.floor(tokens.length / dim);
    if (nTuples < 2) return '';
    if (nTuples >= 3) return 'Deviated';
    // 2 tuples — compare horizontal (first two) coords
    const x1 = tokens[0], y1 = tokens[1];
    const x2 = tokens[dim], y2 = tokens[dim + 1];
    return (x1 === x2 && y1 === y2) ? 'Vertical' : 'Inclined';
  },

  // Walk from a LinearExtent element up to its Borehole ancestor.
  _bhFromLE(leEl) {
    let n = leEl;
    while (n && n.nodeType === 1) {
      if (n.localName === 'Borehole') return n;
      n = n.parentNode;
    }
    return null;
  },

  // Generalized walker: walk up from a LinearExtent to a named SF element.
  _sfFromLE(leEl, localName) {
    let n = leEl;
    while (n && n.nodeType === 1) {
      if (n.localName === localName) return n;
      n = n.parentNode;
    }
    return null;
  },

  // Sounding orientation — same as Borehole but returns '' for Deviated
  // (deviation is recorded in CPT results, not reported here).
  resolveSoundingOrientation(leEl) {
    const orient = FORMAT_FN._boreholeOrientationFromLE(leEl);
    if (!orient || orient === 'Deviated') return '';
    return orient;
  },

  // Sounding plunge — same logic as Borehole but walks to Sounding ancestor.
  // Returns '' if Deviated or Vertical.
  resolveSoundingPlunge(leEl) {
    const orient = FORMAT_FN._boreholeOrientationFromLE(leEl);
    if (orient !== 'Inclined') return '';
    const sfEl = FORMAT_FN._sfFromLE(leEl, 'Sounding') || FORMAT_FN._sfFromLE(leEl, 'Well');
    if (!sfEl) return '';
    const plungeEl = sfEl.getElementsByTagNameNS(NS.diggs, 'plunge')[0];
    if (!plungeEl) return '';
    const val = nodeText(plungeEl);
    if (!val) return '';
    const uom = plungeEl.getAttribute('uom') || '';
    return uom ? `${val}\u00a0${uom}` : val;
  },

  // Sounding bearing — same logic as Borehole but walks to Sounding ancestor.
  // Returns '' if Deviated or Vertical.
  resolveSoundingBearing(leEl) {
    const orient = FORMAT_FN._boreholeOrientationFromLE(leEl);
    if (orient !== 'Inclined') return '';
    const sfEl = FORMAT_FN._sfFromLE(leEl, 'Sounding') || FORMAT_FN._sfFromLE(leEl, 'Well');
    if (!sfEl) return '';
    const bearingEl = sfEl.getElementsByTagNameNS(NS.diggs, 'bearing')[0];
    if (!bearingEl) return '';
    const val = nodeText(bearingEl);
    if (!val) return '';
    const uom = bearingEl.getAttribute('uom') || '';
    return uom ? `${val}\u00a0${uom}` : val;
  },

  // Resolve PointLocation depth from a PointLocationPropertyType wrapper node.
  // Looks for child diggs:PointLocation, reads gml:pos first token, resolves UOM.
  resolvePointDepth(node) {
    if (!node) return '';
    const plEl = [...(node.childNodes || [])].find(n => n.nodeType === 1 && n.localName === 'PointLocation');
    if (!plEl) return '';
    const posEl = plEl.getElementsByTagNameNS(NS.gml, 'pos')[0];
    if (!posEl) return '';
    const val = posEl.textContent.trim().split(/\s+/)[0];
    if (!val || isNaN(Number(val))) return '';
    const srsName = plEl.getAttribute('srsName') || '';
    const uom = (srsName && LSR_UOM[srsName]) ? LSR_UOM[srsName] : '';
    return uom ? `${val}\u00a0${uom}` : val;
  },

  // Resolve a filterPackInterval property element to a depth range string.
  // Strategy 1: xlink:href → find referenced LinearExtent in document → read from/to.
  // Strategy 2: inline (deprecated) LinearExtent child → read from/to directly.
  // Falls back to '' (suppresses column) if neither resolves.
  resolveFilterPackInterval(propEl) {
    if (!propEl) return '';
    let leEl = null;
    // Strategy 1: href reference
    const href = (propEl.getAttributeNS(NS.xlink, 'href') || propEl.getAttribute('xlink:href') || '').replace(/^#/, '');
    if (href) {
      leEl = propEl.ownerDocument.querySelector(`[*|id="${href}"]`);
      // The referenced element may be a LinearExtent directly, or a backfillInterval
      // property wrapping one; unwrap if needed.
      if (leEl && leEl.localName !== 'LinearExtent') {
        leEl = leEl.getElementsByTagNameNS(NS.diggs, 'LinearExtent')[0] || null;
      }
    }
    // Strategy 2: inline deprecated LinearExtent child
    if (!leEl) {
      leEl = [...(propEl.childNodes || [])].find(n => n.nodeType === 1 && n.localName === 'LinearExtent') || null;
    }
    if (!leEl) return '';
    // Read the posList from/to
    const posListEl = leEl.getElementsByTagNameNS(NS.gml, 'posList')[0];
    if (!posListEl) return '';
    const dim = parseInt(leEl.getAttribute('srsDimension') || '3') || 3;
    const tokens = posListEl.textContent.trim().split(/\s+/).map(Number);
    if (tokens.length < dim * 2) return '';
    const from = tokens[dim - 1];
    const to   = tokens[dim * 2 - 1];
    const srsName = leEl.getAttribute('srsName') || '';
    const uom = (srsName && LSR_UOM[srsName]) ? LSR_UOM[srsName] : '';
    const fmt = (v) => isNaN(v) ? '—' : String(v);
    return uom ? `${fmt(from)}–${fmt(to)}\u00a0${uom}` : `${fmt(from)}–${fmt(to)}`;
  },

  // Render a calibration element nested inside equipment KV table
  renderCalibrationNested(node) {
    if (!node) return '';
    return renderNestedKV(node, CALIBRATION_FIELDS);
  },

  // Render an equipment property wrapper → used in KV table detail sections (not interval table)
  // node is a property element containing a child equipment element (any localName).
  renderEquipment(node) {
    if (!node) return '';
    const equipEl = [...(node.childNodes || [])].find(n => n.nodeType === 1);
    if (!equipEl) return '';
    const fields = equipmentFieldsFor(equipEl.localName);
    const key = _registerPopup(equipEl.localName, [{ els: [equipEl], fields }]);
    const nameEl = equipEl.getElementsByTagNameNS(NS.gml, 'name')[0];
    const label  = (nameEl ? nodeText(nameEl) : '') || equipEl.localName;
    const cls    = equipEl.localName;
    return `<span class="kv-equip-link" onclick="showDetailPopup('${escHtml(key)}')">${escHtml(label)} <span style="font-size:10px;opacity:.7">(${escHtml(cls)})</span></span>`;
  },
};

// ── resolvePropertyEl — GML object-property unwrapper ────────
// Finds the child object element (localName) inside a property wrapper.
// For types that allow xlink (BusinessAssociate, AssociatedFile), falls back
// to href resolution when no embedded child is present.
// All other property types always embed their child, so xlink never fires.
function resolvePropertyEl(propEl, localName) {
  if (!propEl) return null;
  const child = [...propEl.childNodes]
    .find(n => n.nodeType === 1 && n.localName === localName);
  if (child) return child;
  // xlink:href fallback — only meaningful for BA and AssociatedFile in practice
  const href = (propEl.getAttributeNS(NS.xlink, 'href')
    || propEl.getAttribute('xlink:href') || '').replace(/^#/, '');
  if (!href) return null;
  return propEl.ownerDocument.querySelector(`[*|id="${href}"]`) || null;
}

// ── renderNestedKV — wraps itemsToHtml output in a nested-table container ──
// Used by KV_FORMAT renderers that need to appear as a sub-table inside a cell.
function renderNestedKV(el, fields) {
  if (!el) return '';
  const html = itemsToHtml(renderFields(el, fields));
  return html ? `<div class="kv-nested">${html}</div>` : '';
}

// ══════════════════════════════════════════════════════════════
//  DETAIL POPUP — generic info-icon popup for interval table
//  complex columns (Equipment, Remarks, Roles, AssociatedFiles,
//  Specification, DrillPipe, CuttingTool, CasingAdvancement).
//
//  _detailPopupMap: key → { title, sections: [{ heading?, els, fields }] }
// ══════════════════════════════════════════════════════════════
const _detailPopupMap = new Map();
let   _detailPopupSeq = 0;

function _nextPopupKey() { return 'dp_' + (++_detailPopupSeq); }

// Register a popup entry; returns the key.
function _registerPopup(title, sections) {
  const key = _nextPopupKey();
  _detailPopupMap.set(key, { title, sections });
  return key;
}

function showDetailPopup(key) {
  const entry = _detailPopupMap.get(key);
  if (!entry) return;
  let html = '';
  for (const sec of entry.sections) {
    if (sec.heading) {
      html += `<div style="font-size:11px;font-weight:700;color:var(--text-muted);
        text-transform:uppercase;letter-spacing:.04em;margin:10px 0 4px;
        border-top:1px solid var(--border);padding-top:6px">${escHtml(sec.heading)}</div>`;
    }
    for (const el of sec.els) {
      const block = renderNestedKV(el, sec.fields);
      if (block) html += block;
    }
  }
  document.getElementById('detail-popup-title').textContent = entry.title;
  document.getElementById('detail-popup-content').innerHTML =
    html || '<div style="color:var(--text-muted);font-size:12px">No data found.</div>';
  document.getElementById('detail-popup').classList.add('open');
}

function hideDetailPopup() {
  document.getElementById('detail-popup').classList.remove('open');
}

// Close popup on overlay click
document.addEventListener('DOMContentLoaded', () => {
  const popup = document.getElementById('detail-popup');
  if (popup) popup.addEventListener('click', e => {
    if (e.target === popup) hideDetailPopup();
  });
});
