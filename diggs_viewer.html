          tbody += `<td class="mono">${esc(val)}${uom ? ' <span class="col-uom">'+esc(uom)+'</span>' : ''}</td>`;
        } else {
          tbody += `<td class="muted-dash">—</td>`;
        }
      }
      // Drive set blow counts
      const dsets = Array.from(po.getElementsByTagNameNS(NS.diggs, 'DriveSet'));
      // Sort by index
      dsets.sort((a, b) => {
        const ia = parseInt((a.getElementsByTagNameNS(NS.diggs,'index')[0]||{}).textContent||'0');
        const ib = parseInt((b.getElementsByTagNameNS(NS.diggs,'index')[0]||{}).textContent||'0');
        return ia - ib;
      });
      for (let i = 0; i < maxDriveSets; i++) {
        const ds = dsets[i];
        if (ds) {
          const bc  = (ds.getElementsByTagNameNS(NS.diggs,'blowCount')[0]  || {}).textContent || '';
          const pen = ds.getElementsByTagNameNS(NS.diggs,'penetration')[0];
          const penVal = pen ? pen.textContent.trim() : '';
          const penUom = pen ? (pen.getAttribute('uom') || '') : '';
          const tip = penVal ? ` (${penVal}${penUom ? ' '+penUom : ''})` : '';
          tbody += `<td class="mono" title="penetration${tip}">${esc(bc) || '—'}</td>`;
        } else {
          tbody += `<td class="muted-dash">—</td>`;
        }
      }
    } else if (isDPT) {
      // No procedure object resolved — fill blanks
      const blankCols = dptProcCols.length + maxDriveSets;
      for (let i = 0; i < blankCols; i++) tbody += `<td class="muted-dash">—</td>`;
    }

    // Result property values — align by column position (prop index in this row)
    // Build a quick lookup: propName → value from this row's data
    const rowData = (r.rowValues && r.rowValues[0]) || [];
    const localPropNames = r.props.map(p => p.name);
    const valByName = new Map();
    localPropNames.forEach((n, i) => valByName.set(n, (rowData[i] || '').trim()));

    for (const [colName] of resultCols) {
      const val = valByName.has(colName) ? valByName.get(colName) : '';
      tbody += val !== '' && val !== undefined
        ? `<td class="mono">${esc(val)}</td>`
        : `<td class="muted-dash">—</td>`;
    }

    tbody += '</tr>';
  }
  tbody += '</tbody>';

  return `<div style="overflow-x:auto;margin-top:6px">
    <table class="sub-table meas-table">${thead}${tbody}</table>
  </div>`;
}

/** Return the depth UOM for an array of rows/entries that each carry a srsName.
 *  Uses the first non-empty srsName found; falls back to ''. */
function depthUomForRows(rows) {
  for (const r of rows) {
    if (r.srsName && LSR_UOM[r.srsName]) return LSR_UOM[r.srsName];
  }
  return '';
}

// ══════════════════════════════════════════════════════════════
//  SHARED MONITOR SECTION BUILDER
//  Works for Boreholes, Soundings, and Wells alike.
//  Returns { html, drawFns } where drawFns is an array of
//  { secId, mon } objects to render plots after DOM insertion.
// ══════════════════════════════════════════════════════════════
// Returns an array of { procType, html, drawFns } — one entry per unique procType.
// Callers build one badge per entry, labelled with diggsLabel(procType).
function buildMonitorSections(featureId) {
  const monitors = DIGGS_WELL_DATA[featureId] || [];
  // Group monitors by procType, preserving insertion order.
  const byType = new Map(); // procType → { html, drawFns }
  const featureIdSafe = featureId.replace(/[^a-zA-Z0-9]/g,'_');

  monitors.forEach((mon, mi) => {
    if (!byType.has(mon.procType)) byType.set(mon.procType, { html: '', drawFns: [] });
    const entry  = byType.get(mon.procType);
    const secId  = `mon-${featureIdSafe}-${mi}`;
    const iconId = `icon-${secId}`;
    entry.html += `
  <div class="meas-section">
    <div class="meas-section-header" onclick="toggleMeasSec('${secId}')">
      <span class="toggle-icon" id="${iconId}">▸</span>
      ${esc(mon.procType)}
    </div>
    <div class="meas-section-body" id="${secId}" style="display:none">`;

    // Sensor metadata chips
    if (mon.sensors.length > 0) {
      entry.html += `<div class="meas-meta-row">`;
      for (const s of mon.sensors) {
        if (s.class) entry.html += `<span class="meas-meta-chip"><strong>Sensor:</strong> ${esc(s.class)}</span>`;
        if (s.id)    entry.html += `<span class="meas-meta-chip"><strong>ID:</strong> ${esc(s.id)}</span>`;
      }
      entry.html += `</div>`;
    }

    if (mon.times.length > 0 && mon.props.length > 0) {
      entry.html += `<div id="${secId}-plots" class="well-plots-area"></div>`;
      entry.drawFns.push({ secId, mon });
    } else {
      entry.html += `<div class="empty-state" style="padding:20px">No time-series data available.</div>`;
    }

    entry.html += `</div></div>`;
  });

  return [...byType.entries()].map(([procType, { html, drawFns }]) => ({ procType, html, drawFns }));
}

// After calling showDetail(html), call this to expand sections and draw plots.
function renderMonitorPlots(drawFns) {
  drawFns.forEach(({ secId, mon }) => {
    const body = document.getElementById(secId);
    const icon = document.getElementById(`icon-${secId}`);
    if (body) body.style.display = '';
    if (icon) icon.textContent = '▾';
    requestAnimationFrame(() => drawWellPlots(mon, `${secId}-plots`));
  });
}

function toggleMeasSec(id) {
  const body = document.getElementById(id);
  const arr  = document.getElementById('arr-' + id);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  if (arr) arr.textContent = open ? '▸' : '▾';
}

// ══════════════════════════════════════════════════════════════
//  PPD DISSIPATION TIME-SERIES PLOT
//  Interactive SVG u(t) plot with zoom/pan/tooltip,
//  matching the style of drawWellPlots.
// ══════════════════════════════════════════════════════════════
function drawPPDPlot(container, ts) {
  container.innerHTML = '';
  if (!ts || !ts.timeToks.length || !ts.trToks.length) {
    container.innerHTML = '<div style="color:var(--text-muted);padding:8px 0;font-size:12px">No time-series data</div>';
    return;
  }
  const n = Math.min(ts.timeToks.length, ts.trToks.length);
  if (n < 2) {
    container.innerHTML = '<div style="color:var(--text-muted);padding:8px 0;font-size:12px">Insufficient data points</div>';
    return;
  }

  const NS_SVG = 'http://www.w3.org/2000/svg';
  const COL    = '#58a6ff';
  const VW = 800, VH = 220;
  const PAD = { top: 20, bottom: 46, left: 66, right: 20 };
  const pW0 = VW - PAD.left - PAD.right;
  const pH  = VH - PAD.top  - PAD.bottom;

  const prop  = ts.trProps[0] || { name: 'u', uom: '' };
  const xUnit = ts.timeUnit || 's';

  const pts = [];
  for (let i = 0; i < n; i++) {
    const v = ts.trToks[i];
    if (!isNaN(v)) pts.push({ t: ts.timeToks[i], v });
  }
  if (!pts.length) return;

  const tMinFull = pts[0].t, tMaxFull = pts[pts.length - 1].t;
  const tRangeFull = tMaxFull - tMinFull || 1;
  const allV = pts.map(p => p.v);
  const vMinFull = Math.min(...allV), vMaxFull = Math.max(...allV);
  const vPadFull = (vMaxFull - vMinFull) * 0.08 || Math.abs(vMinFull) * 0.05 || 0.5;

  let view = {
    tMin: tMinFull, tMax: tMaxFull,
    vMin: vMinFull - vPadFull, vMax: vMaxFull + vPadFull
  };

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'margin-bottom:14px; position:relative;';

  const toolbar = document.createElement('div');
  toolbar.style.cssText = 'display:flex; align-items:center; gap:6px; padding:2px 4px 4px ' + (PAD.left*(100/VW)) + '%; font-size:11px; font-family:monospace; color:#8b949e;';

  function mkBtn(label, title) {
    const b = document.createElement('button');
    b.textContent = label; b.title = title;
    b.style.cssText = 'background:#21262d; border:1px solid #30363d; border-radius:4px; color:#c9d1d9; cursor:pointer; padding:1px 7px; font-size:11px; line-height:1.6;';
    b.onmouseenter = () => b.style.background = '#30363d';
    b.onmouseleave = () => b.style.background = '#21262d';
    return b;
  }
  const btnReset   = mkBtn('\u229e Reset', 'Reset zoom');
  const btnZoomIn  = mkBtn('\uff0b', 'Zoom in');
  const btnZoomOut = mkBtn('\uff0d', 'Zoom out');
  const infoSpan   = document.createElement('span');
  infoSpan.style.cssText = 'margin-left:4px; color:#484f58; user-select:none;';
  infoSpan.textContent = 'n=' + pts.length;
  toolbar.append(btnReset, btnZoomIn, btnZoomOut, infoSpan);
  wrapper.appendChild(toolbar);

  const svg = document.createElementNS(NS_SVG, 'svg');
  svg.setAttribute('viewBox', '0 0 ' + VW + ' ' + VH);
  svg.setAttribute('width',  '100%');
  svg.setAttribute('height', VH);
  svg.setAttribute('preserveAspectRatio', 'none');
  svg.style.cssText = 'display:block; cursor:crosshair; user-select:none;';

  const clipId = 'ppd-clip-' + Math.random().toString(36).slice(2);
  const defs = document.createElementNS(NS_SVG, 'defs');
  const cp   = document.createElementNS(NS_SVG, 'clipPath');
  cp.setAttribute('id', clipId);
  const cr = document.createElementNS(NS_SVG, 'rect');
  cr.setAttribute('x', PAD.left); cr.setAttribute('y', PAD.top);
  cr.setAttribute('width', pW0);  cr.setAttribute('height', pH);
  cp.appendChild(cr); defs.appendChild(cp); svg.appendChild(defs);

  function mkRect(x,y,w,h,fill) {
    const r = document.createElementNS(NS_SVG,'rect');
    r.setAttribute('x',x); r.setAttribute('y',y);
    r.setAttribute('width',w); r.setAttribute('height',h);
    r.setAttribute('fill',fill); return r;
  }
  svg.appendChild(mkRect(0, 0, VW, VH, '#0d1117'));
  svg.appendChild(mkRect(PAD.left, PAD.top, pW0, pH, '#161b22'));

  const gridG = document.createElementNS(NS_SVG, 'g');
  const axisG = document.createElementNS(NS_SVG, 'g');
  svg.appendChild(gridG);
  svg.appendChild(axisG);

  const border = document.createElementNS(NS_SVG, 'rect');
  border.setAttribute('x',PAD.left); border.setAttribute('y',PAD.top);
  border.setAttribute('width',pW0);  border.setAttribute('height',pH);
  border.setAttribute('fill','none'); border.setAttribute('stroke','#30363d');
  svg.appendChild(border);

  const xLblEl = document.createElementNS(NS_SVG, 'text');
  xLblEl.setAttribute('x', PAD.left + pW0/2);
  xLblEl.setAttribute('y', VH - 4);
  xLblEl.setAttribute('text-anchor', 'middle');
  xLblEl.setAttribute('font-size', '11');
  xLblEl.setAttribute('fill', '#8b949e');
  xLblEl.setAttribute('font-family', 'sans-serif');
  xLblEl.textContent = 'Time (' + xUnit + ')';
  svg.appendChild(xLblEl);

  const yLblEl = document.createElementNS(NS_SVG, 'text');
  yLblEl.setAttribute('transform', 'rotate(-90) translate(' + (-(PAD.top + pH/2)) + ', 13)');
  yLblEl.setAttribute('text-anchor', 'middle');
  yLblEl.setAttribute('font-size', '10');
  yLblEl.setAttribute('fill', COL);
  yLblEl.setAttribute('font-family', 'sans-serif');
  yLblEl.textContent = prop.name + (prop.uom ? ' (' + prop.uom + ')' : '');
  svg.appendChild(yLblEl);

  const polyline = document.createElementNS(NS_SVG, 'polyline');
  polyline.setAttribute('fill', 'none');
  polyline.setAttribute('stroke', COL);
  polyline.setAttribute('stroke-width', '1.5');
  polyline.setAttribute('stroke-linejoin', 'round');
  polyline.setAttribute('stroke-linecap', 'round');
  polyline.setAttribute('clip-path', 'url(#' + clipId + ')');
  svg.appendChild(polyline);

  const hLine = document.createElementNS(NS_SVG, 'line');
  hLine.setAttribute('stroke','#484f58'); hLine.setAttribute('stroke-width','1');
  hLine.setAttribute('stroke-dasharray','3,3'); hLine.setAttribute('visibility','hidden');
  svg.appendChild(hLine);
  const vLine = document.createElementNS(NS_SVG, 'line');
  vLine.setAttribute('stroke','#484f58'); vLine.setAttribute('stroke-width','1');
  vLine.setAttribute('stroke-dasharray','3,3'); vLine.setAttribute('visibility','hidden');
  svg.appendChild(vLine);
  const dot = document.createElementNS(NS_SVG, 'circle');
  dot.setAttribute('r','4'); dot.setAttribute('fill', COL);
  dot.setAttribute('stroke','#fff'); dot.setAttribute('stroke-width','1.5');
  dot.setAttribute('visibility','hidden');
  svg.appendChild(dot);
  const ttg  = document.createElementNS(NS_SVG, 'g');
  ttg.setAttribute('visibility','hidden');
  const ttbg = document.createElementNS(NS_SVG, 'rect');
  ttbg.setAttribute('rx','4'); ttbg.setAttribute('fill','#21262d');
  ttbg.setAttribute('stroke','#30363d'); ttbg.setAttribute('stroke-width','1');
  const ttt1 = document.createElementNS(NS_SVG, 'text');
  ttt1.setAttribute('font-size','10'); ttt1.setAttribute('fill','#e6edf3');
  ttt1.setAttribute('font-family','monospace');
  const ttt2 = document.createElementNS(NS_SVG, 'text');
  ttt2.setAttribute('font-size','10'); ttt2.setAttribute('fill', COL);
  ttt2.setAttribute('font-family','monospace');
  ttg.appendChild(ttbg); ttg.appendChild(ttt1); ttg.appendChild(ttt2);
  svg.appendChild(ttg);

  const overlay = document.createElementNS(NS_SVG, 'rect');
  overlay.setAttribute('x', PAD.left); overlay.setAttribute('y', PAD.top);
  overlay.setAttribute('width', pW0);  overlay.setAttribute('height', pH);
  overlay.setAttribute('fill', 'transparent');
  svg.appendChild(overlay);

  wrapper.appendChild(svg);
  container.appendChild(wrapper);

  if (ts.irVal !== null) {
    const chip = document.createElement('div');
    chip.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;padding-left:4px;';
    chip.innerHTML = 'Estimated Ir: <strong style="color:#c9d1d9">' + ts.irVal + '</strong>' + (ts.irUom ? ' ' + ts.irUom : '');
    container.appendChild(chip);
  }

  function toX(t) { return PAD.left + ((t - view.tMin) / (view.tMax - view.tMin)) * pW0; }
  function toY(v) { return PAD.top  + ((view.vMax - v) / (view.vMax - view.vMin)) * pH; }
  function xToT(px) { return view.tMin + ((px - PAD.left) / pW0) * (view.tMax - view.tMin); }

  function fmtT(t) {
    const span = view.tMax - view.tMin;
    if (span < 10)  return t.toFixed(2) + ' ' + xUnit;
    if (span < 600) return t.toFixed(1) + ' ' + xUnit;
    return Math.round(t) + ' ' + xUnit;
  }

  function redraw() {
    while (gridG.firstChild) gridG.removeChild(gridG.firstChild);
    while (axisG.firstChild) axisG.removeChild(axisG.firstChild);
    const vSpan = view.vMax - view.vMin;
    const tSpan = view.tMax - view.tMin;
    const ySteps = 5;
    for (let i = 0; i <= ySteps; i++) {
      const frac = i / ySteps;
      const yVal = view.vMax - frac * vSpan;
      const yPx  = PAD.top + frac * pH;
      const gl = document.createElementNS(NS_SVG, 'line');
      gl.setAttribute('x1', PAD.left); gl.setAttribute('x2', PAD.left + pW0);
      gl.setAttribute('y1', yPx); gl.setAttribute('y2', yPx);
      gl.setAttribute('stroke', '#21262d'); gl.setAttribute('stroke-width', '1');
      gridG.appendChild(gl);
      const lbl = document.createElementNS(NS_SVG, 'text');
      lbl.setAttribute('x', PAD.left - 5); lbl.setAttribute('y', yPx + 4);
      lbl.setAttribute('text-anchor', 'end'); lbl.setAttribute('font-size', '10');
      lbl.setAttribute('fill', '#8b949e'); lbl.setAttribute('font-family', 'monospace');
      lbl.textContent = Number(yVal.toPrecision(5)).toString();
      axisG.appendChild(lbl);
    }
    const xSteps = 5;
    for (let i = 0; i <= xSteps; i++) {
      const frac = i / xSteps;
      const tVal = view.tMin + frac * tSpan;
      const xPx  = PAD.left + frac * pW0;
      const gl = document.createElementNS(NS_SVG, 'line');
      gl.setAttribute('x1', xPx); gl.setAttribute('x2', xPx);
      gl.setAttribute('y1', PAD.top); gl.setAttribute('y2', PAD.top + pH);
      gl.setAttribute('stroke', '#21262d'); gl.setAttribute('stroke-width', '1');
      gridG.appendChild(gl);
      const lbl = document.createElementNS(NS_SVG, 'text');
      lbl.setAttribute('x', xPx);
      lbl.setAttribute('y', VH - PAD.bottom + 14);
      lbl.setAttribute('text-anchor', i===0?'start':i===xSteps?'end':'middle');
      lbl.setAttribute('font-size', '10'); lbl.setAttribute('fill', '#8b949e');
      lbl.setAttribute('font-family', 'monospace');
      lbl.textContent = fmtT(tVal);
      axisG.appendChild(lbl);
      const tk = document.createElementNS(NS_SVG, 'line');
      tk.setAttribute('x1', xPx); tk.setAttribute('x2', xPx);
      tk.setAttribute('y1', PAD.top + pH); tk.setAttribute('y2', PAD.top + pH + 4);
      tk.setAttribute('stroke', '#484f58'); tk.setAttribute('stroke-width', '1');
      axisG.appendChild(tk);
    }
    const visPts = pts.filter(p => p.t >= view.tMin - tSpan*0.01 && p.t <= view.tMax + tSpan*0.01);
    polyline.setAttribute('points', visPts.map(p => toX(p.t).toFixed(2) + ',' + toY(p.v).toFixed(2)).join(' '));
  }

  function refitY() {
    const vis = pts.filter(p => p.t >= view.tMin && p.t <= view.tMax);
    if (!vis.length) return;
    const lo = Math.min(...vis.map(p => p.v));
    const hi = Math.max(...vis.map(p => p.v));
    const pad = (hi - lo) * 0.08 || Math.abs(lo) * 0.05 || 0.5;
    view.vMin = lo - pad; view.vMax = hi + pad;
  }

  function zoomAround(pivotFrac, factor) {
    const tSpan  = view.tMax - view.tMin;
    const pivotT = view.tMin + pivotFrac * tSpan;
    let newSpan  = Math.max(tSpan * factor, tRangeFull * 0.001);
    newSpan      = Math.min(newSpan, tRangeFull * 1.001);
    let newMin   = pivotT - pivotFrac * newSpan;
    view.tMin    = Math.max(tMinFull, newMin);
    view.tMax    = Math.min(tMaxFull, view.tMin + newSpan);
    if (view.tMax - view.tMin < newSpan * 0.99) view.tMin = Math.max(tMinFull, view.tMax - newSpan);
    refitY(); redraw();
  }

  redraw();

  btnReset.addEventListener('click', () => {
    view = { tMin: tMinFull, tMax: tMaxFull, vMin: vMinFull - vPadFull, vMax: vMaxFull + vPadFull };
    redraw();
  });
  btnZoomIn.addEventListener('click',  () => zoomAround(0.5, 0.5));
  btnZoomOut.addEventListener('click', () => zoomAround(0.5, 2.0));

  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const lx   = (e.clientX - rect.left) * (VW / rect.width);
    zoomAround(Math.max(0, Math.min(1, (lx - PAD.left) / pW0)), e.deltaY > 0 ? 1.35 : 1/1.35);
  }, { passive: false });

  let drag = null;
  overlay.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    drag = { startX: (e.clientX - rect.left) * (VW / rect.width), tMinAtStart: view.tMin };
    overlay.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', (e) => {
    if (!drag) return;
    const rect = svg.getBoundingClientRect();
    const dx   = (e.clientX - rect.left) * (VW / rect.width) - drag.startX;
    const dt   = -(dx / pW0) * (view.tMax - view.tMin);
    const span = view.tMax - view.tMin;
    let newMin = drag.tMinAtStart + dt;
    let newMax = newMin + span;
    if (newMin < tMinFull) { newMin = tMinFull; newMax = tMinFull + span; }
    if (newMax > tMaxFull) { newMax = tMaxFull; newMin = tMaxFull - span; }
    view.tMin = newMin; view.tMax = newMax;
    refitY(); redraw();
  });
  window.addEventListener('mouseup', () => {
    if (drag) { drag = null; overlay.style.cursor = 'crosshair'; }
  });

  overlay.addEventListener('mousemove', (e) => {
    if (drag) return;
    const rect  = svg.getBoundingClientRect();
    const mx    = (e.clientX - rect.left) * (VW / rect.width);
    const curT  = xToT(mx);
    let lo = 0, hi = pts.length - 1;
    while (lo < hi) { const mid = (lo + hi) >> 1; if (pts[mid].t < curT) lo = mid + 1; else hi = mid; }
    const cands = [pts[Math.max(0, lo-1)], pts[lo]].filter(Boolean);
    const best  = cands.reduce((a,b) => Math.abs(a.t - curT) < Math.abs(b.t - curT) ? a : b);
    if (!best) return;
    const bx = toX(best.t), by = toY(best.v);
    hLine.setAttribute('x1',PAD.left); hLine.setAttribute('x2',PAD.left+pW0);
    hLine.setAttribute('y1',by); hLine.setAttribute('y2',by); hLine.setAttribute('visibility','visible');
    vLine.setAttribute('x1',bx); vLine.setAttribute('x2',bx);
    vLine.setAttribute('y1',PAD.top); vLine.setAttribute('y2',PAD.top+pH); vLine.setAttribute('visibility','visible');
    dot.setAttribute('cx',bx); dot.setAttribute('cy',by); dot.setAttribute('visibility','visible');
    const timeStr = fmtT(best.t);
    const valStr  = Number(best.v.toPrecision(6)).toString() + (prop.uom ? ' ' + prop.uom : '');
    ttt1.textContent = timeStr; ttt2.textContent = valStr;
    const tw = Math.max(ttt1.getComputedTextLength ? ttt1.getComputedTextLength() : 100,
                        ttt2.getComputedTextLength ? ttt2.getComputedTextLength() : 80, 100);
    const th=34, tp=5;
    let tx=bx+8, ty=by-th-4;
    if (tx+tw+tp*2 > VW-4) tx=bx-tw-tp*2-8;
    if (ty < PAD.top) ty=by+8;
    ttbg.setAttribute('x',tx); ttbg.setAttribute('y',ty);
    ttbg.setAttribute('width',tw+tp*2); ttbg.setAttribute('height',th);
    ttt1.setAttribute('x',tx+tp); ttt1.setAttribute('y',ty+13);
    ttt2.setAttribute('x',tx+tp); ttt2.setAttribute('y',ty+27);
    ttg.setAttribute('visibility','visible');
  });
  overlay.addEventListener('mouseleave', () => {
    hLine.setAttribute('visibility','hidden'); vLine.setAttribute('visibility','hidden');
    dot.setAttribute('visibility','hidden');   ttg.setAttribute('visibility','hidden');
  });
}

// ══════════════════════════════════════════════════════════════
//  WELL SVG TIME-SERIES PLOTS
// ══════════════════════════════════════════════════════════════
function drawWellPlots(mon, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  const { times, props, rows } = mon;
  if (!times.length || !props.length || !rows.length) return;

  const NS_SVG = 'http://www.w3.org/2000/svg';
  const COLORS = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#f78166','#79c0ff','#56d364'];

  const VW = 800, VH = 220;
  const PAD = { top: 20, bottom: 46, left: 66, right: 20 };
  const pW0 = VW - PAD.left - PAD.right;
  const pH  = VH - PAD.top - PAD.bottom;

  const dates = times.map(t => new Date(t));
  const tMinFull = dates[0].getTime();
  const tMaxFull = dates[dates.length - 1].getTime();
  const tRangeFull = tMaxFull - tMinFull || 1;

  function fmtTime(d, spanMs) {
    const spanDays = spanMs / 86400000;
    if (spanDays <= 1)   return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if (spanDays <= 90)  return (d.getMonth()+1)+'/'+d.getDate();
    if (spanDays <= 730) return (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2);
    return d.getFullYear()+'/'+(d.getMonth()+1);
  }

  props.forEach((prop, pi) => {
    const colIdx = pi;
    const isDepth = /depth/i.test(prop.name);
    const col = COLORS[pi % COLORS.length];

    const pts = [];
    for (let i = 0; i < rows.length && i < dates.length; i++) {
      const v = rows[i][colIdx];
      if (v !== null && v !== undefined && !isNaN(v)) pts.push({ t: dates[i], v });
    }
    if (!pts.length) return;

    const allVals = pts.map(p => p.v);
    const vMinFull = Math.min(...allVals);
    const vMaxFull = Math.max(...allVals);
    const vPadFull = (vMaxFull - vMinFull) * 0.08 || Math.abs(vMinFull) * 0.05 || 0.5;

    let view = {
      tMin: tMinFull, tMax: tMaxFull,
      vMin: vMinFull - vPadFull, vMax: vMaxFull + vPadFull
    };

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'margin-bottom:14px; position:relative;';

    const toolbar = document.createElement('div');
    toolbar.style.cssText = `display:flex; align-items:center; gap:6px; padding:2px 4px 4px ${PAD.left * (100/VW)}%;
      font-size:11px; font-family:monospace; color:#8b949e;`;

    function mkBtn(label, title) {
      const b = document.createElement('button');
      b.textContent = label; b.title = title;
      b.style.cssText = `background:#21262d; border:1px solid #30363d; border-radius:4px;
        color:#c9d1d9; cursor:pointer; padding:1px 7px; font-size:11px; line-height:1.6;`;
      b.onmouseenter = () => b.style.background = '#30363d';
      b.onmouseleave = () => b.style.background = '#21262d';
      return b;
    }
    const btnReset  = mkBtn('\u229e Reset', 'Reset zoom to full extent');
    const btnZoomIn = mkBtn('\uff0b', 'Zoom in (or scroll wheel)');
    const btnZoomOut= mkBtn('\uff0d', 'Zoom out (or scroll wheel)');
    const infoSpan  = document.createElement('span');
    infoSpan.style.cssText = 'margin-left:4px; color:#484f58; user-select:none;';
    infoSpan.textContent = `n=${pts.length}`;
    toolbar.append(btnReset, btnZoomIn, btnZoomOut, infoSpan);
    wrapper.appendChild(toolbar);

    const svg = document.createElementNS(NS_SVG, 'svg');
    svg.setAttribute('class', 'well-plot-svg');
    svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
    svg.setAttribute('height', VH);
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.style.cssText = 'cursor:crosshair; user-select:none;';

    const clipId = `wclip-${containerId}-${pi}`.replace(/[^a-zA-Z0-9_-]/g,'_');
    const defs = document.createElementNS(NS_SVG, 'defs');
    const cp   = document.createElementNS(NS_SVG, 'clipPath');
    cp.setAttribute('id', clipId);
    const cr   = document.createElementNS(NS_SVG, 'rect');
    cr.setAttribute('x', PAD.left); cr.setAttribute('y', PAD.top);
    cr.setAttribute('width', pW0);  cr.setAttribute('height', pH);
    cp.appendChild(cr); defs.appendChild(cp); svg.appendChild(defs);

    const bg = document.createElementNS(NS_SVG, 'rect');
    bg.setAttribute('width', VW); bg.setAttribute('height', VH);
    bg.setAttribute('fill', '#0d1117');
    svg.appendChild(bg);

    const plotBg = document.createElementNS(NS_SVG, 'rect');
    plotBg.setAttribute('x', PAD.left); plotBg.setAttribute('y', PAD.top);
    plotBg.setAttribute('width', pW0); plotBg.setAttribute('height', pH);
    plotBg.setAttribute('fill', '#161b22');
    svg.appendChild(plotBg);

    const gridG  = document.createElementNS(NS_SVG, 'g');
    const axisG  = document.createElementNS(NS_SVG, 'g');
    svg.appendChild(gridG);
    svg.appendChild(axisG);

    const border = document.createElementNS(NS_SVG, 'rect');
    border.setAttribute('x', PAD.left); border.setAttribute('y', PAD.top);
    border.setAttribute('width', pW0); border.setAttribute('height', pH);
    border.setAttribute('fill', 'none'); border.setAttribute('stroke', '#30363d');
    svg.appendChild(border);

    const polyline = document.createElementNS(NS_SVG, 'polyline');
    polyline.setAttribute('fill', 'none');
    polyline.setAttribute('stroke', col);
    polyline.setAttribute('stroke-width', '1.5');
    polyline.setAttribute('stroke-linejoin', 'round');
    polyline.setAttribute('stroke-linecap', 'round');
    polyline.setAttribute('clip-path', `url(#${clipId})`);
    svg.appendChild(polyline);

    const yLabel = document.createElementNS(NS_SVG, 'text');
    yLabel.setAttribute('transform', `rotate(-90) translate(${-(PAD.top + pH/2)}, 13)`);
    yLabel.setAttribute('text-anchor', 'middle');
    yLabel.setAttribute('font-size', '10');
    yLabel.setAttribute('fill', col);
    yLabel.setAttribute('font-family', 'sans-serif');
    yLabel.textContent = prop.name + (prop.uom ? ` (${prop.uom})` : '');
    svg.appendChild(yLabel);

    const titleText = document.createElementNS(NS_SVG, 'text');
    titleText.setAttribute('x', PAD.left + pW0/2); titleText.setAttribute('y', 14);
    titleText.setAttribute('text-anchor', 'middle');
    titleText.setAttribute('font-size', '11');
    titleText.setAttribute('font-weight', 'bold');
    titleText.setAttribute('fill', col);
    titleText.setAttribute('font-family', 'sans-serif');
    titleText.textContent = `${prop.name}${prop.uom ? ' ('+prop.uom+')' : ''}  n=${pts.length}`;
    svg.appendChild(titleText);

    const hLine = document.createElementNS(NS_SVG, 'line');
    hLine.setAttribute('stroke','#484f58'); hLine.setAttribute('stroke-width','1');
    hLine.setAttribute('stroke-dasharray','3,3'); hLine.setAttribute('visibility','hidden');
    svg.appendChild(hLine);
    const vLine = document.createElementNS(NS_SVG, 'line');
    vLine.setAttribute('stroke','#484f58'); vLine.setAttribute('stroke-width','1');
    vLine.setAttribute('stroke-dasharray','3,3'); vLine.setAttribute('visibility','hidden');
    svg.appendChild(vLine);
    const dot = document.createElementNS(NS_SVG, 'circle');
    dot.setAttribute('r','4'); dot.setAttribute('fill', col);
    dot.setAttribute('stroke','#fff'); dot.setAttribute('stroke-width','1.5');
    dot.setAttribute('visibility','hidden');
    svg.appendChild(dot);
    const ttg  = document.createElementNS(NS_SVG, 'g');
    ttg.setAttribute('visibility','hidden');
    const ttbg = document.createElementNS(NS_SVG, 'rect');
    ttbg.setAttribute('rx','4'); ttbg.setAttribute('fill','#21262d');
    ttbg.setAttribute('stroke','#30363d'); ttbg.setAttribute('stroke-width','1');
    const ttt1 = document.createElementNS(NS_SVG, 'text');
    ttt1.setAttribute('font-size','10'); ttt1.setAttribute('fill','#e6edf3');
    ttt1.setAttribute('font-family','monospace');
    const ttt2 = document.createElementNS(NS_SVG, 'text');
    ttt2.setAttribute('font-size','10'); ttt2.setAttribute('fill', col);
    ttt2.setAttribute('font-family','monospace');
    ttg.appendChild(ttbg); ttg.appendChild(ttt1); ttg.appendChild(ttt2);
    svg.appendChild(ttg);

    const overlay = document.createElementNS(NS_SVG, 'rect');
    overlay.setAttribute('x', PAD.left); overlay.setAttribute('y', PAD.top);
    overlay.setAttribute('width', pW0); overlay.setAttribute('height', pH);
    overlay.setAttribute('fill', 'transparent');
    svg.appendChild(overlay);

    wrapper.appendChild(svg);
    container.appendChild(wrapper);

    function toX(d) { return PAD.left + ((d.getTime() - view.tMin) / (view.tMax - view.tMin)) * pW0; }
    function toY(v) {
      const frac = (v - view.vMin) / (view.vMax - view.vMin);
      return isDepth ? PAD.top + frac * pH : PAD.top + (1 - frac) * pH;
    }
    function xToT(px) { return view.tMin + ((px - PAD.left) / pW0) * (view.tMax - view.tMin); }

    function redraw() {
      const tSpan = view.tMax - view.tMin;
      const vSpan = view.vMax - view.vMin;
      while (gridG.firstChild) gridG.removeChild(gridG.firstChild);
      while (axisG.firstChild) axisG.removeChild(axisG.firstChild);
      const yTicks = 5;
      for (let i = 0; i <= yTicks; i++) {
        const frac = i / yTicks;
        const yVal = isDepth ? (view.vMin + frac * vSpan) : (view.vMax - frac * vSpan);
        const yPx  = PAD.top + frac * pH;
        const gl = document.createElementNS(NS_SVG, 'line');
        gl.setAttribute('x1', PAD.left); gl.setAttribute('x2', PAD.left + pW0);
        gl.setAttribute('y1', yPx); gl.setAttribute('y2', yPx);
        gl.setAttribute('stroke', '#21262d'); gl.setAttribute('stroke-width', '1');
        gridG.appendChild(gl);
        const lbl = document.createElementNS(NS_SVG, 'text');
        lbl.setAttribute('x', PAD.left - 5); lbl.setAttribute('y', yPx + 4);
        lbl.setAttribute('text-anchor', 'end'); lbl.setAttribute('font-size', '10');
        lbl.setAttribute('fill', '#8b949e'); lbl.setAttribute('font-family', 'monospace');
        lbl.textContent = Number(yVal.toPrecision(5)).toString();
        axisG.appendChild(lbl);
      }
      const xTicks = 5;
      for (let i = 0; i <= xTicks; i++) {
        const frac = i / xTicks;
        const tVal = new Date(view.tMin + frac * tSpan);
        const xPx  = PAD.left + frac * pW0;
        const gl = document.createElementNS(NS_SVG, 'line');
        gl.setAttribute('x1', xPx); gl.setAttribute('x2', xPx);
        gl.setAttribute('y1', PAD.top); gl.setAttribute('y2', PAD.top + pH);
        gl.setAttribute('stroke', '#21262d'); gl.setAttribute('stroke-width', '1');
        gridG.appendChild(gl);
        const lbl = document.createElementNS(NS_SVG, 'text');
        lbl.setAttribute('x', xPx); lbl.setAttribute('y', VH - PAD.bottom + 14);
        lbl.setAttribute('text-anchor', i===0?'start':i===xTicks?'end':'middle');
        lbl.setAttribute('font-size', '10'); lbl.setAttribute('fill', '#8b949e');
        lbl.setAttribute('font-family', 'monospace');
        lbl.textContent = fmtTime(tVal, tSpan);
        axisG.appendChild(lbl);
        const tk = document.createElementNS(NS_SVG, 'line');
        tk.setAttribute('x1', xPx); tk.setAttribute('x2', xPx);
        tk.setAttribute('y1', PAD.top + pH); tk.setAttribute('y2', PAD.top + pH + 4);
        tk.setAttribute('stroke', '#484f58'); tk.setAttribute('stroke-width', '1');
        axisG.appendChild(tk);
      }
      const visPoints = pts.filter(p => p.t.getTime() >= view.tMin - tSpan*0.01 &&
                                        p.t.getTime() <= view.tMax + tSpan*0.01);
      polyline.setAttribute('points',
        visPoints.map(p => `${toX(p.t).toFixed(2)},${toY(p.v).toFixed(2)}`).join(' '));
    }

    redraw();

    function zoomAround(pivotFrac, factor) {
      const tSpan  = view.tMax - view.tMin;
      const pivotT = view.tMin + pivotFrac * tSpan;
      let newSpan  = Math.max(tSpan * factor, 60000);
      newSpan      = Math.min(newSpan, tRangeFull * 1.001);
      const newMin = Math.max(tMinFull, pivotT - pivotFrac * newSpan);
      view.tMin = Math.max(tMinFull, newMin);
      view.tMax = Math.min(tMaxFull, view.tMin + newSpan);
      refitY(); redraw();
    }

    function refitY() {
      const vis = pts.filter(p => p.t.getTime() >= view.tMin && p.t.getTime() <= view.tMax);
      if (!vis.length) return;
      const lo = Math.min(...vis.map(p => p.v));
      const hi = Math.max(...vis.map(p => p.v));
      const pad = (hi - lo) * 0.08 || Math.abs(lo) * 0.05 || 0.5;
      view.vMin = lo - pad; view.vMax = hi + pad;
    }

    btnReset.addEventListener('click', () => {
      view = { tMin: tMinFull, tMax: tMaxFull, vMin: vMinFull - vPadFull, vMax: vMaxFull + vPadFull };
      redraw();
    });
    btnZoomIn.addEventListener('click',  () => zoomAround(0.5, 0.5));
    btnZoomOut.addEventListener('click', () => zoomAround(0.5, 2.0));

    svg.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const scale = VW / rect.width;
      const lx    = (e.clientX - rect.left) * scale;
      const pFrac = Math.max(0, Math.min(1, (lx - PAD.left) / pW0));
      zoomAround(pFrac, e.deltaY > 0 ? 1.35 : 1/1.35);
    }, { passive: false });

    let drag = null;
    overlay.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const scale = VW / rect.width;
      drag = { startX: (e.clientX - rect.left) * scale, tMinAtStart: view.tMin };
      overlay.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
      if (!drag) return;
      const rect = svg.getBoundingClientRect();
      const scale = VW / rect.width;
      const dx = (e.clientX - rect.left) * scale - drag.startX;
      const dtMs = -(dx / pW0) * (view.tMax - view.tMin);
      const span = view.tMax - view.tMin;
      let newMin = drag.tMinAtStart + dtMs;
      let newMax = newMin + span;
      if (newMin < tMinFull) { newMin = tMinFull; newMax = tMinFull + span; }
      if (newMax > tMaxFull) { newMax = tMaxFull; newMin = tMaxFull - span; }
      view.tMin = newMin; view.tMax = newMax;
      refitY(); redraw();
    });
    window.addEventListener('mouseup', () => {
      if (drag) { drag = null; overlay.style.cursor = 'crosshair'; }
    });

    overlay.addEventListener('mousemove', (e) => {
      if (drag) return;
      const rect = svg.getBoundingClientRect();
      const scale = VW / rect.width;
      const mx = (e.clientX - rect.left) * scale;
      const curT = xToT(mx);
      let lo = 0, hi = pts.length - 1;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (pts[mid].t.getTime() < curT) lo = mid + 1; else hi = mid;
      }
      const candidates = [pts[Math.max(0,lo-1)], pts[lo]].filter(Boolean);
      const best = candidates.reduce((a,b) =>
        Math.abs(a.t.getTime()-curT) < Math.abs(b.t.getTime()-curT) ? a : b);
      if (!best) return;
      const bx = toX(best.t), by = toY(best.v);
      hLine.setAttribute('x1',PAD.left); hLine.setAttribute('x2',PAD.left+pW0);
      hLine.setAttribute('y1',by); hLine.setAttribute('y2',by);
      hLine.setAttribute('visibility','visible');
      vLine.setAttribute('x1',bx); vLine.setAttribute('x2',bx);
      vLine.setAttribute('y1',PAD.top); vLine.setAttribute('y2',PAD.top+pH);
      vLine.setAttribute('visibility','visible');
      dot.setAttribute('cx',bx); dot.setAttribute('cy',by);
      dot.setAttribute('visibility','visible');
      const dateStr = best.t.toLocaleString([],{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      const valStr  = Number(best.v.toPrecision(6)).toString()+(prop.uom?' '+prop.uom:'');
      ttt1.textContent = dateStr; ttt2.textContent = valStr;
      const tw = Math.max(ttt1.getComputedTextLength?.()??120, ttt2.getComputedTextLength?.()??80, 120);
      const th=34, tp=5;
      let tx=bx+8, ty=by-th-4;
      if (tx+tw+tp*2 > VW-4) tx=bx-tw-tp*2-8;
      if (ty < PAD.top) ty=by+8;
      ttbg.setAttribute('x',tx); ttbg.setAttribute('y',ty);
      ttbg.setAttribute('width',tw+tp*2); ttbg.setAttribute('height',th);
      ttt1.setAttribute('x',tx+tp); ttt1.setAttribute('y',ty+13);
      ttt2.setAttribute('x',tx+tp); ttt2.setAttribute('y',ty+27);
      ttg.setAttribute('visibility','visible');
    });
    overlay.addEventListener('mouseleave', () => {
      hLine.setAttribute('visibility','hidden');
      vLine.setAttribute('visibility','hidden');
      dot.setAttribute('visibility','hidden');
      ttg.setAttribute('visibility','hidden');
    });
  });
}
// ══════════════════════════════════════════════════════════════
//  CPT CANVAS PLOTS
// ══════════════════════════════════════════════════════════════
function drawCPTPlots(data, areaEl) {
  const area = areaEl || document.getElementById('cpt-canvas-area');
  if (!area) return;
  area.innerHTML = '';

  const depths   = data.depths;
  const dMinFull = Math.min(...depths);
  const dMaxFull = Math.max(...depths);
  const dRangeFull = dMaxFull - dMinFull || 1;
  const depthUom = data.depthUom || '';

  const COLORS  = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#f78166','#79c0ff','#56d364'];
  const NS_SVG  = 'http://www.w3.org/2000/svg';

  // SVG coordinate space — VW=200 matches the CSS wrapper width exactly,
  // so viewBox aspect ratio == display ratio → no text distortion, 420px tall.
  const VW = 200, VH = 420;
  const PAD = { top: 22, bottom: 42, left: 44, right: 6 };
  const FONT_UI = "DM Sans,'Helvetica Neue',Arial,sans-serif";
  const FONT_MONO = "DM Mono,'JetBrains Mono',monospace";
  const pW0 = VW - PAD.left - PAD.right;
  const pH  = VH - PAD.top  - PAD.bottom;

  data.props.forEach((prop, pi) => {
    const nullVal = prop.nullVal || 9999;
    const vals = data.values.map(row => {
      const v = row[pi];
      return (v === null || v === undefined || Math.abs(v - nullVal) < 0.001) ? null : v;
    });
    const valid = vals.filter(v => v !== null);
    if (!valid.length) return;

    // Build paired (depth, value) points — skip nulls
    const pts = [];
    for (let i = 0; i < depths.length; i++) {
      if (vals[i] !== null) pts.push({ d: depths[i], v: vals[i] });
    }

    const vMinFull = Math.min(...valid);
    const vMaxFull = Math.max(...valid);
    const vPadFull = (vMaxFull - vMinFull) * 0.05 || Math.abs(vMinFull) * 0.02 || 0.1;
    const col = COLORS[pi % COLORS.length];

    let view = {
      dMin: dMinFull, dMax: dMaxFull,
      vMin: vMinFull - vPadFull, vMax: vMaxFull + vPadFull
    };

    // ── Toolbar ──────────────────────────────────────────────────
    const wrapper = document.createElement('div');
    wrapper.className = 'cpt-plot-wrapper';

    const toolbar = document.createElement('div');
    toolbar.className = 'cpt-plot-toolbar';
    toolbar.style.paddingLeft = (PAD.left * 100 / VW).toFixed(2) + '%';

    function mkBtn(label, title) {
      const b = document.createElement('button');
      b.textContent = label; b.title = title;
      b.style.cssText = `background:#21262d;border:1px solid #30363d;border-radius:4px;
        color:#c9d1d9;cursor:pointer;padding:1px 7px;font-size:11px;line-height:1.6;`;
      b.onmouseenter = () => b.style.background = '#30363d';
      b.onmouseleave = () => b.style.background = '#21262d';
      return b;
    }
    const btnReset   = mkBtn('\u229e Reset', 'Reset zoom to full extent');
    const btnZoomIn  = mkBtn('\uff0b', 'Zoom in (depth axis)');
    const btnZoomOut = mkBtn('\uff0d', 'Zoom out (depth axis)');
    const infoSpan   = document.createElement('span');
    infoSpan.style.cssText = 'margin-left:4px;color:#484f58;user-select:none;';
    infoSpan.textContent = `n=${pts.length}`;
    toolbar.append(btnReset, btnZoomIn, btnZoomOut, infoSpan);
    wrapper.appendChild(toolbar);

    // ── SVG ──────────────────────────────────────────────────────
    const svg = document.createElementNS(NS_SVG, 'svg');
    svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
    svg.setAttribute('width',  '100%');
    svg.style.cssText = 'display:block;cursor:crosshair;user-select:none;';

    const clipId = `cclip-${pi}-${Math.random().toString(36).slice(2,7)}`;
    const defs = document.createElementNS(NS_SVG, 'defs');
    const cp   = document.createElementNS(NS_SVG, 'clipPath');
    cp.setAttribute('id', clipId);
    const cr   = document.createElementNS(NS_SVG, 'rect');
    cr.setAttribute('x', PAD.left);  cr.setAttribute('y', PAD.top);
    cr.setAttribute('width', pW0);   cr.setAttribute('height', pH);
    cp.appendChild(cr); defs.appendChild(cp); svg.appendChild(defs);

    // Backgrounds
    const bg = document.createElementNS(NS_SVG, 'rect');
    bg.setAttribute('width', VW); bg.setAttribute('height', VH);
    bg.setAttribute('fill', '#0d1117');
    svg.appendChild(bg);
    const plotBg = document.createElementNS(NS_SVG, 'rect');
    plotBg.setAttribute('x', PAD.left); plotBg.setAttribute('y', PAD.top);
    plotBg.setAttribute('width', pW0); plotBg.setAttribute('height', pH);
    plotBg.setAttribute('fill', '#161b22');
    svg.appendChild(plotBg);

    const gridG = document.createElementNS(NS_SVG, 'g');
    const axisG = document.createElementNS(NS_SVG, 'g');
    svg.appendChild(gridG); svg.appendChild(axisG);

    const border = document.createElementNS(NS_SVG, 'rect');
    border.setAttribute('x', PAD.left); border.setAttribute('y', PAD.top);
    border.setAttribute('width', pW0);  border.setAttribute('height', pH);
    border.setAttribute('fill', 'none'); border.setAttribute('stroke', '#30363d');
    svg.appendChild(border);

    // Profile polyline
    const polyline = document.createElementNS(NS_SVG, 'polyline');
    polyline.setAttribute('fill', 'none');
    polyline.setAttribute('stroke', col);
    polyline.setAttribute('stroke-width', '1.5');
    polyline.setAttribute('stroke-linejoin', 'round');
    polyline.setAttribute('stroke-linecap', 'round');
    polyline.setAttribute('clip-path', `url(#${clipId})`);
    svg.appendChild(polyline);

    // Y-axis label: "Depth (uom)"
    const yLabel = document.createElementNS(NS_SVG, 'text');
    yLabel.setAttribute('transform', `rotate(-90) translate(${-(PAD.top + pH/2)}, 13)`);
    yLabel.setAttribute('text-anchor', 'middle');
    yLabel.setAttribute('font-size', '11');
    yLabel.setAttribute('fill', '#8b949e');
    yLabel.setAttribute('font-family', FONT_UI);
    yLabel.textContent = 'Depth' + (depthUom ? ` (${depthUom})` : '');
    svg.appendChild(yLabel);

    // Plot title: property name + uom in col, uom part in muted grey
    const titleEl = document.createElementNS(NS_SVG, 'text');
    titleEl.setAttribute('x', PAD.left + pW0 / 2);
    titleEl.setAttribute('y', 14);
    titleEl.setAttribute('text-anchor', 'middle');
    titleEl.setAttribute('font-size', '13');
    titleEl.setAttribute('font-weight', 'bold');
    titleEl.setAttribute('font-family', FONT_UI);
    const tspan1 = document.createElementNS(NS_SVG, 'tspan');
    tspan1.setAttribute('fill', col);
    tspan1.textContent = prop.name;
    titleEl.appendChild(tspan1);
    if (prop.uom) {
      const tspan2 = document.createElementNS(NS_SVG, 'tspan');
      tspan2.setAttribute('fill', '#8b949e');
      tspan2.setAttribute('font-weight', 'normal');
      tspan2.setAttribute('font-size', '11');
      tspan2.textContent = ` (${prop.uom})`;
      titleEl.appendChild(tspan2);
    }
    svg.appendChild(titleEl);

    // Crosshair lines
    const hLine = document.createElementNS(NS_SVG, 'line');
    hLine.setAttribute('stroke','#484f58'); hLine.setAttribute('stroke-width','1');
    hLine.setAttribute('stroke-dasharray','3,3'); hLine.setAttribute('visibility','hidden');
    svg.appendChild(hLine);
    const vLine = document.createElementNS(NS_SVG, 'line');
    vLine.setAttribute('stroke','#484f58'); vLine.setAttribute('stroke-width','1');
    vLine.setAttribute('stroke-dasharray','3,3'); vLine.setAttribute('visibility','hidden');
    svg.appendChild(vLine);

    // Hover dot
    const dot = document.createElementNS(NS_SVG, 'circle');
    dot.setAttribute('r','4'); dot.setAttribute('fill', col);
    dot.setAttribute('stroke','#fff'); dot.setAttribute('stroke-width','1.5');
    dot.setAttribute('visibility','hidden');
    svg.appendChild(dot);

    // Tooltip
    const ttg  = document.createElementNS(NS_SVG, 'g');
    ttg.setAttribute('visibility','hidden');
    const ttbg = document.createElementNS(NS_SVG, 'rect');
    ttbg.setAttribute('rx','4'); ttbg.setAttribute('fill','#21262d');
    ttbg.setAttribute('stroke','#30363d'); ttbg.setAttribute('stroke-width','1');
    const ttt1 = document.createElementNS(NS_SVG, 'text');   // depth label
    ttt1.setAttribute('font-size','11'); ttt1.setAttribute('fill','#e6edf3');
    ttt1.setAttribute('font-family', FONT_UI);
    const ttt2 = document.createElementNS(NS_SVG, 'text');   // value label
    ttt2.setAttribute('font-size','11'); ttt2.setAttribute('fill', col);
    ttt2.setAttribute('font-family', FONT_UI);
    ttg.appendChild(ttbg); ttg.appendChild(ttt1); ttg.appendChild(ttt2);
    svg.appendChild(ttg);

    // Invisible overlay captures mouse events over plot area
    const overlay = document.createElementNS(NS_SVG, 'rect');
    overlay.setAttribute('x', PAD.left); overlay.setAttribute('y', PAD.top);
    overlay.setAttribute('width', pW0);  overlay.setAttribute('height', pH);
    overlay.setAttribute('fill', 'transparent');
    svg.appendChild(overlay);

    wrapper.appendChild(svg);
    area.appendChild(wrapper);

    // ── Coordinate helpers ────────────────────────────────────────
    function toX(v) {
      return PAD.left + ((v - view.vMin) / (view.vMax - view.vMin)) * pW0;
    }
    function toY(d) {
      return PAD.top + ((d - view.dMin) / (view.dMax - view.dMin)) * pH;
    }
    function yToD(py) {
      return view.dMin + ((py - PAD.top) / pH) * (view.dMax - view.dMin);
    }
    function fmtVal(v) {
      return Math.abs(v) >= 100 ? v.toFixed(1)
           : Math.abs(v) >= 10  ? v.toFixed(2)
           :                      v.toFixed(3);
    }

    // ── Redraw ────────────────────────────────────────────────────
    function redraw() {
      while (gridG.firstChild) gridG.removeChild(gridG.firstChild);
      while (axisG.firstChild) axisG.removeChild(axisG.firstChild);

      const dSpan = view.dMax - view.dMin;
      const vSpan = view.vMax - view.vMin;

      // Y grid + depth labels (left side)
      for (let i = 0; i <= 5; i++) {
        const frac = i / 5;
        const d   = view.dMin + frac * dSpan;
        const yPx = PAD.top + frac * pH;
        const gl  = document.createElementNS(NS_SVG, 'line');
        gl.setAttribute('x1', PAD.left); gl.setAttribute('x2', PAD.left + pW0);
        gl.setAttribute('y1', yPx);      gl.setAttribute('y2', yPx);
        gl.setAttribute('stroke', '#21262d'); gl.setAttribute('stroke-width', '1');
        gridG.appendChild(gl);
        const lbl = document.createElementNS(NS_SVG, 'text');
        lbl.setAttribute('x', PAD.left - 4); lbl.setAttribute('y', yPx + 3);
        lbl.setAttribute('text-anchor', 'end');
        lbl.setAttribute('font-size', '11'); lbl.setAttribute('fill', '#8b949e');
        lbl.setAttribute('font-family', FONT_UI);
        lbl.textContent = d.toFixed(1);
        axisG.appendChild(lbl);
      }

      // X grid + value labels (bottom)
      for (let i = 0; i <= 3; i++) {
        const frac = i / 3;
        const v   = view.vMin + frac * vSpan;
        const xPx = PAD.left + frac * pW0;
        const gl  = document.createElementNS(NS_SVG, 'line');
        gl.setAttribute('x1', xPx); gl.setAttribute('x2', xPx);
        gl.setAttribute('y1', PAD.top); gl.setAttribute('y2', PAD.top + pH);
        gl.setAttribute('stroke', '#21262d'); gl.setAttribute('stroke-width', '1');
        gridG.appendChild(gl);
        const lbl = document.createElementNS(NS_SVG, 'text');
        lbl.setAttribute('x', xPx);
        lbl.setAttribute('y', VH - PAD.bottom + 14);
        lbl.setAttribute('text-anchor', i === 0 ? 'start' : i === 3 ? 'end' : 'middle');
        lbl.setAttribute('font-size', '11'); lbl.setAttribute('fill', '#8b949e');
        lbl.setAttribute('font-family', FONT_UI);
        lbl.textContent = fmtVal(v);
        axisG.appendChild(lbl);
        const tk = document.createElementNS(NS_SVG, 'line');
        tk.setAttribute('x1', xPx); tk.setAttribute('x2', xPx);
        tk.setAttribute('y1', PAD.top + pH); tk.setAttribute('y2', PAD.top + pH + 4);
        tk.setAttribute('stroke', '#484f58'); tk.setAttribute('stroke-width', '1');
        axisG.appendChild(tk);
      }

      // Polyline — points within visible depth window (±1% buffer)
      const buf   = (view.dMax - view.dMin) * 0.01;
      const visPts = pts.filter(p => p.d >= view.dMin - buf && p.d <= view.dMax + buf);
      polyline.setAttribute('points',
        visPts.map(p => `${toX(p.v).toFixed(2)},${toY(p.d).toFixed(2)}`).join(' '));
    }

    redraw();

    // ── Zoom / pan ────────────────────────────────────────────────
    // Refit value axis to the data visible in current depth window
    function refitX() {
      const vis = pts.filter(p => p.d >= view.dMin && p.d <= view.dMax);
      if (!vis.length) return;
      const lo  = Math.min(...vis.map(p => p.v));
      const hi  = Math.max(...vis.map(p => p.v));
      const pad = (hi - lo) * 0.05 || Math.abs(lo) * 0.02 || 0.1;
      view.vMin = lo - pad; view.vMax = hi + pad;
    }

    function zoomDepth(pivotFrac, factor) {
      const dSpan  = view.dMax - view.dMin;
      const pivotD = view.dMin + pivotFrac * dSpan;
      let newSpan  = Math.max(dSpan * factor, 0.5);
      newSpan      = Math.min(newSpan, dRangeFull * 1.001);
      let newMin   = pivotD - pivotFrac * newSpan;
      let newMax   = newMin + newSpan;
      if (newMin < dMinFull) { newMin = dMinFull; newMax = dMinFull + newSpan; }
      if (newMax > dMaxFull) { newMax = dMaxFull; newMin = dMaxFull - newSpan; }
      view.dMin = Math.max(dMinFull, newMin);
      view.dMax = Math.min(dMaxFull, newMax);
      refitX(); redraw();
    }

    btnReset.addEventListener('click', () => {
      view = { dMin: dMinFull, dMax: dMaxFull,
               vMin: vMinFull - vPadFull, vMax: vMaxFull + vPadFull };
      redraw();
    });
    btnZoomIn.addEventListener('click',  () => zoomDepth(0.5, 0.5));
    btnZoomOut.addEventListener('click', () => zoomDepth(0.5, 2.0));

    // Scroll-wheel zooms depth axis, anchored to cursor Y position
    svg.addEventListener('wheel', e => {
      e.preventDefault();
      const rect  = svg.getBoundingClientRect();
      const scale = VH / rect.height;
      const ly    = (e.clientY - rect.top) * scale;
      const pFrac = Math.max(0, Math.min(1, (ly - PAD.top) / pH));
      zoomDepth(pFrac, e.deltaY > 0 ? 1.35 : 1 / 1.35);
    }, { passive: false });

    // Click-drag pans depth axis
    let drag = null;
    overlay.addEventListener('mousedown', e => {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const scale = VH / rect.height;
      drag = { startY: (e.clientY - rect.top) * scale, dMinAtStart: view.dMin };
      overlay.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => {
      if (!drag) return;
      const rect  = svg.getBoundingClientRect();
      const scale = VH / rect.height;
      const dy    = (e.clientY - rect.top) * scale - drag.startY;
      const ddD   = (dy / pH) * (view.dMax - view.dMin);
      const span  = view.dMax - view.dMin;
      let newMin  = drag.dMinAtStart + ddD;
      let newMax  = newMin + span;
      if (newMin < dMinFull) { newMin = dMinFull; newMax = dMinFull + span; }
      if (newMax > dMaxFull) { newMax = dMaxFull; newMin = dMaxFull - span; }
      view.dMin = newMin; view.dMax = newMax;
      refitX(); redraw();
    });
    window.addEventListener('mouseup', () => {
      if (drag) { drag = null; overlay.style.cursor = 'crosshair'; }
    });

    // Hover: find nearest point by depth via binary search, show crosshairs + tooltip
    overlay.addEventListener('mousemove', e => {
      if (drag) return;
      const rect  = svg.getBoundingClientRect();
      const scale = VH / rect.height;
      const my    = (e.clientY - rect.top) * scale;
      const curD  = yToD(my);
      let lo = 0, hi = pts.length - 1;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (pts[mid].d < curD) lo = mid + 1; else hi = mid;
      }
      const candidates = [pts[Math.max(0, lo - 1)], pts[lo]].filter(Boolean);
      const best = candidates.reduce((a, b) =>
        Math.abs(a.d - curD) < Math.abs(b.d - curD) ? a : b);
      if (!best) return;

      const bx = toX(best.v), by = toY(best.d);
      hLine.setAttribute('x1', PAD.left); hLine.setAttribute('x2', PAD.left + pW0);
      hLine.setAttribute('y1', by);       hLine.setAttribute('y2', by);
      hLine.setAttribute('visibility', 'visible');
      vLine.setAttribute('x1', bx); vLine.setAttribute('x2', bx);
      vLine.setAttribute('y1', PAD.top); vLine.setAttribute('y2', PAD.top + pH);
      vLine.setAttribute('visibility', 'visible');
      dot.setAttribute('cx', bx); dot.setAttribute('cy', by);
      dot.setAttribute('visibility', 'visible');

      const depthStr = best.d.toFixed(3) + (depthUom ? ' ' + depthUom : '');
      const valStr   = fmtVal(best.v)    + (prop.uom  ? ' ' + prop.uom  : '');
      ttt1.textContent = depthStr;
      ttt2.textContent = valStr;
      const tw = Math.max(
        ttt1.getComputedTextLength?.() ?? 100,
        ttt2.getComputedTextLength?.() ?? 80, 100);
      const th = 36, tp = 4;
      let tx = bx + 8, ty = by - th - 4;
      if (tx + tw + tp * 2 > VW - 4) tx = bx - tw - tp * 2 - 8;
      if (ty < PAD.top) ty = by + 8;
      ttbg.setAttribute('x', tx);           ttbg.setAttribute('y', ty);
      ttbg.setAttribute('width', tw+tp*2);  ttbg.setAttribute('height', th);
      ttt1.setAttribute('x', tx + tp); ttt1.setAttribute('y', ty + 13);
      ttt2.setAttribute('x', tx + tp); ttt2.setAttribute('y', ty + 27);
      ttg.setAttribute('visibility', 'visible');
    });
    overlay.addEventListener('mouseleave', () => {
      hLine.setAttribute('visibility','hidden');
      vLine.setAttribute('visibility','hidden');
      dot.setAttribute('visibility','hidden');
      ttg.setAttribute('visibility','hidden');
    });
  });
}

// ══════════════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════════════
function esc(s) {
  if (!s && s !== 0) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════
//  RESIZABLE PANELS
// ══════════════════════════════════════════════════════════════
(function() {
  // ── Horizontal drag: table vs map height within left-col ──
  const hDrag    = document.getElementById('h-drag');
  const tablePanel = document.getElementById('table-panel');
  const mapPanel   = document.getElementById('map-panel');
  const leftCol    = document.getElementById('left-col');

  let hDragging = false, hStartY = 0, hStartH = 0;

  hDrag.addEventListener('mousedown', e => {
    hDragging = true;
    hStartY = e.clientY;
    hStartH = mapPanel.getBoundingClientRect().height;
    hDrag.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!hDragging) return;
    const colH = leftCol.getBoundingClientRect().height;
    const newH = Math.max(colH * 0.15, Math.min(colH * 0.85, hStartH - (e.clientY - hStartY)));
    mapPanel.style.flex = `0 0 ${newH}px`;
    mapInstance && mapInstance.invalidateSize({ animate: false });
  });

  document.addEventListener('mouseup', () => {
    if (!hDragging) return;
    hDragging = false;
    hDrag.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    mapInstance && mapInstance.invalidateSize({ animate: false });
  });

  // Touch support for horizontal
  hDrag.addEventListener('touchstart', e => {
    hDragging = true;
    hStartY = e.touches[0].clientY;
    hStartH = mapPanel.getBoundingClientRect().height;
    hDrag.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!hDragging) return;
    const colH = leftCol.getBoundingClientRect().height;
    const newH = Math.max(colH * 0.15, Math.min(colH * 0.85, hStartH - (e.touches[0].clientY - hStartY)));
    mapPanel.style.flex = `0 0 ${newH}px`;
    mapInstance && mapInstance.invalidateSize({ animate: false });
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!hDragging) return;
    hDragging = false;
    hDrag.classList.remove('dragging');
    mapInstance && mapInstance.invalidateSize({ animate: false });
  });

  // ── Vertical drag 1: left-col vs detail-panel ────────────
  const vDrag      = document.getElementById('v-drag');
  const mainLayout = document.getElementById('main-layout');

  let vDragging = false, vStartX = 0, vStartW = 0;

  vDrag.addEventListener('mousedown', e => {
    vDragging = true;
    vStartX = e.clientX;
    vStartW = leftCol.getBoundingClientRect().width;
    vDrag.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!vDragging) return;
    const totalW = mainLayout.getBoundingClientRect().width;
    const newW = Math.max(totalW * 0.15, Math.min(totalW * 0.65, vStartW + (e.clientX - vStartX)));
    leftCol.style.flex = `0 0 ${newW}px`;
    mapInstance && mapInstance.invalidateSize({ animate: false });
  });

  document.addEventListener('mouseup', () => {
    if (!vDragging) return;
    vDragging = false;
    vDrag.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    mapInstance && mapInstance.invalidateSize({ animate: false });
  });

  // Touch support for vertical 1
  vDrag.addEventListener('touchstart', e => {
    vDragging = true;
    vStartX = e.touches[0].clientX;
    vStartW = leftCol.getBoundingClientRect().width;
    vDrag.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!vDragging) return;
    const totalW = mainLayout.getBoundingClientRect().width;
    const newW = Math.max(totalW * 0.15, Math.min(totalW * 0.65, vStartW + (e.touches[0].clientX - vStartX)));
    leftCol.style.flex = `0 0 ${newW}px`;
    mapInstance && mapInstance.invalidateSize({ animate: false });
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!vDragging) return;
    vDragging = false;
    vDrag.classList.remove('dragging');
    mapInstance && mapInstance.invalidateSize({ animate: false });
  });

  // ── Vertical drag 2: detail-panel vs assoc-panel ────────
  const vDrag2     = document.getElementById('v-drag2');
  const detailPanel = document.getElementById('detail-panel');
  const assocPanel = document.getElementById('assoc-panel');

  let v2Dragging = false, v2StartX = 0, v2StartW = 0;

  vDrag2.addEventListener('mousedown', e => {
    v2Dragging = true;
    v2StartX = e.clientX;
    v2StartW = detailPanel.getBoundingClientRect().width;
    vDrag2.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!v2Dragging) return;
    const totalW = mainLayout.getBoundingClientRect().width;
    const newW = Math.max(totalW * 0.15, Math.min(totalW * 0.65, v2StartW + (e.clientX - v2StartX)));
    detailPanel.style.flex = `0 0 ${newW}px`;
  });

  document.addEventListener('mouseup', () => {
    if (!v2Dragging) return;
    v2Dragging = false;
    vDrag2.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    mapInstance && mapInstance.invalidateSize({ animate: false });
  });

  // Touch support for vertical 2
  vDrag2.addEventListener('touchstart', e => {
    v2Dragging = true;
    v2StartX = e.touches[0].clientX;
    v2StartW = detailPanel.getBoundingClientRect().width;
    vDrag2.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!v2Dragging) return;
    const totalW = mainLayout.getBoundingClientRect().width;
    const newW = Math.max(totalW * 0.15, Math.min(totalW * 0.65, v2StartW + (e.touches[0].clientX - v2StartX)));
    detailPanel.style.flex = `0 0 ${newW}px`;
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!v2Dragging) return;
    v2Dragging = false;
    vDrag2.classList.remove('dragging');
  });

  // ── Resize observer: keep map tiles correct on window resize ─
  window.addEventListener('resize', () => {
    mapInstance && mapInstance.invalidateSize({ animate: false });
  });
})();
</script>
