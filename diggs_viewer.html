  // Covers both Well→Borehole (diggs:samplingFeatureRef) and future installation types.
  let parentRef = null;
  {
    const cfg = SF_TYPE_CONFIG[type];
    if (cfg && cfg.parentPath) {
      const raw = xText(doc, cfg.parentPath, el).replace('#','').trim();
      if (raw) parentRef = raw;
    }
  }

  // ── childRefs placeholder ─────────────────────────────────────────────────
  // Back-filled after all SFs are parsed by loadDIGGS() via backfillChildRefs().
  const childRefs = [];

  // ── Date field — store the TimeInterval element for rich rendering ────────
  // SF_TYPE_CONFIG.date points to .../diggs:TimeInterval/diggs:start.
  // We strip the trailing /diggs:start to get the TimeInterval element itself,
  // then store it on the SF object so buildSFTable can call
  // FORMAT_FN.timeIntervalInline(sf.dateEl) — which handles start, end, and
  // duration (including the case where end is absent but duration is present).
  let dateEl = null;
  {
    const cfg = SF_TYPE_CONFIG[type];
    if (cfg && cfg.date) {
      // Strip terminal /diggs:start to arrive at the TimeInterval element path
      const tiPath = cfg.date.replace(/\/diggs:start$/, '');
      dateEl = xFirst(doc, tiPath, el);
    }
  }

  // ── GP_MultiTrack member trackline refs ──────────────────────────────────
  const memberRefs = [];
  if (type === 'GP_MultiTrack') {
    // diggs:trackline is a GP_TracklinePropertyType — each occurrence either:
    //   a) references an external GP_Trackline via xlink:href="#id"
    //   b) contains an inline GP_Trackline element (use its gml:id)
    // Use localName matching to be namespace-prefix-agnostic.
    for (const child of el.childNodes) {
      if (child.nodeType !== 1 || child.localName !== 'trackline') continue;
      const href = child.getAttributeNS(NS.xlink, 'href') || child.getAttribute('xlink:href') || '';
      if (href) {
        const frag = href.replace(/^#/, '').trim();
        if (frag) memberRefs.push(frag);
      } else {
        // Inline child GP_Trackline — grab its gml:id
        for (const grandchild of child.childNodes) {
          if (grandchild.nodeType === 1 && grandchild.localName === 'GP_Trackline') {
            const inlineId = grandchild.getAttributeNS(NS.gml, 'id') || grandchild.getAttribute('gml:id') || '';
            if (inlineId) memberRefs.push(inlineId);
            break;
          }
        }
      }
    }
  }

  return { id, name, type, el, lat, lon, elev, elevUom, depth, depthUom,
    rawPos, rawSrsName, rawSrsDimension, polygonLatLngs,
    waterDepth, waterDepthUom, waterLsrSrsName, bhType,
    horizEPSG: crsInfo.horizEPSG, vertEPSG: crsInfo.vertEPSG,
    crsTransformed: crsInfo.transformed, axisSwapped: crsInfo.axisSwapped || leAxisSwapped,
    crsWarning: crsInfo.warning, projectRefs,
    purpose, linearExtentLatLngs, linearExtentLen,
    parentRef, childRefs, memberRefs, dateEl };
}

// ══════════════════════════════════════════════════════════════
//  TABLE BUILDERS — unified SF table (Phase 2)
// ══════════════════════════════════════════════════════════════
function fmtNum(v, dec=6) {
  return (v === null || v === undefined || isNaN(v)) ? '—' : Number(v).toFixed(dec);
}

/**
 * sfTabKey(type) → short identifier used as DOM id prefix.
 * e.g. 'Borehole' → 'borehole', 'GP_Trackline' → 'gp_trackline'
 */
function sfTabKey(type) { return type.toLowerCase(); }

/**
 * sfTabLabel(type) — human label for tab button.
 * Falls back to splitting camelCase if not in SF_TYPE_CONFIG.
 */
function sfTabLabel(type) {
  const cfg = SF_TYPE_CONFIG[type];
  if (cfg && cfg.tabLabel) return cfg.tabLabel;
  return type.replace(/([A-Z])/g, ' $1').trim();
}

/**
 * Build the tab bar and one table-content div per SF type present in DIGGS_SF.
 * Called once after loadDIGGS() has populated DIGGS_SF.
 */
/**
 * buildSFTabs(ids)
 * Rebuild the tab bar and table panels for the current project filter.
 *
 * ids — Set of sfId strings belonging to the active project, or null = show all.
 *
 * A tab is created only if at least one SF of that type passes the filter.
 * GP_Trackline tabs always exclude multiTrackMember entries.
 * The previously active tab key is restored if its type is still present;
 * otherwise the first available tab is activated.
 */
function buildSFTabs(ids) {
  const tabBar     = document.getElementById('sf-tab-bar');
  const tablePanel = tabBar.parentElement;  // #table-panel

  // Remember which tab was active so we can restore it if still present
  const prevActiveBtn = document.querySelector('.tab-btn.active');
  const prevActiveKey = prevActiveBtn ? prevActiveBtn.id.replace(/^tab-|-btn$/g, '') : null;

  // Tear down existing tabs and panels
  tablePanel.querySelectorAll('.sf-tab-panel').forEach(el => el.remove());
  tabBar.innerHTML = '';

  // Build a flat id→SF lookup used by buildSFTable for parent/child links
  const sfById = new Map();
  for (const [, arr] of DIGGS_SF) for (const sf of arr) sfById.set(sf.id, sf);

  let firstKey = null;
  for (const [type, arr] of DIGGS_SF) {
    if (!arr.length) continue;

    // Apply membership filter; for GP_Trackline also exclude MultiTrack members
    const baseArr = type === 'GP_Trackline'
      ? arr.filter(sf => !sf.multiTrackMember)
      : arr;
    const filteredArr = ids ? baseArr.filter(sf => ids.has(sf.id)) : baseArr;
    if (!filteredArr.length) continue;   // no SFs for this type in the active project

    const key   = sfTabKey(type);
    const label = sfTabLabel(type);
    const count = filteredArr.length;
    if (!firstKey) firstKey = key;

    // ── Tab button ─────────────────────────────────────────────
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.id = `tab-${key}-btn`;
    btn.innerHTML = `${esc(label)} <span class="badge" id="tab-${key}-badge">${count}</span>`;
    btn.addEventListener('click', () => switchTab(key));
    tabBar.appendChild(btn);

    // ── Table panel ────────────────────────────────────────────
    const panel = document.createElement('div');
    panel.id = `tab-${key}-content`;
    panel.className = 'sf-tab-panel tab-content table-scroll';
    panel.innerHTML = `
      <table class="data-table" id="sf-table-${key}">
        <thead><tr>
          <th>Name</th>
          <th>Depth / Extent</th>
          <th>Date</th>
          <th>Parent Feature</th>
          <th>Installations</th>
          <th>Purpose</th>
        </tr></thead>
        <tbody id="sf-tbody-${key}"></tbody>
      </table>`;
    tablePanel.appendChild(panel);

    // Populate rows immediately (only the filtered SFs for this project)
    buildSFTable(type, filteredArr, sfById);
  }

  // Activate: restore previous tab if still present, else first tab
  const restoreKey = (prevActiveKey && document.getElementById(`tab-${prevActiveKey}-btn`))
    ? prevActiveKey : firstKey;
  if (restoreKey) {
    document.getElementById(`tab-${restoreKey}-btn`).classList.add('active');
    document.getElementById(`tab-${restoreKey}-content`).classList.add('active');
  }
}

/**
 * Build the tbody rows for a single SF type.
 * sfArray is already filtered to the active project (and MT members excluded
 * for GP_Trackline) by buildSFTabs before this is called.
 * sfById is the full cross-type id→SF map for parent/child link resolution;
 * if omitted it is built here (legacy call-site compatibility).
 */
function buildSFTable(type, sfArray, sfById) {
  const key   = sfTabKey(type);
  const tbody = document.getElementById(`sf-tbody-${key}`);
  if (!tbody) return;
  tbody.innerHTML = '';

  const renderArray = sfArray;   // already filtered by caller

  if (!renderArray.length) {
    const cfg = SF_TYPE_CONFIG[type];
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No ${cfg ? cfg.tabLabel.toLowerCase() : type} in this file</td></tr>`;
    return;
  }

  // Build sfById here only if not supplied by caller (backwards compat)
  if (!sfById) {
    sfById = new Map();
    for (const [, arr] of DIGGS_SF) for (const sf of arr) sfById.set(sf.id, sf);
  }

  renderArray.forEach(sf => {
    const tr = document.createElement('tr');
    tr.id = `sfrow-${sf.id}`;
    tr.dataset.sfId = sf.id;
    tr.dataset.sfType = type;

    // ── GP_MultiTrack: name-only header row with expand toggle ───
    if (type === 'GP_MultiTrack') {
      tr.classList.add('mt-header');
      const namePrimary = esc(sf.name || sf.id);
      const nameCode = sf.codeSpace ? `<div class="sf-name-code">${esc(sf.codeSpace)}</div>` : '';
      tr.innerHTML = `
        <td style="white-space:normal;max-width:160px">
          <div class="sf-name-primary">${namePrimary}</div>${nameCode}
        </td>
        <td></td><td></td><td></td><td></td><td></td>`;
      tr.addEventListener('click', () => toggleMultiTrack(sf.id, tr, tbody, sfById));
      tbody.appendChild(tr);
      return;
    }

    // ── Name cell ───────────────────────────────────────────────
    const namePrimary = esc(sf.name || sf.id);
    const nameCode = sf.codeSpace ? `<div class="sf-name-code">${esc(sf.codeSpace)}</div>` : '';
    const nameCell = `<div class="sf-name-primary">${namePrimary}</div>${nameCode}`;

    // ── Depth / Extent cell ─────────────────────────────────────
    let depthCell = '—';
    if (sf.depth !== null && sf.depth !== undefined) {
      depthCell = `${sf.depth}${sf.depthUom ? '\u00a0' + esc(sf.depthUom) : ''}`;
    } else if (sf.wellDepth !== null && sf.wellDepth !== undefined) {
      depthCell = `${sf.wellDepth}${sf.wellDepthUom ? '\u00a0' + esc(sf.wellDepthUom) : ''}`;
    } else if (sf.linearExtentLen !== null && sf.linearExtentLen !== undefined) {
      depthCell = `${sf.linearExtentLen}`;
    }

    // ── Date cell — uses timeIntervalInline for full start/end/duration ──
    const dateStr = (typeof FORMAT_FN !== 'undefined' && sf.dateEl)
      ? FORMAT_FN.timeIntervalInline(sf.dateEl)
      : '';
    const dateCell = dateStr || '—';

    // ── Parent Feature cell (installations only) ─────────────────
    let parentCell = '—';
    if (sf.parentRef) {
      const parentSF = sfById.get(sf.parentRef);
      if (parentSF) {
        parentCell = `<span class="sf-link" onclick="event.stopPropagation();selectSF('${esc(parentSF.type)}','${esc(parentSF.id)}')">${esc(parentSF.name || parentSF.id)}</span>`;
      } else {
        parentCell = esc(sf.parentRef);
      }
    }

    // ── Installations cell (parents with childRefs) ───────────────
    let installCell = '—';
    if (sf.childRefs && sf.childRefs.length) {
      const children = sf.childRefs.map(cid => sfById.get(cid)).filter(Boolean);
      const SHOW_ALWAYS = 3;
      const showAll = children.length <= SHOW_ALWAYS + 1;
      const visible = showAll ? children : children.slice(0, SHOW_ALWAYS);
      const hidden  = showAll ? [] : children.slice(SHOW_ALWAYS);
      const makeLink = c => `<span class="sf-link" onclick="event.stopPropagation();selectSF('${esc(c.type)}','${esc(c.id)}')">${esc(c.name || c.id)}</span>`;
      let html = visible.map(makeLink).join('<br>');
      if (hidden.length) {
        const moreId = `sf-more-${sf.id}`;
        const moreHtml = hidden.map(makeLink).join('<br>');
        html += `<br><span class="sf-install-more" id="${moreId}" onclick="event.stopPropagation();document.getElementById('${moreId}').outerHTML='${moreHtml.replace(/'/g,"\\'")}'">…and ${hidden.length} more</span>`;
      }
      installCell = html;
    }

    // ── Purpose cell ────────────────────────────────────────────
    const purposeCell = sf.purpose ? esc(sf.purpose) : '—';

    tr.innerHTML = `
      <td style="white-space:normal;max-width:160px">${nameCell}</td>
      <td class="depth-val">${depthCell}</td>
      <td style="white-space:nowrap;font-size:11.5px">${dateCell}</td>
      <td>${parentCell}</td>
      <td style="white-space:normal;max-width:140px">${installCell}</td>
      <td style="white-space:normal;max-width:140px;color:var(--text-muted);font-size:11.5px">${purposeCell}</td>`;
    tr.addEventListener('click', () => selectSF(type, sf.id));
    tbody.appendChild(tr);
  });
}

// ══════════════════════════════════════════════════════════════
//  GP_MultiTrack EXPAND / COLLAPSE
// ══════════════════════════════════════════════════════════════

/**
 * Toggle expand/collapse of a GP_MultiTrack header row.
 * Inserts a colspan sub-table row immediately after the header,
 * or removes it if already expanded.
 */
function toggleMultiTrack(id, headerTr, tbody, sfById) {
  // Collapse any currently expanded MultiTrack (may be different row)
  if (_expandedMultiTrackId && _expandedMultiTrackId !== id) {
    const prevHeader = document.getElementById(`sfrow-${_expandedMultiTrackId}`);
    if (prevHeader) {
      prevHeader.classList.remove('expanded');
      const prevSub = document.getElementById(`mt-sub-${_expandedMultiTrackId}`);
      if (prevSub) prevSub.remove();
    }
    _expandedMultiTrackId = null;
    clearSelections();
  }

  // If this row is already expanded, collapse it
  if (headerTr.classList.contains('expanded')) {
    headerTr.classList.remove('expanded');
    const sub = document.getElementById(`mt-sub-${id}`);
    if (sub) sub.remove();
    _expandedMultiTrackId = null;
    clearSelections();
    return;
  }

  // Expand: find the SF object
  const mtSFs = DIGGS_SF.get('GP_MultiTrack') || [];
  const sf = mtSFs.find(s => s.id === id);
  if (!sf) return;

  // Resolve member trackline SFs
  const members = (sf.memberRefs || [])
    .map(ref => sfById.get(ref))
    .filter(Boolean);

  // Build sub-table row
  const subTr = document.createElement('tr');
  subTr.id = `mt-sub-${id}`;
  subTr.className = 'mt-subtable-row';

  if (!members.length) {
    subTr.innerHTML = `<td colspan="6"><table class="mt-subtable">
      <tr><td colspan="6" style="color:var(--text-muted);font-style:italic;padding:8px 28px">No member tracklines resolved</td></tr>
    </table></td>`;
  } else {
    const rowsHtml = members.map(m => {
      const name  = esc(m.name || m.id);
      let depthCell = '—';
      if (m.depth !== null && m.depth !== undefined && !isNaN(m.depth)) {
        depthCell = `${m.depth}${m.depthUom ? '\u00a0' + esc(m.depthUom) : ''}`;
      } else if (m.wellDepth !== null && m.wellDepth !== undefined) {
        depthCell = `${m.wellDepth}${m.wellDepthUom ? '\u00a0' + esc(m.wellDepthUom) : ''}`;
      } else if (m.linearExtentLen !== null && m.linearExtentLen !== undefined) {
        depthCell = `${m.linearExtentLen}`;
      }
      const dateStr = (typeof FORMAT_FN !== 'undefined' && m.dateEl)
        ? FORMAT_FN.timeIntervalInline(m.dateEl) : '';
      const date    = dateStr || '—';
      const purpose = m.purpose ? esc(m.purpose) : '—';
      return `<tr data-member-id="${esc(m.id)}" onclick="selectMultiTrackMember('${esc(id)}','${esc(m.id)}')">
        <td style="max-width:160px;white-space:normal"><div class="sf-name-primary">${name}</div></td>
        <td class="depth-val">${depthCell}</td>
        <td style="white-space:nowrap;font-size:11.5px">${date}</td>
        <td>—</td><td>—</td>
        <td style="white-space:normal;max-width:140px;color:var(--text-muted);font-size:11.5px">${purpose}</td>
      </tr>`;
    }).join('');

    subTr.innerHTML = `<td colspan="6"><table class="mt-subtable">
      <thead><tr>
        <th style="padding:5px 16px 5px 28px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:var(--surface2)">Name</th>
        <th style="padding:5px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:var(--surface2)">Depth / Extent</th>
        <th style="padding:5px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:var(--surface2)">Date</th>
        <th style="padding:5px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:var(--surface2)">Parent</th>
        <th style="padding:5px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:var(--surface2)">Installations</th>
        <th style="padding:5px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:var(--surface2)">Purpose</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></td>`;
  }

  // Insert sub-table row immediately after the header row
  headerTr.insertAdjacentElement('afterend', subTr);
  headerTr.classList.add('expanded');
  _expandedMultiTrackId = id;
  headerTr.scrollIntoView({ block: 'nearest' });

  // Highlight all member polylines on the map and fit bounds to their combined extent
  if (mapInstance && members.length) {
    clearSelections();
    // Re-apply expanded class (clearSelections removes .selected but not .expanded)
    headerTr.classList.add('expanded');
    const allBounds = [];
    for (const m of members) {
      const entry = sfMarkers.get(m.id);
      if (!entry) continue;
      const geom = SF_TYPE_CONFIG[entry.type] ? SF_TYPE_CONFIG[entry.type].mapGeom : 'point';
      if (geom === 'line') {
        const cfg = (SF_TYPE_CONFIG[entry.type] && SF_TYPE_CONFIG[entry.type].marker) || {};
        entry.mapObj.setStyle({ color: '#2CFF05', weight: (cfg.weight || 2) + 1, opacity: 1.0, dashArray: null });
        const b = entry.mapObj.getBounds();
        if (b.isValid()) allBounds.push(b);
      } else {
        entry.mapObj.setIcon(makeSFIcon(entry.type, true));
        allBounds.push(L.latLngBounds([entry.mapObj.getLatLng()]));
      }
    }
    if (allBounds.length) {
      let combined = allBounds[0];
      for (let i = 1; i < allBounds.length; i++) combined = combined.extend(allBounds[i]);
      if (combined.isValid()) mapInstance.fitBounds(combined, { padding: [40, 40], animate: true });
    }
  }
}

/**
 * Select a single member trackline within an expanded GP_MultiTrack sub-table.
 * Highlights the clicked sub-row; clears previous member highlight.
 * Also switches to the GP_Trackline tab and highlights the matching main row if present.
 */
function selectMultiTrackMember(multiTrackId, memberId) {
  // Clear previous selections (map + table rows), but preserve the MT expand state
  clearSelections();

  // Re-apply expand state on the MT header (clearSelections strips .selected, not .expanded,
  // but we also need the header to appear active)
  const headerTr = document.getElementById(`sfrow-${multiTrackId}`);
  if (headerTr) headerTr.classList.add('expanded');

  // Highlight the clicked sub-row
  const subTr = document.getElementById(`mt-sub-${multiTrackId}`);
  if (subTr) {
    subTr.querySelectorAll('tr.mt-member-selected').forEach(r => r.classList.remove('mt-member-selected'));
    const memberRow = subTr.querySelector(`tr[data-member-id="${memberId}"]`);
    if (memberRow) memberRow.classList.add('mt-member-selected');
  }

  window._selectedFeatureId = memberId;

  // Highlight the member's map object and fit bounds to it
  const entry = sfMarkers.get(memberId);
  if (entry && mapInstance) {
    const geom = SF_TYPE_CONFIG[entry.type] ? SF_TYPE_CONFIG[entry.type].mapGeom : 'point';
    if (geom === 'line') {
      const cfg = (SF_TYPE_CONFIG[entry.type] && SF_TYPE_CONFIG[entry.type].marker) || {};
      entry.mapObj.setStyle({ color: '#00FEFC', weight: (cfg.weight || 2) + 1, opacity: 1.0, dashArray: null });
      const b = entry.mapObj.getBounds();
      if (b.isValid()) mapInstance.fitBounds(b, { padding: [40, 40], animate: true });
    } else {
      entry.mapObj.setIcon(makeSFIcon(entry.type, true));
      mapInstance.panTo(entry.mapObj.getLatLng());
    }
  }

  // Show detail panel for the member SF (without switching tabs away from GP_MultiTrack)
  // Look up the SF object and call showDetail directly if a handler exists
  const allSFs = [...DIGGS_SF.values()].flat();
  const memberSF = allSFs.find(s => s.id === memberId);
  if (memberSF) {
    showSFDetail(memberSF);
  }
}

// Parse a gml:posList string into Leaflet [lat,lon] pairs.
// Coordinates are stored as lat lon pairs (EPSG:4326 axis order).
function posListToLatLngs(posListText, srsDimension) {
  const dim = parseInt(srsDimension) || 2;
  const nums = posListText.trim().split(/\s+/).map(Number).filter(v => !isNaN(v));
  const lls = [];
  for (let i = 0; i + 1 < nums.length; i += dim) {
    lls.push([nums[i], nums[i + 1]]); // lat, lon
  }
  return lls;
}

// Find first descendant element by localName (namespace-agnostic)
function findByLocalName(el, localName) {
  const all = el.getElementsByTagName('*');
  for (const n of all) { if (n.localName === localName) return n; }
  return null;
}
function findAllByLocalName(el, localName) {
  const result = [];
  const all = el.getElementsByTagName('*');
  for (const n of all) { if (n.localName === localName) result.push(n); }
  return result;
}

// Parse a single posList element into lat/lon pairs
function parsePosListEl(plEl) {
  if (!plEl) return [];
  const dim = parseInt(plEl.getAttribute('srsDimension') || '2');
  return posListToLatLngs(plEl.textContent, dim);
}

let projectGeomLayer = null;
function renderProjectGeometry() {
  if (projectGeomLayer) { projectGeomLayer.remove(); projectGeomLayer = null; }
  if (!mapInstance || !DIGGS_PROJECTS || DIGGS_PROJECTS.length === 0) return;

  const MUTED_POLYGON_STYLE = {
    color: '#888888', weight: 1.5, opacity: 0.7,
    fillColor: '#888888', fillOpacity: 0.65, dashArray: '5 5'
  };
  const MUTED_LINE_STYLE = {
    color: '#b85a00', weight: 4, opacity: 1.0, dashArray: '7 4'
  };
  const MUTED_POINT_STYLE = {
    radius: 14, color: '#444444', weight: 2, opacity: 1.0,
    fillColor: '#555555', fillOpacity: 1.0
  };

  const layers = [];

  for (const proj of DIGGS_PROJECTS) {
    if (!proj.el) continue;
    // Only render geometry for the active project (or all if no active project)
    if (DIGGS_ACTIVE_PROJECT && proj.id !== DIGGS_ACTIVE_PROJECT) continue;
    const el = proj.el;
    let plotted = false;

    // 1. arealExtent — find all, look for exterior > LinearRing > posList
    const arealWrappers = [...el.childNodes].filter(n => n.nodeType === 1 && n.localName === 'arealExtent');
    for (const ae of arealWrappers) {
      const exteriorEl = findByLocalName(ae, 'exterior');
      if (exteriorEl) {
        const plEl = findByLocalName(ae, 'posList');
        if (plEl) {
          const lls = parsePosListEl(plEl);
          if (lls.length >= 3) {
            layers.push(L.polygon(lls, MUTED_POLYGON_STYLE)
              .bindPopup(`<strong>Project:</strong> ${proj.titleHtml}`, { maxWidth: 260 }));
            plotted = true;
          }
        }
      }
    }
    if (plotted) continue;

    // 2. linearExtent — find all, look for posList
    const linearWrappers = [...el.childNodes].filter(n => n.nodeType === 1 && n.localName === 'linearExtent');
    for (const le of linearWrappers) {
      const plEl = findByLocalName(le, 'posList');
      if (plEl) {
        const lls = parsePosListEl(plEl);
        if (lls.length >= 2) {
          layers.push(L.polyline(lls, MUTED_LINE_STYLE)
            .bindPopup(`<strong>Project:</strong> ${proj.titleHtml}`, { maxWidth: 260 }));
          plotted = true;
        }
      }
    }
    if (plotted) continue;

    // 3. referencePoint — look for pos
    const rpWrapper = [...el.childNodes].find(n => n.nodeType === 1 && n.localName === 'referencePoint');
    if (rpWrapper) {
      const posEl = findByLocalName(rpWrapper, 'pos');
      if (posEl) {
        const parts = posEl.textContent.trim().split(/\s+/).map(Number);
        if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
          layers.push(L.circleMarker([parts[0], parts[1]], MUTED_POINT_STYLE)
            .bindPopup(`<strong>Project:</strong> ${proj.titleHtml}`, { maxWidth: 260 }));
        }
      }
    }
  }

  if (layers.length > 0) {
    projectGeomLayer = L.layerGroup(layers).addTo(mapInstance);
    // Bring SF point markers to front above project geometry
    sfMarkers.forEach(({ mapObj, type }) => {
      const geom = SF_TYPE_CONFIG[type] ? SF_TYPE_CONFIG[type].mapGeom : 'point';
      if (geom === 'point') { try { mapObj.bringToFront(); } catch(e){} }
      // polygon and line SFs stay in their z-order; point markers float above them
    });
  }
}

/**
/**
 * formatElevStr(sf)
 * Returns a display string for elevation + UOM for any SF object.
 * Elevation UOM may come from two sources:
 *   sf.elevUom  — parsed directly from gml:pos uomLabels attribute (sync, always set if present)
 *   sf.elevUnit — resolved async from vertical CRS EPSG lookup by enrichElevUnits()
 * Both are checked so the result is correct regardless of which path populated the UOM.
 * Returns null if elevation is absent or NaN.
 */
function formatElevStr(sf) {
  if (sf.elev === null || sf.elev === undefined || isNaN(sf.elev)) return null;
  const uom = sf.elevUnit || sf.elevUom || '';
  return uom ? sf.elev + ' ' + uom : String(sf.elev);
}

/**
 * buildSFPopupHTML(sf, type, latlng)
 * Builds the HTML string for a Leaflet popup for any SF type.
 * latlng: [lat, lon] override (used for point SFs); null = derive from sf.lat/sf.lon
 *         for line SFs, latlng is null and we show the start point from linearExtentLatLngs.
 */
function buildSFPopupHTML(sf, type, latlng) {
  const fmtC = v => (v !== null && v !== undefined && !isNaN(v)) ? parseFloat(v).toFixed(6) : null;
  const rows = [];

  // ── Type label ──
  const cfg = SF_TYPE_CONFIG[type];
  const typeLabel = (cfg && cfg.tabLabel) ? cfg.tabLabel.replace(/s$/, '') : type;
  rows.push(`<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">${esc(typeLabel)}</div>`);

  // ── Name ──
  rows.push(`<div style="font-weight:600;font-size:13px;color:var(--text-bright);margin-bottom:6px">${esc(sf.name || sf.id)}</div>`);

  const row = (label, val) => val
    ? `<div style="display:flex;gap:6px;font-size:11.5px;line-height:1.5">
         <span style="color:var(--text-muted);min-width:64px;flex-shrink:0">${label}</span>
         <span style="color:var(--text)">${val}</span>
       </div>`
    : '';

  // ── Coordinates ──
  let dispLat = null, dispLon = null;
  if (latlng) {
    dispLat = fmtC(latlng[0]);
    dispLon = fmtC(latlng[1]);
  } else if (sf.lat !== null && sf.lon !== null && !isNaN(sf.lat)) {
    dispLat = fmtC(sf.lat);
    dispLon = fmtC(sf.lon);
  } else if (sf.linearExtentLatLngs && sf.linearExtentLatLngs.length) {
    // Show start-point of line as reference
    dispLat = fmtC(sf.linearExtentLatLngs[0][0]);
    dispLon = fmtC(sf.linearExtentLatLngs[0][1]);
  } else if (sf.polygonLatLngs) {
    // Show centroid of polygon exterior ring as reference
    const ring = Array.isArray(sf.polygonLatLngs[0]) && Array.isArray(sf.polygonLatLngs[0][0])
      ? sf.polygonLatLngs[0]   // multi-ring: first ring is exterior
      : sf.polygonLatLngs;     // flat ring
    if (ring.length) {
      const sumLat = ring.reduce((s, p) => s + p[0], 0);
      const sumLon = ring.reduce((s, p) => s + p[1], 0);
      dispLat = fmtC(sumLat / ring.length);
      dispLon = fmtC(sumLon / ring.length);
    }
  }
  if (dispLat && dispLon) {
    rows.push(row('Lat / Lon', `${dispLat}, ${dispLon}`));
  }

  // ── Elevation ──
  const elevStr = formatElevStr(sf);
  if (elevStr) rows.push(row('Elevation', esc(elevStr)));

  // ── Depth / Extent ──
  if (sf.depth !== null && sf.depth !== undefined && !isNaN(sf.depth)) {
    rows.push(row('Depth/Extent', esc(sf.depth + (sf.depthUom ? ' ' + sf.depthUom : ''))));
  } else if (sf.wellDepth !== null && sf.wellDepth !== undefined && !isNaN(sf.wellDepth)) {
    rows.push(row('Depth', esc(sf.wellDepth + (sf.wellDepthUom ? ' ' + sf.wellDepthUom : ''))));
  } else if (sf.linearExtentLen !== null && sf.linearExtentLen !== undefined && !isNaN(sf.linearExtentLen)) {
    rows.push(row('Length', esc(String(sf.linearExtentLen))));
  }

  return `<div style="min-width:160px">${rows.join('')}</div>`;
}

function initMap() {
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  sfMarkers.clear();

  mapInstance = L.map('map', { zoomControl: true, attributionControl: false });

  // Street tile layer (default basemap) with offline fallback: if tiles fail to load,
  // the map still works with markers on a plain background — no error, no blank crash
  let currentTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors',
    errorTileUrl: 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='  // 1px transparent
  }).addTo(mapInstance);

  // Show offline notice if tiles fail (only show once)
  let offlineNoticeShown = false;
  currentTileLayer.on('tileerror', () => {
    if (offlineNoticeShown) return;
    offlineNoticeShown = true;
    const notice = document.createElement('div');
    notice.style.cssText = 'position:absolute;top:8px;left:50%;transform:translateX(-50%);' +
      'background:rgba(30,30,30,.85);color:#e8a045;font-size:11px;padding:5px 12px;' +
      'border-radius:4px;z-index:1000;pointer-events:none;white-space:nowrap;' +
      'border:1px solid rgba(232,160,69,.3);';
    notice.textContent = '⚠ Map tiles unavailable offline — markers still shown';
    document.getElementById('map-panel').appendChild(notice);
  });

  const allLL = [];

  // ── Build sfMarkers from all SF types ────────────────────────
  for (const [type, arr] of DIGGS_SF) {
    const cfg = SF_TYPE_CONFIG[type];
    const geom = cfg ? cfg.mapGeom : 'point';
    if (geom === 'installation' || geom === 'none') continue;

    for (const sf of arr) {
      if (geom === 'polygon' && sf.polygonLatLngs) {
        // Polygon with resolved, transformable coordinates — render as filled polygon.
        // flat ring: [[lat,lon],...] — polygonLatLngs[0] is a number pair
        // multi-ring: [[[lat,lon],...],[[lat,lon],...]] — polygonLatLngs[0] is an array of pairs
        const _isMultiRing = Array.isArray(sf.polygonLatLngs[0]) && Array.isArray(sf.polygonLatLngs[0][0]);
        const _ringLen = _isMultiRing ? sf.polygonLatLngs[0].length : sf.polygonLatLngs.length;
        if (_ringLen >= 3) {
          const pg = makeSFPolygon(sf, false).addTo(mapInstance);
          pg.on('click', () => selectSF(type, sf.id));
          pg.bindPopup(() => buildSFPopupHTML(sf, type, null), { maxWidth: 260 });
          sfMarkers.set(sf.id, { mapObj: pg, type });
          const pgBounds = pg.getBounds();
          if (pgBounds.isValid()) allLL.push(pgBounds.getSouthWest(), pgBounds.getNorthEast());
        }
      } else if (geom === 'polygon' && sf.lat !== null && sf.lon !== null && !isNaN(sf.lat)) {
        // Polygon SF but featureExtent CRS unresolvable (e.g. local Cartesian) —
        // fall back to referencePoint as a point marker so the feature is still visible.
        const m = L.marker([sf.lat, sf.lon], { icon: makeSFIcon(type, false) })
          .addTo(mapInstance)
          .bindPopup(() => buildSFPopupHTML(sf, type, [sf.lat, sf.lon]), { maxWidth: 260 });
        m.on('click', () => selectSF(type, sf.id));
        sfMarkers.set(sf.id, { mapObj: m, type, pointFallback: true });
        allLL.push([sf.lat, sf.lon]);
      } else if (geom === 'line') {
        // Polyline types — require pre-transformed latlngs
        if (!sf.linearExtentLatLngs || sf.linearExtentLatLngs.length < 2) continue;
        const pl = makeSFPolyline(sf, false).addTo(mapInstance);
        pl.on('click', () => {
          // GP_Trackline members of a GP_MultiTrack: route to the sub-table selection
          // handler so the MultiTrack tab stays active and the sub-table opens/stays open.
          if (sf.multiTrackMember && sf.multiTrackParentId) {
            // Ensure the GP_MultiTrack tab is active and the sub-table is expanded first
            const mtKey = sfTabKey('GP_MultiTrack');
            const mtBtn = document.getElementById(`tab-${mtKey}-btn`);
            if (mtBtn) {
              const currentActive = document.querySelector('.tab-btn.active');
              if (!currentActive || currentActive.id !== `tab-${mtKey}-btn`) {
                switchTab(mtKey);
              }
            }
            // Expand the parent MT row if not already expanded
            if (_expandedMultiTrackId !== sf.multiTrackParentId) {
              const mtSFs = DIGGS_SF.get('GP_MultiTrack') || [];
              const parentSF = mtSFs.find(s => s.id === sf.multiTrackParentId);
              if (parentSF) {
                // Collapse previous if open
                if (_expandedMultiTrackId) {
                  const prevH = document.getElementById(`sfrow-${_expandedMultiTrackId}`);
                  if (prevH) prevH.classList.remove('expanded');
                  const prevS = document.getElementById(`mt-sub-${_expandedMultiTrackId}`);
                  if (prevS) prevS.remove();
                  _expandedMultiTrackId = null;
                }
                // Build sfById for toggleMultiTrack
                const sfById = new Map();
                for (const [, arr] of DIGGS_SF) for (const s of arr) sfById.set(s.id, s);
                const headerTr = document.getElementById(`sfrow-${sf.multiTrackParentId}`);
                const tbody = headerTr ? headerTr.closest('tbody') : null;
                if (headerTr && tbody) toggleMultiTrack(sf.multiTrackParentId, headerTr, tbody, sfById);
              }
            }
            selectMultiTrackMember(sf.multiTrackParentId, sf.id);
          } else {
            selectSF(type, sf.id);
          }
        });
        pl.bindPopup(() => buildSFPopupHTML(sf, type, null), { maxWidth: 260 });
        sfMarkers.set(sf.id, { mapObj: pl, type });
        const bounds = pl.getBounds();
        if (bounds.isValid()) {
          allLL.push(bounds.getSouthWest(), bounds.getNorthEast());
        }
      } else {
        // Point types — require lat/lon
        if (sf.lat === null || sf.lon === null || isNaN(sf.lat) || isNaN(sf.lon)) continue;
        const m = L.marker([sf.lat, sf.lon], { icon: makeSFIcon(type, false) })
          .addTo(mapInstance)
          .bindPopup(() => buildSFPopupHTML(sf, type, [sf.lat, sf.lon]), { maxWidth: 260 });
        m.on('click', () => selectSF(type, sf.id));
        sfMarkers.set(sf.id, { mapObj: m, type });
        allLL.push([sf.lat, sf.lon]);
      }
    }
  }

  // ── Project geometry (muted, rendered below SF markers) ──────
  renderProjectGeometry();

  // Apply project filter to both table rows and map markers now that both exist
  // Pass true to skip geometry re-render (already done above)
  filterByProject(true);

    // ── Basemap switcher control (3 layers: Street, Dark, Satellite) ──
  const BASEMAPS = [
    {
      id: 'street',
      label: 'Street',
      url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    },
    {
      id: 'dark',
      label: 'Dark',
      url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      attribution: '© OpenStreetMap contributors © CARTO',
      maxZoom: 19,
      subdomains: 'abcd'
    },
    {
      id: 'satellite',
      label: 'Satellite',
      url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      attribution: '© Esri, Maxar, Earthstar Geographics',
      maxZoom: 19
    }
  ];

  let _activeBasemapId = 'street';

  const BasemapControl = L.Control.extend({

        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>`;
      toggleBtn.style.cssText = [
        'display:flex','align-items:center','justify-content:center',
        'width:30px','height:30px','cursor:pointer',
        'background:var(--surface,#161b22)',
        'color:var(--text,#e6edf3)',
        'border:2px solid rgba(255,255,255,.12)',
        'border-radius:4px','padding:0',
        'box-shadow:0 1px 5px rgba(0,0,0,.5)',
        'transition:background .15s,border-color .15s',
      ].join(';');

      // Dropdown panel (initially hidden)
      const panel = L.DomUtil.create('div', 'diggs-basemap-panel', wrapper);
      panel.style.cssText = [
        'display:none',
        'position:absolute','top:34px','right:0',
        'min-width:110px',
        'background:var(--surface,#161b22)',
        'border:1px solid var(--border,#30363d)',
        'border-radius:6px',
        'box-shadow:0 4px 12px rgba(0,0,0,.6)',
        'overflow:hidden',
        'z-index:1000',
      ].join(';');

      // Build one row per basemap
      BASEMAPS.forEach(bm => {
        const row = L.DomUtil.create('button', 'diggs-basemap-row', panel);
        row.dataset.bmId = bm.id;
        row.textContent = bm.label;
        const isActive = bm.id === _activeBasemapId;
        row.style.cssText = [
          'display:block','width:100%','text-align:left',
          'padding:7px 12px',
          'background:' + (isActive ? 'var(--surface2,#21262d)' : 'transparent'),
          'color:' + (isActive ? 'var(--accent,#e8a045)' : 'var(--text,#e6edf3)'),
          'font-weight:' + (isActive ? '600' : '400'),
          'border:none','cursor:pointer','font-size:12px',
          'white-space:nowrap',
          'transition:background .1s,color .1s',
        ].join(';');

        row.onmouseover = () => {
          if (bm.id !== _activeBasemapId) {
            row.style.background = 'var(--surface2,#21262d)';
            row.style.color = 'var(--text,#e6edf3)';
          }
        };
        row.onmouseout = () => {
          if (bm.id !== _activeBasemapId) {
            row.style.background = 'transparent';
            row.style.color = 'var(--text,#e6edf3)';
          }
        };

        L.DomEvent.on(row, 'click', () => {
          if (bm.id === _activeBasemapId) { panel.style.display = 'none'; return; }

          // Swap tile layer
          mapInstance.removeLayer(currentTileLayer);
          const opts = { maxZoom: bm.maxZoom, attribution: bm.attribution };
          if (bm.subdomains) opts.subdomains = bm.subdomains;
          currentTileLayer = L.tileLayer(bm.url, opts).addTo(mapInstance);
          currentTileLayer.bringToBack();

          _activeBasemapId = bm.id;

          // Update row styles
          panel.querySelectorAll('.diggs-basemap-row').forEach(r => {
            const active = r.dataset.bmId === bm.id;
            r.style.background = active ? 'var(--surface2,#21262d)' : 'transparent';
            r.style.color      = active ? 'var(--accent,#e8a045)'   : 'var(--text,#e6edf3)';
            r.style.fontWeight = active ? '600' : '400';
          });

          // Close panel
          panel.style.display = 'none';
          toggleBtn.style.background = 'var(--surface,#161b22)';
          toggleBtn.style.borderColor = 'rgba(255,255,255,.12)';
        });
      });

      // Toggle panel open/close
      let _panelOpen = false;
      L.DomEvent.on(toggleBtn, 'click', () => {
        _panelOpen = !_panelOpen;
        panel.style.display = _panelOpen ? 'block' : 'none';
        toggleBtn.style.background    = _panelOpen ? 'var(--surface2,#21262d)'  : 'var(--surface,#161b22)';
        toggleBtn.style.borderColor   = _panelOpen ? 'var(--accent,#e8a045)'    : 'rgba(255,255,255,.12)';
      });

      // Close on outside click
      const _closeOnOutside = (e) => {
        if (!wrapper.contains(e.target)) {
          _panelOpen = false;
          panel.style.display = 'none';
          toggleBtn.style.background  = 'var(--surface,#161b22)';
          toggleBtn.style.borderColor = 'rgba(255,255,255,.12)';
        }
      };
      document.addEventListener('click', _closeOnOutside, true);
      // Clean up listener when map is removed
      map.once('unload', () => document.removeEventListener('click', _closeOnOutside, true));

      return wrapper;
    }
  });
  new BasemapControl().addTo(mapInstance);

  if (allLL.length > 0) {
    let initialBounds = L.latLngBounds(allLL);
    // Single point (or very tight cluster): pad bounds to guarantee non-zero area
    // so tiles load correctly and the view is at a useful zoom level.
    const sw = initialBounds.getSouthWest(), ne = initialBounds.getNorthEast();
    const latSpan = ne.lat - sw.lat, lngSpan = ne.lng - sw.lng;
    if (latSpan < 0.005 || lngSpan < 0.005) {
      const pad = 0.008;  // ~0.9 km — sensible default for a single site
      initialBounds = L.latLngBounds(
        [sw.lat - pad, sw.lng - pad],
        [ne.lat + pad, ne.lng + pad]
      );
    }
    // Fit to active project's markers; fall back to all markers if none visible
    {
      const _proj = DIGGS_PROJECTS.find(p => p.id === DIGGS_ACTIVE_PROJECT);
      const _ids  = (_proj && _proj.featureIds) ? _proj.featureIds : null;
      const _pLL  = [];
      sfMarkers.forEach(({ mapObj, type }, sfId) => {
        if (!_ids || _ids.has(sfId)) {
          const geom = SF_TYPE_CONFIG[type] ? SF_TYPE_CONFIG[type].mapGeom : 'point';
          if ((geom === 'line' || geom === 'polygon') && typeof mapObj.getBounds === 'function') {
            const b = mapObj.getBounds();
            if (b.isValid()) { _pLL.push(b.getSouthWest(), b.getNorthEast()); }
          } else if (typeof mapObj.getLatLng === 'function') {
            _pLL.push(mapObj.getLatLng());
          }
        }
      });
      let _fitBounds = _pLL.length > 0 ? L.latLngBounds(_pLL) : initialBounds;
      // Apply minimum-span pad so a single point or tight cluster loads tiles at a useful zoom
      const _sw = _fitBounds.getSouthWest(), _ne = _fitBounds.getNorthEast();
      if ((_ne.lat - _sw.lat) < 0.005 || (_ne.lng - _sw.lng) < 0.005) {
        const _pad = 0.008;
        _fitBounds = L.latLngBounds([_sw.lat - _pad, _sw.lng - _pad], [_ne.lat + _pad, _ne.lng + _pad]);
      }
      mapInstance.fitBounds(_fitBounds, { padding: [30, 30] });
    }

    // ── Home-extent control ───────────────────────────
    const HomeControl = L.Control.extend({
      options: { position: 'topleft' },
      onAdd: function() {
        const btn = L.DomUtil.create('button', 'leaflet-control-home');
        btn.title = 'Zoom to full extent';
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>`;
        btn.style.cssText = [
          'display:flex','align-items:center','justify-content:center',
          'width:30px','height:30px','cursor:pointer',
          'background:var(--surface,#161b22)',
          'color:var(--text,#e6edf3)',
          'border:2px solid rgba(0,0,0,.3)',
          'border-radius:4px','padding:0',
          'font-size:0','transition:background .15s,color .15s',
        ].join(';');
        btn.onmouseover = () => { btn.style.background = 'var(--accent,#e8a045)'; btn.style.color = '#000'; };
        btn.onmouseout  = () => { btn.style.background = 'var(--surface,#161b22)'; btn.style.color = 'var(--text,#e6edf3)'; };
        L.DomEvent.on(btn, 'click', e => {
          L.DomEvent.stopPropagation(e);
          fitToActiveProject();
        });
        L.DomEvent.disableClickPropagation(btn);
        return btn;
      }
    });

    new HomeControl().addTo(mapInstance);

    // Axis-swap warning banner (shown after load if any features were auto-corrected)
    const AxisWarnControl = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function() {
        const div = L.DomUtil.create('div', 'axis-warn-banner');
        div.innerHTML = `<span style="font-size:15px;margin-right:6px">⚠</span>`
          + `Some locations used legacy <em>lon,lat</em> axis order instead of `
          + `EPSG-standard <em>lat,lon</em> — coordinates have been swapped automatically. `
          + `Verify that plotted positions are correct.`
          + `<button onclick="this.closest('.axis-warn-banner').style.display='none'"
              title="Dismiss" style="margin-left:10px;background:none;border:1px solid rgba(255,200,0,.4);`
          + `border-radius:3px;color:inherit;cursor:pointer;padding:0 5px;font-size:12px">✕ Dismiss</button>`;
        L.DomEvent.disableClickPropagation(div);
        div.style.display = 'none';
        return div;
      }
    });
    window._axisWarnCtrl = new AxisWarnControl().addTo(mapInstance);

  } else {
    mapInstance.setView([0, 0], 2);
    new BasemapControl().addTo(mapInstance);
  }

  // Force Leaflet to remeasure the container after the grid has fully settled.
  // This is the key fix for tiles only loading in segments on first open.
  setTimeout(() => {
    mapInstance && mapInstance.invalidateSize({ animate: false });
  }, 100);

  // Show axis-swap warning if any mapped feature had coordinates auto-corrected
  // (covers referencePoint for point types AND centerLine/linearExtent for line types)
  const anySwapped = [...DIGGS_SF].some(([type, arr]) =>
    SF_TYPE_CONFIG[type] && SF_TYPE_CONFIG[type].mapGeom !== 'none' &&
    arr.some(f => f.axisSwapped)
  );
  if (anySwapped && window._axisWarnCtrl) {
    const bannerEl = window._axisWarnCtrl.getContainer();
    if (bannerEl) bannerEl.style.display = 'block';
  }
}

/**
 * makeSFIcon(type, selected)
 * Reads SF_TYPE_CONFIG[type].marker and returns a Leaflet DivIcon.
 * Shapes: 'circle' | 'diamond' | 'square'
 * Selected state adds a red pulsing ring around the icon.
 */
function makeSFIcon(type, selected) {
  const cfg = (SF_TYPE_CONFIG[type] && SF_TYPE_CONFIG[type].marker) || {};
  const shape  = cfg.shape  || 'circle';
  const color  = cfg.color  || '#6e7681';
  const size   = cfg.size   || 12;
  const border = cfg.border || '#fff';

  // Build inner shape HTML
  let shapeStyle = `width:${size}px;height:${size}px;background:${color};`;
  if (shape === 'circle')  shapeStyle += 'border-radius:50%;';
  if (shape === 'diamond') shapeStyle += 'border-radius:2px;transform:rotate(45deg);';
  if (shape === 'square')  shapeStyle += 'border-radius:2px;';
  shapeStyle += `border:1.5px solid ${border};box-sizing:border-box;`;

  const pad = selected ? 14 : 0;          // extra room for ring
  const totalSize = size + pad * 2;
  const offset = pad + (size / 2);        // icon anchor from top-left

  let html;
  if (selected) {
    // Pulsing ring (expands outward) + pulsing inner marker in the type's own color
    // Both use the existing CSS animations: markerRing and markerPulse respectively.
    const innerStyle = [
      `position:absolute`,
      `top:${pad}px`,
      `left:${pad}px`,
      `width:${size}px`,
      `height:${size}px`,
      `background:${color}`,
      `border:1.5px solid ${border}`,
      `box-sizing:border-box`,
      shape === 'circle'  ? 'border-radius:50%' : '',
      shape === 'diamond' ? 'border-radius:2px;transform:rotate(45deg)' : '',
      shape === 'square'  ? 'border-radius:2px' : '',
      `box-shadow:0 0 10px ${color}cc`,
      `transform-origin:center`,
    ].filter(Boolean).join(';');

    html = `<div style="position:relative;width:${totalSize}px;height:${totalSize}px;">`
      + `<div class="marker-selected-ring" style="position:absolute;inset:0;border-radius:50%;`
      + `border:2px solid #FF3333;transform-origin:center;"></div>`
      + `<div class="marker-selected-inner" style="${innerStyle}"></div>`
      + `</div>`;
  } else {
    html = `<div style="${shapeStyle}"></div>`;
  }

  return L.divIcon({
    className: '',
    html,
    iconSize:   [totalSize, totalSize],
    iconAnchor: [offset, offset],
    popupAnchor:[0, -offset],
  });
}

/**
 * makeSFPolyline(sf, selected)
 * Reads SF_TYPE_CONFIG[sf.type].marker for line style and returns an L.polyline.
 * Uses sf.linearExtentLatLngs (pre-transformed WGS84 array).
 * selected=true brightens color and increases weight.
 */
function makeSFPolyline(sf, selected) {
  const cfg = (SF_TYPE_CONFIG[sf.type] && SF_TYPE_CONFIG[sf.type].marker) || {};
  const baseColor  = cfg.color   || '#4a90d9';
  const baseWeight = cfg.weight  || 2;
  const dashArray  = cfg.dashArray || null;

  // Selected: bright cyan + 1px heavier stroke
  const color  = selected ? '#00FEFC' : baseColor;
  const weight = selected ? baseWeight + 1 : baseWeight;
  const opacity = selected ? 1.0 : (cfg.opacity !== undefined ? cfg.opacity : 0.85);

  return L.polyline(sf.linearExtentLatLngs, {
    color, weight, opacity,
    dashArray: selected ? null : dashArray,
    interactive: true,
  });
}

/**
 * makeSFPolygon(sf, selected)
 * Returns an L.polygon for planar SF types (GP_ArealSurvey etc.).
 * Uses sf.polygonLatLngs — either a flat [[lat,lon],...] exterior ring,
 * or [[extRing],[holeRing],...] for surfaces with interior holes / multi-patch.
 * selected=true uses bright cyan stroke + stronger fill opacity.
 */
function makeSFPolygon(sf, selected) {
  const cfg = (SF_TYPE_CONFIG[sf.type] && SF_TYPE_CONFIG[sf.type].marker) || {};
  const baseColor    = cfg.color       || '#A78BFA';
  const baseWeight   = cfg.weight      || 2;
  const baseFill     = cfg.fillColor   || '#A78BFA';
  const baseFillOp   = cfg.fillOpacity !== undefined ? cfg.fillOpacity : 0.15;
  const baseOpacity  = cfg.opacity     !== undefined ? cfg.opacity : 0.9;

  const color       = selected ? '#00FEFC' : baseColor;
  const weight      = selected ? baseWeight + 1 : baseWeight;
  const opacity     = selected ? 1.0 : baseOpacity;
  const fillColor   = selected ? '#00FEFC' : baseFill;
  const fillOpacity = selected ? 0.30 : baseFillOp;

  return L.polygon(sf.polygonLatLngs, {
    color, weight, opacity, fillColor, fillOpacity,
    interactive: true,
  });
}
// ══════════════════════════════════════════════════════════════
//  SELECTION
// ══════════════════════════════════════════════════════════════
function clearSelections() {
  document.querySelectorAll('table.data-table tr.selected').forEach(r => r.classList.remove('selected'));
  sfMarkers.forEach(({ mapObj, type }) => {
    const geom = SF_TYPE_CONFIG[type] ? SF_TYPE_CONFIG[type].mapGeom : 'point';
    if (geom === 'line') {
      const cfg = (SF_TYPE_CONFIG[type] && SF_TYPE_CONFIG[type].marker) || {};
      mapObj.setStyle({ color: cfg.color || '#4a90d9', weight: cfg.weight || 2, opacity: cfg.opacity !== undefined ? cfg.opacity : 0.85 });
    } else if (geom === 'polygon') {
      if (typeof mapObj.setStyle === 'function') {
        const cfg = (SF_TYPE_CONFIG[type] && SF_TYPE_CONFIG[type].marker) || {};
        mapObj.setStyle({ color: cfg.color || '#A78BFA', weight: cfg.weight || 2, opacity: cfg.opacity !== undefined ? cfg.opacity : 0.9,
          fillColor: cfg.fillColor || '#A78BFA', fillOpacity: cfg.fillOpacity !== undefined ? cfg.fillOpacity : 0.15 });
      } else {
        mapObj.setIcon(makeSFIcon(type, false));  // point fallback
      }
    } else {
      mapObj.setIcon(makeSFIcon(type, false));
    }
  });
}

function _selectBHCore(id) {
  const bh = DIGGS_BH.find(b => b.id === id);
  if (!bh) return;
  const entry = sfMarkers.get(id);
  if (entry) { entry.mapObj.setIcon(makeSFIcon('Borehole', true)); }
  if (bh.lat && bh.lon && mapInstance) mapInstance.panTo([bh.lat, bh.lon]);
  showSFDetail(bh);
}
function selectBH(id) {
  window._selectedFeatureId = id;
  clearSelections();
  switchTab(sfTabKey('Borehole'));
  const row = document.getElementById('sfrow-' + id);
  if (row) { row.classList.add('selected'); row.scrollIntoView({ block:'nearest' }); }
  _selectBHCore(id);
}

function _selectCPTCore(id) {
  const cpt = DIGGS_CPT.find(c => c.id === id);
  if (!cpt) return;
  const entry = sfMarkers.get(id);

function selectCPT(id) {

function _selectWellCore(id) {
  const well = DIGGS_WELL.find(w => w.id === id);
  if (!well) return;
  if (well.sfRefHref) {

    if (bhRow) { bhRow.classList.add('selected'); }

    if (parentEntry) { parentEntry.mapObj.setIcon(makeSFIcon(parentEntry.type, true)); }
    const bh = DIGGS_BH.find(b => b.id === well.sfRefHref);
    if (bh && bh.lat && bh.lon && mapInstance) mapInstance.panTo([bh.lat, bh.lon]);
  }
  showSFDetail(well);
}

/**
 * fitToActiveProject()
 * Fits the map to the bounds of all markers currently visible for the
 * active project (respects both point and line geometry types).
 * Falls back to all markers if no project filter is active.
 * Called on tab change and by the Home button.
 */
function fitToActiveProject() {
  if (!mapInstance) return;
  const showAll = (!DIGGS_ACTIVE_PROJECT || DIGGS_ACTIVE_PROJECT === '__all__');
  const proj = showAll ? null : DIGGS_PROJECTS.find(p => p.id === DIGGS_ACTIVE_PROJECT);
  const ids  = (proj && proj.featureIds) ? proj.featureIds : null;

  const lls = [];
  sfMarkers.forEach(({ mapObj, type }, sfId) => {
    if (!ids || ids.has(sfId)) {
      const geom = SF_TYPE_CONFIG[type] ? SF_TYPE_CONFIG[type].mapGeom : 'point';
      if ((geom === 'line' || geom === 'polygon') && typeof mapObj.getBounds === 'function') {
        const b = mapObj.getBounds();
        if (b.isValid()) { lls.push(b.getSouthWest(), b.getNorthEast()); }
      } else if (mapInstance.hasLayer(mapObj) && typeof mapObj.getLatLng === 'function') {
        lls.push(mapObj.getLatLng());
      }
    }
  });

  if (!lls.length) return;
  let bounds = L.latLngBounds(lls);
  // Ensure minimum span so a single point or tight cluster loads at a useful zoom
  const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
  if ((ne.lat - sw.lat) < 0.005 || (ne.lng - sw.lng) < 0.005) {
    const pad = 0.008;
    bounds = L.latLngBounds([sw.lat - pad, sw.lng - pad], [ne.lat + pad, ne.lng + pad]);
  }
  mapInstance.fitBounds(bounds, { padding: [30, 30], animate: true });
}

function switchTab(key) {
  // If switching to a different tab, deselect current SF and clear detail pane
  const currentActive = document.querySelector('.tab-btn.active');
  const changingTab = currentActive && currentActive.id !== `tab-${key}-btn`;
  if (changingTab) {
    clearSelections();
    window._selectedFeatureId = null;
    document.getElementById('detail-content').style.display = 'none';
    document.getElementById('detail-content').innerHTML = '';
    document.getElementById('detail-placeholder').style.display = '';
    // Clear assoc panel
    const _ph2 = document.getElementById('assoc-placeholder');
    const _hdr2 = document.getElementById('assoc-header');
    const _cnt2 = document.getElementById('assoc-content');
    if (_ph2)  _ph2.style.display  = 'flex';
    if (_hdr2) { _hdr2.textContent = ''; _hdr2.style.display = 'none'; }
    if (_cnt2) { _cnt2.innerHTML   = ''; _cnt2.style.display = 'none'; }
    document.querySelectorAll('.assoc-badge').forEach(b => b.classList.remove('active'));
    // Close any open map popup
    if (mapInstance) mapInstance.closePopup();
    // Collapse any expanded MultiTrack sub-table when leaving that tab
    if (_expandedMultiTrackId) {
      const prevHeader = document.getElementById(`sfrow-${_expandedMultiTrackId}`);
      if (prevHeader) prevHeader.classList.remove('expanded');
      const prevSub = document.getElementById(`mt-sub-${_expandedMultiTrackId}`);
      if (prevSub) prevSub.remove();
      _expandedMultiTrackId = null;
    }
    // Fit map to active project bounds whenever the user switches tabs
    fitToActiveProject();
  }
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.id === `tab-${key}-btn`);
  });
  document.querySelectorAll('.sf-tab-panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === `tab-${key}-content`);
  });
}

/**
 * selectSF(type, id) — unified selection dispatcher.
 * Routes to the type-specific select function (selectBH, selectCPT, etc.)
 * or falls back to a generic highlight + tab switch.
 */
function selectSF(type, id) {
  window._selectedFeatureId = id;
  clearSelections();
  const key = sfTabKey(type);
  switchTab(key);
  const row = document.getElementById(`sfrow-${id}`);
  if (row) { row.classList.add('selected'); row.scrollIntoView({ block: 'nearest' }); }
  // Delegate to type-specific detail/map handlers
  if (type === 'Borehole') { _selectBHCore(id); return; }
  if (type === 'Sounding') { _selectCPTCore(id); return; }
  if (type === 'Well')     { _selectWellCore(id); return; }
  // Generic: show detail panel for any other SF type
  {
    const allSFs = [...DIGGS_SF.values()].flat();
    const sf = allSFs.find(s => s.id === id);
    if (sf) showSFDetail(sf);
  }
  // Generic: highlight map object for any other SF type
  const _entry = sfMarkers.get(id);
  if (_entry && mapInstance) {
    const _geom = SF_TYPE_CONFIG[_entry.type] ? SF_TYPE_CONFIG[_entry.type].mapGeom : 'point';
    if (_geom === 'line') {
      const _cfg = (SF_TYPE_CONFIG[_entry.type] && SF_TYPE_CONFIG[_entry.type].marker) || {};
      _entry.mapObj.setStyle({ color: '#00FEFC', weight: (_cfg.weight || 2) + 1, opacity: 1.0, dashArray: null });
      const _b = _entry.mapObj.getBounds();
      if (_b.isValid()) mapInstance.fitBounds(_b, { padding: [40, 40], animate: true });
    } else if (_geom === 'polygon') {
      if (typeof _entry.mapObj.setStyle === 'function') {
        // True polygon
        _entry.mapObj.setStyle({ color: '#00FEFC', weight: (_entry.mapObj.options.weight || 2) + 1,
          opacity: 1.0, fillColor: '#00FEFC', fillOpacity: 0.30 });
        const _b = _entry.mapObj.getBounds();
        if (_b.isValid()) mapInstance.fitBounds(_b, { padding: [40, 40], animate: true });
      } else {
        // Point fallback for unresolvable CRS
        _entry.mapObj.setIcon(makeSFIcon(_entry.type, true));
        mapInstance.panTo(_entry.mapObj.getLatLng());
      }
    } else {
      _entry.mapObj.setIcon(makeSFIcon(_entry.type, true));
      mapInstance.panTo(_entry.mapObj.getLatLng());
    }
  }
}

// ── Horizontal CRS label ────────────────────────────────────
// Returns a human-readable string like "WGS 84 (EPSG:4326)" or
// "NAD83 / UTM Zone 15N (EPSG:26915)" from what's stored on the SF object.
const HORIZ_CRS_NAMES = {
  4326:'WGS 84', 4979:'WGS 84', 4269:'NAD83', 4267:'NAD27',
  4258:'ETRS89', 4230:'ED50', 4277:'OSGB 1936', 4283:'GDA94',
  7844:'GDA2020', 4289:'RD New (Amersfoort)',
  3857:'WGS 84 / Pseudo-Mercator', 900913:'WGS 84 / Pseudo-Mercator',
  27700:'OSGB 1936 / British National Grid',
  29902:'TM65 / Irish Grid', 28992:'RD New',
  3006:'SWEREF99 TM',
};
// For UTM zones we generate the name on the fly from EPSG code ranges.
function horizCRSLabel(sf) {
  const epsg = sf.horizEPSG;
  if (!epsg) {
    // No EPSG recognised — show rawSrsName truncated or "Geographic (unknown)"
    if (sf.rawSrsName) {
      const s = sf.rawSrsName;
      return s.length > 60 ? s.slice(0, 57) + '…' : s;
    }
    return sf.lat !== null ? 'Geographic (CRS unknown)' : '—';
  }
  if (HORIZ_CRS_NAMES[epsg]) return `${HORIZ_CRS_NAMES[epsg]} (EPSG:${epsg})`;
  // UTM WGS84 north  32601–32660
  if (epsg >= 32601 && epsg <= 32660) return `WGS 84 / UTM Zone ${epsg - 32600}N (EPSG:${epsg})`;
  // UTM WGS84 south  32701–32760
  if (epsg >= 32701 && epsg <= 32760) return `WGS 84 / UTM Zone ${epsg - 32700}S (EPSG:${epsg})`;
  // UTM NAD83 north  26901–26923
  if (epsg >= 26901 && epsg <= 26923) return `NAD83 / UTM Zone ${epsg - 26900}N (EPSG:${epsg})`;
  // UTM NAD27 north  26701–26722
  if (epsg >= 26701 && epsg <= 26722) return `NAD27 / UTM Zone ${epsg - 26700}N (EPSG:${epsg})`;
  // ETRS89 / UTM  25828–25837
  if (epsg >= 25828 && epsg <= 25837) return `ETRS89 / UTM Zone ${epsg - 25800}N (EPSG:${epsg})`;
  // GDA94 MGA  28348–28356
  if (epsg >= 28348 && epsg <= 28356) return `GDA94 / MGA Zone ${epsg - 28300} (EPSG:${epsg})`;
  // GDA2020 MGA  7850–7856
  if (epsg >= 7850 && epsg <= 7856) return `GDA2020 / MGA Zone ${epsg - 7800} (EPSG:${epsg})`;
  // Louisiana state planes 3451/3452
  if (epsg === 3451) return 'NAD83 / Louisiana North (ftUS) (EPSG:3451)';
  if (epsg === 3452) return 'NAD83 / Louisiana South (ftUS) (EPSG:3452)';
  return `EPSG:${epsg}`;
}

// ── Section 2: common meta grid ────────────────────────────
// Returns HTML string for the 3-row, 2-col data grid shared by all SF types.
function buildSFCommonGrid(sf) {
  const isGeo = !sf.horizEPSG || GEO_CRS.has(sf.horizEPSG);

  // Row 2: native reference-point coordinates
  // For projected CRS: DIGGS/GML rawPos[0]=Easting, rawPos[1]=Northing,
  // but we display Easting (X) left and Northing (Y) right — matching lat/lon order.
  const axis1Label = isGeo ? 'Latitude' : 'Easting';
  const axis2Label = isGeo ? 'Longitude' : 'Northing';
  let axis1Val = '—', axis2Val = '—';
  if (sf.rawPos && sf.rawPos.length >= 2) {
    const dim  = sf.rawSrsDimension || 2;
    const uomSuffix = isGeo ? '°' : '';
    if (isGeo) {
      // Geographic: rawPos[0]=Latitude, rawPos[1]=Longitude
      axis1Val = fmtNum(sf.rawPos[0], 6) + uomSuffix;
      axis2Val = fmtNum(sf.rawPos[1], 6) + uomSuffix;
    } else {
      // Projected: rawPos[0]=Easting, rawPos[1]=Northing
      axis1Val = fmtNum(sf.rawPos[0], 3);  // Easting → left cell (Easting label)
      axis2Val = fmtNum(sf.rawPos[1], 3);  // Northing → right cell (Northing label)
    }
  } else if (sf.lat !== null && sf.lon !== null) {
    // Fallback to transformed WGS84 values when rawPos unavailable
    axis1Val = fmtNum(sf.lat, 6) + '°';
    axis2Val = fmtNum(sf.lon, 6) + '°';
  }

  // Row 3 left: elevation (uses formatElevStr which handles async CRS lookup)
  const elevStr = formatElevStr(sf) ?? '—';
  const elevLabel = sf.vertCRSName
    ? `Elevation <span style="font-weight:400;opacity:.7;font-size:10px">(${esc(sf.vertCRSName)})</span>`
    : 'Elevation';

  // Row 3 right: Total Depth / Extent — same string used in the SF table
  let depthStr = '—';
  if (sf.depth !== null && sf.depth !== undefined) {
    depthStr = `${sf.depth}${sf.depthUom ? '\u00a0' + esc(sf.depthUom) : ''}`;
  } else if (sf.wellDepth !== null && sf.wellDepth !== undefined) {
    depthStr = `${sf.wellDepth}${sf.wellDepthUom ? '\u00a0' + esc(sf.wellDepthUom) : ''}`;
  } else if (sf.linearExtentLen !== null && sf.linearExtentLen !== undefined) {
    depthStr = `${sf.linearExtentLen}`;
  }

  // CRS flags
  let crsFlags = '';
  if (sf.crsTransformed) crsFlags += ' <span style="color:#e8a045;font-size:10px">▶ projected → WGS84</span>';
  if (sf.axisSwapped)    crsFlags += ' <span style="color:#f0c060;font-size:10px">⇄ axis swapped</span>';
  if (sf.crsWarning && !sf.axisSwapped && !sf.crsTransformed)
    crsFlags += ` <span style="color:#f85149;font-size:10px">⚠ ${esc(sf.crsWarning)}</span>`;

  return `
  <div class="detail-meta-grid">
    <div class="meta-cell" style="grid-column:1/-1">
      <div class="meta-label">CRS</div>
      <div class="meta-value" style="font-size:12px;white-space:normal;line-height:1.4">
        ${esc(horizCRSLabel(sf))}${crsFlags}
      </div>
    </div>
    <div class="meta-cell"><div class="meta-label">${axis1Label}</div>
      <div class="meta-value">${axis1Val}</div></div>
    <div class="meta-cell"><div class="meta-label">${axis2Label}</div>
      <div class="meta-value">${axis2Val}</div></div>
    <div class="meta-cell"><div class="meta-label">${elevLabel}</div>
      <div class="meta-value">${elevStr}</div></div>
    <div class="meta-cell"><div class="meta-label">Total Depth / Extent</div>
      <div class="meta-value">${depthStr}</div></div>
  </div>`;
}

// ── Section 3: associated-data badge grid ──────────────────
// Returns { html, badges } where badges is an array of
// { id, label, count, contentFn } — contentFn() returns HTML for assoc panel.
function buildAssocBadges(sf) {
  const sfId = sf.id;
  const badges = [];

  // ── Lithology ────────────────────────────────────────────
  const lith = DIGGS_LITH[sfId] || [];
  if (lith.length) {
    badges.push({
      id: `assoc-lith-${sfId.replace(/[^a-zA-Z0-9]/g,'_')}`,
      label: 'Lithology',
      count: `${lith.length} interval${lith.length !== 1 ? 's' : ''}`,
      contentFn: () => {
        const lithUom = depthUomForRows(lith);
        const lithUomTxt = lithUom ? `<br><span class="col-uom">${esc(lithUom)}</span>` : '';
        let t = `<table class="sub-table"><thead><tr>
          <th>From${lithUomTxt}</th><th>To${lithUomTxt}</th><th>Code</th><th>Description</th>
        </tr></thead><tbody>`;
        const sorted = [...lith].sort((a,b) => {
          const fa=parseFloat(a.from), fb=parseFloat(b.from);
          return (!isNaN(fa)&&!isNaN(fb)) ? fa-fb : (a.from||'').localeCompare(b.from||'');
        });
        sorted.forEach(l => { t += `<tr>
          <td class="mono">${esc(l.from)}</td>
          <td class="mono">${esc(l.to)}</td>
          <td><span class="lith-code">${esc(l.code)}</span></td>
          <td style="white-space:normal;font-size:11.5px">${esc(l.desc)}</td>
        </tr>`; });
        return t + '</tbody></table>';
      },
    });
  }

  // ── Samples ──────────────────────────────────────────────
  const samps = DIGGS_SAMPLES[sfId] || [];
  if (samps.length) {
    badges.push({
      id: `assoc-samp-${sfId.replace(/[^a-zA-Z0-9]/g,'_')}`,
      label: 'Samples',
      count: `${samps.length} sample${samps.length !== 1 ? 's' : ''}`,
      contentFn: () => {
        const sampUom = depthUomForRows(samps);
        const sampUomTxt = sampUom ? `<br><span class="col-uom">${esc(sampUom)}</span>` : '';
        let t = `<table class="sub-table"><thead><tr>
          <th>From${sampUomTxt}</th><th>To${sampUomTxt}</th>
          <th>Sample ID</th><th>Method</th>
        </tr></thead><tbody>`;
        const sorted = [...samps].sort((a,b) => {
          const fa=parseFloat(a.from), fb=parseFloat(b.from);
          return (!isNaN(fa)&&!isNaN(fb)) ? fa-fb : (a.from||'').localeCompare(b.from||'');
        });
        sorted.forEach(s => { t += `<tr>
          <td class="mono">${esc(s.from)}</td>
          <td class="mono">${esc(s.to)}</td>
          <td style="color:var(--accent2)">${esc(s.name)}</td>
          <td style="color:var(--text-muted)">${esc(s.method)}</td>
        </tr>`; });
        return t + '</tbody></table>';
      },
    });
  }

  // ── Measurements (BH) ────────────────────────────────────
  const bhMeas = DIGGS_BH_MEAS[sfId] || {};
  for (const procType of Object.keys(bhMeas).sort()) {
    const { procObj, rows } = bhMeas[procType];
    const label = diggsLabel(procType);
    const depthUom = depthUomForRows(rows);
    badges.push({
      id: `assoc-bhm-${sfId.replace(/[^a-zA-Z0-9]/g,'_')}-${procType}`,
      label,
      count: `${rows.length} result${rows.length !== 1 ? 's' : ''}`,
      contentFn: () => buildMeasTable(procType, procObj, rows, depthUom),
    });
  }

  // ── Measurements (CPT) ───────────────────────────────────
  const cptMeas = DIGGS_CPT_MEAS[sfId] || {};
  for (const procType of Object.keys(cptMeas).sort()) {
    const { procObj, rows } = cptMeas[procType];
    const label = diggsLabel(procType);
    const depthUom = depthUomForRows(rows);
    const isPPD = procType === 'PorePressureDissipationTest';
    const _sfIdSafe = sfId.replace(/[^a-zA-Z0-9]/g,'_');
    badges.push({
      id: `assoc-cptm-${_sfIdSafe}-${procType}`,
      label,
      count: `${rows.length} test${rows.length !== 1 ? 's' : ''}`,
      contentFn: () => {
        let h = buildMeasTable(procType, procObj, rows, depthUom);
        if (isPPD) {
          for (let ri = 0; ri < rows.length; ri++) {
            const row = rows[ri];
            if (!row.ppdTimeSeries || !row.ppdTimeSeries.timeToks.length) continue;
            const plotId = `ppd-plot-${_sfIdSafe}-${ri}`;
            const dLabel = row.depthFrom ? ` @ ${row.depthFrom}${depthUom ? ' '+depthUom : ''}` : '';
            h += `<div class="ppd-plot-wrap">
              <div class="ppd-plot-label">Dissipation Trace${esc(dLabel)}</div>
              <div id="${plotId}" class="ppd-plot-container"></div>
            </div>`;
          }
        }
        return h;
      },
      afterRender: isPPD ? (_containerEl) => {
        requestAnimationFrame(() => {
          for (let ri = 0; ri < rows.length; ri++) {
            const row = rows[ri];
            if (!row.ppdTimeSeries || !row.ppdTimeSeries.timeToks.length) continue;
            const plotId = `ppd-plot-${_sfIdSafe}-${ri}`;
            const container = document.getElementById(plotId);
            if (container) drawPPDPlot(container, row.ppdTimeSeries);
          }
        });
      } : undefined,
    });
  }

  // ── Monitor sections — one badge per procType ────────────
  const monByType = buildMonitorSections(sfId);
  for (const { procType, html: monHtml, drawFns: monDraw } of monByType) {
    if (!monHtml) continue;
    badges.push({
      id: `assoc-mon-${sfId.replace(/[^a-zA-Z0-9]/g,'_')}-${procType}`,
      label: diggsLabel(procType),
      count: '',
      monHtml, monDraw,
      contentFn: () => monHtml,
    });
  }

  return badges;
}

// ── renderBadgeGrid: single emitter of sf-assoc-section / assoc-badge-grid ──
// badges[]  — array from buildAssocBadges() (plus any pre-pended badges)
// sfId      — gml:id of the owning SF, used in onclick handlers
// Returns the HTML string, or '' if badges is empty.
function renderBadgeGrid(badges, sfId) {
  if (!badges.length) return '';
  let html = `<div class="sf-assoc-section">
    <div class="sf-assoc-section-title">Associated Data</div>
    <div class="assoc-badge-grid">`;
  for (const b of badges) {
    const countHtml = b.count ? `<span class="badge-count">${esc(b.count)}</span>` : '';
    html += `<button class="assoc-badge" id="${b.id}"
        onclick="showAssocBadge('${esc(sfId)}','${b.id}')"
      ><span class="badge-label">${esc(b.label)}</span>${countHtml}</button>`;
  }
  html += `</div></div>`;
  return html;
}

// ── showAssoc: render content into the assoc panel ─────────
function showAssoc(headerText, contentHtml) {
  const ph  = document.getElementById('assoc-placeholder');
  const hdr = document.getElementById('assoc-header');
  const cnt = document.getElementById('assoc-content');
  if (ph)  ph.style.display  = 'none';
  if (hdr) { hdr.textContent = headerText; hdr.style.display = 'block'; }
  if (cnt) { cnt.innerHTML = contentHtml; cnt.style.display = 'block'; }
}

// ── showAssocBadge: called by badge onclick ─────────────────
// sfId identifies the SF; badgeId identifies which badge was clicked.
// We look up the badge's contentFn from a session cache keyed by sfId.
const _assocBadgeRegistry = new Map();  // sfId → badges[]

function showAssocBadge(sfId, badgeId) {
  // Mark active badge
  document.querySelectorAll('.assoc-badge').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(badgeId);
  if (btn) btn.classList.add('active');

  const badges = _assocBadgeRegistry.get(sfId) || [];
  const badge  = badges.find(b => b.id === badgeId);
  if (!badge) return;

  const label = badge.label + (badge.count ? ' — ' + badge.count : '');
  showAssoc(label, badge.contentFn());

  // Post-render: invoke afterRender callback if present (e.g. PPD plot drawing)
  const cnt = document.getElementById('assoc-content');
  if (badge.afterRender) badge.afterRender(cnt);

  if (badge.monDraw && badge.monDraw.length) {
    renderMonitorPlots(badge.monDraw);
  }
  // Post-render: draw CPT depth plots for CPT profile badge
  if (badge._isCPTProfile && badge._sfId) {
    const data = DIGGS_CPT_DATA[badge._sfId];
    if (data && data.depths.length > 0) {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const area = document.getElementById('cpt-canvas-area-assoc');
        if (area) drawCPTPlots(data, area);
      }));
    }
  }
}

// ── splitCamelCase: 'DrivenPenetrationTest' → 'Driven Penetration Test' ────
// Pure mechanical splitter — used as fallback inside diggsLabel().
// For display labels, always call diggsLabel() rather than splitCamelCase() directly.
function splitCamelCase(s) {
  return s.replace(/([a-z])([A-Z])/g, '$1 $2')
          .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2');
}

// ── showSFDetail: unified entry point ────────────────────────────────────────
// Replaces showBHDetail / showCPTDetail / showWellDetail as the single caller.
// Type-specific content (CPT plots) is injected here; all other per-type
// metadata renders via SF_DETAIL_DESCRIPTORS in the scroll pane (Section 4).
function showSFDetail(sf) {
  if (!sf) return;

  // ── Section 1: header ────────────────────────────────────
  const cfg   = SF_TYPE_CONFIG[sf.type] || {};
  const color = (cfg.marker && cfg.marker.color) || 'var(--text-muted)';
  // Use existing type-specific glyphs for known types; fall back to generic dot
  const typeGlyph = {
    Borehole: '⬤', Sounding: '◆', Well: '⬟',
  }[sf.type] || '●';
  const typeLabel = cfg.tabLabel
    ? cfg.tabLabel.replace(/s$/, '')   // strip trailing 's' from plural tab label
    : sf.type;

  let html = `
  <div class="detail-header">
    <div class="detail-type" style="color:${color}">${typeGlyph} ${esc(typeLabel)}</div>
    <div class="detail-name">${esc(sf.name || sf.id)}</div>
  </div>`;

  // ── Section 2: common meta grid ──────────────────────────
  html += buildSFCommonGrid(sf);

  // ── Section 3: assoc badges ───────────────────────────────
  // Inject CPT profile as the first badge for Soundings; then render the grid.
  const badges = buildAssocBadges(sf);

  if (sf.type === 'Sounding') {
    const data = DIGGS_CPT_DATA[sf.id];
    if (data && data.depths.length > 0) {
      const pm = data.procMeta || {};
      const cptBadge = {
        id: `assoc-cptprofile-${sf.id.replace(/[^a-zA-Z0-9]/g,'_')}`,
        label: diggsLabel(pm.procName || 'StaticConePenetrationTest'),
        count: `${data.depths.length} data points`,
        contentFn: () => `<div id="cpt-canvas-area-assoc"></div>`,
        _isCPTProfile: true,
        _sfId: sf.id,
      };
      badges.unshift(cptBadge);
    }
  }

  // Register badges for this SF so showAssocBadge can find them
  _assocBadgeRegistry.set(sf.id, badges);

  html += renderBadgeGrid(badges, sf.id);

  // ── Section 4: type-specific descriptor metadata ────────────
  const sfMetaHtml = renderSFMetadata(sf);

  showDetail(html);

  // Inject section 4 into the scrollable container
  if (sfMetaHtml) {
    const scrollDiv = document.getElementById('detail-content-scroll');
    if (scrollDiv) {
      scrollDiv.innerHTML = `<div class="detail-section" style="padding:10px 16px 14px">${sfMetaHtml}</div>`;
    }
  }

  // Clear assoc panel when a new feature is selected (badges take over)
  {
    const ph  = document.getElementById('assoc-placeholder');
    const hdr = document.getElementById('assoc-header');
    const cnt = document.getElementById('assoc-content');
    if (ph)  ph.style.display  = badges.length ? 'none' : 'flex';
    if (hdr) { hdr.textContent = ''; hdr.style.display = 'none'; }
    if (cnt) { cnt.innerHTML   = ''; cnt.style.display = 'none'; }
    // Remove active state from all badges (no badge auto-selected)
    document.querySelectorAll('.assoc-badge').forEach(b => b.classList.remove('active'));
  }

  // No auto-click: user must click a badge to populate the assoc panel
}

function showDetail(html) {
  document.getElementById('detail-placeholder').style.display = 'none';
  const dc = document.getElementById('detail-content');
  dc.style.display = 'flex';
  // Split into fixed (sections 1–3) and scroll (section 4) containers
  dc.innerHTML = `<div id="detail-content-fixed">${html}</div><div id="detail-content-scroll"></div>`;
}

// ── Helper: get a child element text value by local name (namespace-safe) ────
function childText(el, localName, ns) {
  if (!el) return '';
  const found = el.getElementsByTagNameNS(ns || NS.diggs, localName)[0];
  return found ? found.textContent.trim() : '';
}

// ── Helper: get attribute by local name across possible namespace prefixes ───
function getAttrUom(el) {
  return el ? (el.getAttribute('uom') || '') : '';
}

// ── Build a single measurement table section for one procedure type ──────────
function buildMeasTable(procType, procObj, rows, depthUom) {
  const isDPT  = procType === 'DrivenPenetrationTest';

  // ── Determine the union of result property columns across all rows ─────────
  // Use a Map keyed by property name to preserve insertion order and collect uoms
  const propMap = new Map(); // name → uom
  for (const r of rows) {
    for (const p of r.props) {
      if (!propMap.has(p.name)) propMap.set(p.name, p.uom);
    }
  }
  const resultCols = [...propMap.entries()]; // [{name,uom}] in order

  // ── For DrivenPenetrationTest: collect procedure-level fields ─────────────
  // Determine max drive-set count across all rows so columns are consistent
  let dptProcCols = []; // extra columns from procedure object level
  let maxDriveSets = 0;
  if (isDPT && procObj) {
    // Procedure-level scalar fields to show as columns
    const dptFields = [
      { key: 'penetrationTestType', label: 'Test Type',     uom: '' },
      { key: 'totalPenetration',    label: 'Total Pen.',    uom: null },  // uom from element attr
      { key: 'waterDepth',          label: 'Water Depth',   uom: null },
      { key: 'hammerType',          label: 'Hammer Type',   uom: '' },
      { key: 'hammerEfficiency',    label: 'Hammer Eff.',   uom: null },
    ];
    // Only include fields that appear in at least one measurement
    for (const f of dptFields) {
      // Check across all proc objects stored (only one stored per procType group,
      // but for referenced procedures each row may reference a different object)
      dptProcCols.push(f);
    }
    // Determine max drive sets across all rows' procedure objects
    for (const r of rows) {
      const po = r.procObj || procObj;
      if (!po) continue;
      const dsets = po.getElementsByTagNameNS(NS.diggs, 'DriveSet');
      if (dsets.length > maxDriveSets) maxDriveSets = dsets.length;
    }
  }

  // ── Determine if any row has an interval location (two depths) ───────────
  const hasInterval = rows.some(r => r.depthTo !== '');

  // ── Build header ──────────────────────────────────────────────────────────
  const depthUomTxt = depthUom ? `<br><span class="col-uom">${esc(depthUom)}</span>` : '';
  let thead = '<thead><tr>';
  thead += `<th>Depth${hasInterval ? ' From' : ''}${depthUomTxt}</th>`;
  if (hasInterval) thead += `<th>Depth To${depthUomTxt}</th>`;

  if (isDPT) {
    for (const f of dptProcCols) {
      thead += `<th>${esc(f.label)}</th>`;
    }
    for (let i = 1; i <= maxDriveSets; i++) {
      thead += `<th>Set ${i} (blows)</th>`;
    }
  }

  for (const [name, uom] of resultCols) {
    thead += `<th>${esc(name)}${uom ? `<br><span class="col-uom">${esc(uom)}</span>` : ''}</th>`;
  }
  thead += '</tr></thead>';

  // ── Build body ────────────────────────────────────────────────────────────
  let tbody = '<tbody>';
  // Sort rows by depthFrom numerically
  const sorted = [...rows].sort((a, b) => {
    const fa = parseFloat(a.depthFrom), fb = parseFloat(b.depthFrom);
    if (!isNaN(fa) && !isNaN(fb)) return fa - fb;
    return (a.depthFrom || '').localeCompare(b.depthFrom || '');
  });

  for (const r of sorted) {
    // Resolve the actual procedure object for this row (may differ per DPT reference)
    const po = isDPT ? (r.procObj || procObj) : null;

    tbody += '<tr>';
    tbody += `<td class="mono">${esc(r.depthFrom) || '—'}</td>`;
    if (hasInterval) tbody += `<td class="mono">${esc(r.depthTo) || '—'}</td>`;

    if (isDPT && po) {
      for (const f of dptProcCols) {
        const el = po.getElementsByTagNameNS(NS.diggs, f.key)[0];
        if (el) {
          const val = el.textContent.trim();
          const uom = f.uom === null ? (el.getAttribute('uom') || '') : f.uom;
