// ══════════════════════════════════════════════════════════════
//  buildIntervalTable(parentEl, config)
//
//  Declarative interval table engine for Borehole descriptor sections.
//  parentEl — the context element to evaluate rowPath against.
//  config   — { rowPath, locationPath, locationPointPath?,
//               srsDimensionDefault, columns[], title? }
//
//  Column spec (scalar): { label, path, uom?, format?, boolean?, multi? }
//  Column spec (complex): { label, path, complex: true, fields, popupTitle? }
//    complex:true → collect child elements at `path`, if any exist render an
//    info icon (ⓘ) that opens a detail popup; cell is empty when none found.
//    fields — field array for the popup KV table.
//    popupTitle — string for popup heading (defaults to label).
//    For Equipment: { label, path, complex:true, equipmentProp:true }
//      Each node at path is a property wrapper around an equipment element.
//
//  Column suppression: any column (scalar or complex) where ALL rows produce
//  an empty cell is dropped from both header and body.
//
//  Returns '' if no rows found.
// ══════════════════════════════════════════════════════════════
function buildIntervalTable(parentEl, config) {
  if (!parentEl) return '';

  const rowEls = evalXPath(parentEl, config.rowPath);
  if (!rowEls.length) return '';

  const dim = config.srsDimensionDefault || 3;

  // ── Extract depth interval from a LinearExtent element ───────────────────
  function depthsFromLE(leEl) {
    if (!leEl) return { from: null, to: null, uom: '' };
    const posListEl = leEl.getElementsByTagNameNS(NS.gml, 'posList')[0];
    if (!posListEl) return { from: null, to: null, uom: '' };
    const txt    = posListEl.textContent.trim();
    if (!txt) return { from: null, to: null, uom: '' };
    const leDim  = parseInt(leEl.getAttribute('srsDimension') || String(dim)) || dim;
    const tokens = txt.split(/\s+/).map(Number);
    const nTuples = Math.floor(tokens.length / leDim);
    const from   = nTuples >= 1 ? tokens[leDim - 1] : null;
    const to     = nTuples >= 2 ? tokens[leDim * 2 - 1] : null;
    const srsName = leEl.getAttribute('srsName') || '';
    const uom    = (srsName && LSR_UOM[srsName]) ? LSR_UOM[srsName] : '';
    return { from, to, uom };
  }

  // ── Extract depth from PointLocation element ─────────────────────────────
  function depthFromPL(plEl) {
    if (!plEl) return { from: null, uom: '' };
    const posEl = plEl.getElementsByTagNameNS(NS.gml, 'pos')[0];
    if (!posEl) return { from: null, uom: '' };
    const tokens = posEl.textContent.trim().split(/\s+/);
    const val    = parseFloat(tokens[tokens.length - 1]);
    if (isNaN(val)) return { from: null, uom: '' };
    const srsName = plEl.getAttribute('srsName') || '';
    const uom    = (srsName && LSR_UOM[srsName]) ? LSR_UOM[srsName] : '';
    return { from: val, uom };
  }

  // ── Resolve scalar cell value ─────────────────────────────────────────────
  function scalarCellHtml(rowEl, colSpec) {
    const nodes = evalXPath(rowEl, colSpec.path);
    if (!nodes.length) return '';
    const targets = colSpec.multi ? nodes : [nodes[0]];
    const parts   = [];
    for (const node of targets) {
      let val = '';
      if (colSpec.boolean) {
        const txt = nodeText(node).toLowerCase();
        if (txt === 'true' || txt === '1' || txt === 'yes') val = 'Yes';
        else if (txt === 'false' || txt === '0' || txt === 'no') val = 'No';
        else val = txt || '';
      } else if (colSpec.format) {
        const fn = FORMAT_FN[colSpec.format] || KV_FORMAT[colSpec.format];
        val = fn ? fn(node) : nodeText(node);
      } else if (colSpec.uom === 'attr') {
        const txt = nodeText(node);
        const uom = (node.getAttribute && node.getAttribute('uom')) || '';
        val = txt ? (uom ? `${txt}\u00a0<span class="col-uom" style="display:inline">${escHtml(uom)}</span>` : escHtml(txt)) : '';
      } else {
        val = escHtml(nodeText(node));
      }
      if (val) parts.push(val);
    }
    return parts.join(', ');
  }

  // ── Resolve complex cell — returns info-icon HTML or '' ───────────────────
  function complexCellHtml(rowEl, colSpec) {
    const nodes = evalXPath(rowEl, colSpec.path);
    if (!nodes.length) return '';

    let sections;
    if (colSpec.equipmentProp) {
      // Each node is a property wrapper; unwrap to get the equipment element
      const equipEls = nodes.map(n =>
        [...(n.childNodes || [])].find(c => c.nodeType === 1)
      ).filter(Boolean);
      if (!equipEls.length) return '';
      // Group by equipment type, each gets its own section
      sections = equipEls.map(eq => ({
        heading: eq.localName,
        els: [eq],
        fields: equipmentFieldsFor(eq.localName),
      }));
    } else {
      // Nodes are the actual elements (e.g., diggs:Remark, diggs:Role)
      sections = [{ els: [...nodes], fields: colSpec.fields }];
    }

    const title = colSpec.popupTitle || colSpec.label;
    const key   = _registerPopup(title, sections);
    return `<span class="col-info-icon" onclick="showDetailPopup('${escHtml(key)}')" title="${escHtml(title)}">i</span>`;
  }

  // ── Determine UOM for depth columns ─────────────────────────────────────
  let depthUomStr = '';
  {
    const firstRow = rowEls[0];
    if (config.locationPath) {
      const les = evalXPath(firstRow, config.locationPath);
      if (les.length) {
        const srsName = les[0].getAttribute('srsName') || '';
        if (srsName && LSR_UOM[srsName]) depthUomStr = LSR_UOM[srsName];
      }
    }
  }

  const hasInterval = !!config.locationPath;
  const hasPoint    = !!config.locationPointPath;
  const dUomSpan    = depthUomStr ? `<span class="col-uom">(${escHtml(depthUomStr)})</span>` : '';

  // ── Collect rows with numeric depth-from for sorting ──────────────────────
  const tableRows = [];
  for (const rowEl of rowEls) {
    let depthFrom = null, depthTo = null, depthUom = '';
    if (hasInterval) {
      const les = evalXPath(rowEl, config.locationPath);
      const d   = les.length ? depthsFromLE(les[0]) : { from: null, to: null, uom: '' };
      depthFrom = d.from; depthTo = d.to; depthUom = d.uom;
    }
    if (depthFrom === null && hasPoint) {
      const pls = evalXPath(rowEl, config.locationPointPath);
      const d   = pls.length ? depthFromPL(pls[0]) : { from: null, uom: '' };
      depthFrom = d.from; depthUom = d.uom;
    }
    tableRows.push({ rowEl, depthFrom, depthTo, depthUom });
  }

  // Sort by depthFrom numerically
  tableRows.sort((a, b) => {
    if (a.depthFrom !== null && b.depthFrom !== null) return a.depthFrom - b.depthFrom;
    if (a.depthFrom !== null) return -1;
    if (b.depthFrom !== null) return  1;
    return 0;
  });

  // ── Pre-compute all cell values (needed for suppression check) ────────────
  // cellMatrix[rowIdx][colIdx] = html string ('' = empty)
  const cellMatrix = tableRows.map(({ rowEl }) =>
    config.columns.map(col =>
      col.complex ? complexCellHtml(rowEl, col) : scalarCellHtml(rowEl, col)
    )
  );

  // ── Determine which columns have any data ─────────────────────────────────
  const colActive = config.columns.map((_, ci) =>
    cellMatrix.some(row => row[ci] !== '')
  );

  // ── Build header ──────────────────────────────────────────────────────────
  let thead = '<thead><tr>';
  if (hasInterval) {
    thead += `<th>From${dUomSpan ? '<br>' + dUomSpan : ''}</th><th>To${dUomSpan ? '<br>' + dUomSpan : ''}</th>`;
  } else if (hasPoint) {
    thead += `<th>Depth${dUomSpan ? '<br>' + dUomSpan : ''}</th>`;
  }
  config.columns.forEach((col, ci) => {
    if (colActive[ci]) thead += `<th>${escHtml(col.label)}</th>`;
  });
  thead += '</tr></thead>';

  // ── Build body ────────────────────────────────────────────────────────────
  let tbody = '<tbody>';
  tableRows.forEach(({ depthFrom, depthTo }, ri) => {
    tbody += '<tr>';
    if (hasInterval) {
      tbody += depthFrom !== null ? `<td class="mono">${depthFrom}</td>` : `<td class="muted-dash">—</td>`;
      tbody += depthTo   !== null ? `<td class="mono">${depthTo}</td>`   : `<td class="muted-dash">—</td>`;
    } else if (hasPoint) {
      tbody += depthFrom !== null ? `<td class="mono">${depthFrom}</td>` : `<td class="muted-dash">—</td>`;
    }
    config.columns.forEach((col, ci) => {
      if (!colActive[ci]) return;
      const cell = cellMatrix[ri][ci];
      // Complex columns: centre the icon; scalar: normal
      if (col.complex) {
        tbody += cell
          ? `<td style="text-align:center">${cell}</td>`
          : `<td class="muted-dash">—</td>`;
      } else {
        tbody += cell ? `<td>${cell}</td>` : `<td class="muted-dash">—</td>`;
      }
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  return `<div class="kv-interval-wrap"><table class="sub-table meas-table">${thead}${tbody}</table></div>`;
}

// ══════════════════════════════════════════════════════════════
//  renderSFMetadata(sf)
//  Called from showSFDetail. Looks up SF_DETAIL_DESCRIPTORS[sf.type],
//  runs renderKVTable against sf.el, returns HTML string (may be '').
// ══════════════════════════════════════════════════════════════
function renderSFMetadata(sf) {
  if (!sf || !sf.el) return '';
  const descriptor = SF_DETAIL_DESCRIPTORS && SF_DETAIL_DESCRIPTORS[sf.type];
  if (!descriptor) return '';
  return renderKVTable(sf.el, descriptor);
}

// ── KV_FORMAT — entry points called by rawFormat descriptor keys ──────────
// Each function receives a property-wrapper element from renderKVTable and
// returns an HTML string for direct injection into a kv-val cell (no escaping
// by the caller). Thin delegates into FORMAT_FN wherever possible.
const KV_FORMAT = {

  // Backward-compat shims used by composite descriptors
  humanizeRole(el) { return FORMAT_FN.humanizeRole(el); },
  resolveBA(el)    { return FORMAT_FN.resolveBAName(el); },

  // Plain-string renderer for rawFormat/composite pipeline (Date span)
  // Delegates to FORMAT_FN.timeIntervalInline — single source of truth.
  renderTimeInterval(el) { return FORMAT_FN.timeIntervalInline(el); },

  // Nested-KV delegates — property wrapper → unwrap → renderNestedKV
  renderRemark(el)              { return FORMAT_FN.renderRemarkNested(el); },
  renderRole(el)                { return FORMAT_FN.renderRoleNested(el); },
  renderBusinessAssociate(el)   { return FORMAT_FN.renderBANested(el); },
  renderAssociatedFile(el)      { return FORMAT_FN.renderAssocFileNested(el); },

  renderSoftwareApplication(el) {
    const saEl = resolvePropertyEl(el, 'SoftwareApplication');
    return saEl ? renderNestedKV(saEl, SOFTWARE_APPLICATION_FIELDS) : '';
  },

  // el is the diggs:locality property wrapper
  renderLocality(el) {
    const locEl = resolvePropertyEl(el, 'Locality');
    return locEl ? renderNestedKV(locEl, LOCALITY_FIELDS) : '';
  },

  // el is the diggs:ProjectEvent element (parentPath resolves it directly)
  renderProjectEvent(el) {
    return el ? renderNestedKV(el, PROJECT_EVENT_FIELDS) : '';
  },

  // el is the diggs:Contract element (parentPath resolves it directly)
  renderContract(el) {
    return el ? renderNestedKV(el, CONTRACT_FIELDS) : '';
  },

  // ── Borehole descriptor rawFormat entries ─────────────────────────────────

  // el is the diggs:LinearExtent element from centerLine.
  // Returns 'Vertical' / 'Inclined' / 'Deviated' plain string.
  resolveBoreholeOrientation(el) {
    return FORMAT_FN._boreholeOrientationFromLE(el) || '';
  },

  // el is the diggs:LinearExtent element from centerLine.
  resolvePlunge(el) {
    return FORMAT_FN.resolvePlunge(el);
  },

  resolveBearing(el) {
    return FORMAT_FN.resolveBearing(el);
  },

  // ── Sounding / Well geometry resolvers ───────────────────────────────────
  // el is the diggs:LinearExtent from centerLine; blank for Deviated.
  resolveSoundingOrientation(el) {
    return FORMAT_FN.resolveSoundingOrientation(el) || '';

  resolveSoundingPlunge(el) {

    const href = (propEl.getAttributeNS(NS.xlink, 'href') || propEl.getAttribute('xlink:href') || '').replace(/^#/, '');
    if (!href) return '';
    // Try to find the referenced SF in any known SF array
    const allSFs = [...DIGGS_BH, ...DIGGS_CPT, ...DIGGS_WELL,
                    ...[...DIGGS_SF.values()].flat()];
    const seen = new Set();
    const target = allSFs.find(sf => {
      if (seen.has(sf.id)) return false;
      seen.add(sf.id);
      return sf.id === href;
    });
    if (target) {
      const clickFn = target.type === 'Borehole' ? `selectBH('${esc(target.id)}')`
                    : target.type === 'Sounding' ? `selectCPT('${esc(target.id)}')`
                    : `selectSF('${esc(target.type)}','${esc(target.id)}')`;
      return `<span style="cursor:pointer;color:var(--accent);text-decoration:underline" onclick="${clickFn}">${esc(target.name || target.id)}</span>`;
    }
    return esc(href);
  },

      // Location: choice of notEncountered or waterLocation
      const notEnc = evalXPath(rEl, 'diggs:notEncountered')[0];
      const waterLoc = evalXPath(rEl, 'diggs:waterLocation')[0];
      if (notEnc && nodeText(notEnc).toLowerCase() === 'true') {
        rdRows.push(`<div class="kv-row"><span class="kv-key">Location</span><span class="kv-val" style="color:var(--text-muted)">Not encountered</span></div>`);
      } else if (waterLoc) {
        const depth = FORMAT_FN.resolvePointDepth(waterLoc);
        if (depth) rdRows.push(`<div class="kv-row"><span class="kv-key">Water at</span><span class="kv-val">${escHtml(depth)}</span></div>`);
      }
      // Linked readings mini-table
      const linked = evalXPath(rEl, 'diggs:linkedReading/diggs:LinkedWSReading');
      if (linked.length) {
        let linkHtml = '<table class="sub-table meas-table" style="margin-top:4px"><thead><tr><th>Time / Elapsed</th><th>Water Location</th></tr></thead><tbody>';
        for (const lk of linked) {
          const lkElapsed = evalXPath(lk, 'diggs:elapsedTime')[0];
          const lkDt      = evalXPath(lk, 'diggs:dateTime')[0];
          const lkNotEnc  = evalXPath(lk, 'diggs:notEncountered')[0];
          const lkWaterLoc= evalXPath(lk, 'diggs:waterLocation')[0];
          const tCell = lkElapsed ? escHtml(FORMAT_FN.measure(lkElapsed)) : (lkDt ? escHtml(FORMAT_FN.dateTimePos(lkDt)) : '—');
          let locCell = '—';
          if (lkNotEnc && nodeText(lkNotEnc).toLowerCase() === 'true') locCell = '<span style="color:var(--text-muted)">Not encountered</span>';
          else if (lkWaterLoc) { const d = FORMAT_FN.resolvePointDepth(lkWaterLoc); if (d) locCell = escHtml(d); }
          linkHtml += `<tr><td class="mono">${tCell}</td><td class="mono">${locCell}</td></tr>`;
        }
        linkHtml += '</tbody></table>';
        rdRows.push(linkHtml);
      }
      if (rdRows.length) {
        rows.push(`<div class="kv-nested" style="margin-top:4px">${rdRows.join('')}</div>`);

    }

    if (!rows.length) return '';
    return `<div class="kv-nested">${rows.join('')}</div>`;

    // Choice B: location geometry — raw coords + srsName
    const locEl = evalXPath(lcEl, 'diggs:location')[0];
    if (locEl && !eas && !nor) {
      // Walk children for point or linear geometry
      const geomChild = [...(locEl.childNodes || [])].find(n => n.nodeType === 1);
      if (geomChild) {
        const srsName = geomChild.getAttribute('srsName') || '';
        const posEl   = geomChild.getElementsByTagNameNS(NS.gml, 'pos')[0]

        if (coords)   lcRow('Coords', coords);

    }

    // Uncertainty
    const uncEl = evalXPath(lcEl, 'diggs:localCoordinateUncertainty/diggs:LocationUncertainty')[0];
    if (uncEl) {
      const uncHtml = renderNestedKV(uncEl, LOCATION_UNCERTAINTY_FIELDS);
      if (uncHtml) kvRows.push(`<div class="kv-row"><span class="kv-key">Uncertainty</span><span class="kv-val">${uncHtml}</span></div>`);

    if (!kvRows.length) return '';
    return `<div class="kv-nested">${kvRows.join('')}</div>`;

// ══════════════════════════════════════════════════════════════
//  MODULE-SCOPE XML HELPERS
//  Shared by renderKVTable and renderFields.
// ══════════════════════════════════════════════════════════════

/**
 * evalXPath(ctx, path) — evaluate a relative XPath expression against a
 * context node using the global NS namespace map.
 * Returns an array of matching nodes.
 */
function evalXPath(ctx, path) {
  if (!ctx || !path) return [];
  try {
    const doc    = ctx.ownerDocument || ctx;
    const result = doc.evaluate(path, ctx, p => NS[p] || null,
      XPathResult.ANY_TYPE, null);
    const nodes  = [];
    if (result.resultType === XPathResult.STRING_TYPE) {
      const s = result.stringValue.trim();
      if (s) nodes.push({ textContent: s, nodeValue: s, _synthetic: true });
    } else {
      let n;
      while ((n = result.iterateNext())) nodes.push(n);
    }
    return nodes;
  } catch(e) {
    return [];
  }
}

/** nodeText — trimmed text content of any node. */
function nodeText(n) {
  return (n ? (n.textContent || n.nodeValue || '').trim() : '');
}

// ══════════════════════════════════════════════════════════════
//  renderKVTable(element, descriptor)
//
//  Generic key-value table renderer driven by a descriptor array.
//  Returns an HTML string.
//
//  Descriptor entry shapes:
//    { sectionHeader: 'Title' }               — section divider
//    { label, path }                          — single XPath value
//    { label, parentPath, composite[], compositeSeparator, multi, children }
//      — one or more parent nodes, each assembled from composite sub-paths
//
//  Composite sub-entry: { path, prefix?, suffix?, format? }
//    format: key into KV_FORMAT registry
//
//  children: same shape as a composite field, evaluated relative to each
//    parent node; rendered indented below the parent's composite value.
// ══════════════════════════════════════════════════════════════
function renderKVTable(element, descriptor) {

  /** Apply a named format function to the first matching node for a path,
   *  or fall back to plain text. */
  function applyFormat(ctx, sub) {
    const nodes = evalXPath(ctx, sub.path);
    if (!nodes.length) return '';
    const n = nodes[0];
    const fn = sub.format && KV_FORMAT[sub.format];
    const raw = fn ? fn(n) : nodeText(n);
    if (!raw) return '';
    return (sub.prefix || '') + raw + (sub.suffix || '');
  }

  /** Assemble a composite value string from sub-entries, relative to ctx. */
  function assembleComposite(ctx, composite, separator) {
    const parts = composite.map(sub => applyFormat(ctx, sub)).filter(Boolean);
    return parts.join(separator || '');
  }

  /** Render a children sub-descriptor relative to a parent element,
   *  returning indented HTML lines (one per matching child node). */
  function renderChildren(parentEl, childDesc) {
    const childNodes = evalXPath(parentEl, childDesc.parentPath);
    if (!childNodes.length) return '';
    const lines = [];
    for (const cn of childNodes) {
      const val = assembleComposite(cn, childDesc.composite, childDesc.compositeSeparator);
      if (val) lines.push(`<div style="padding-left:1em;color:var(--text-muted);font-size:12px">${escHtml(val)}</div>`);
    }
    return lines.join('');
  }

  // ── Build rows ──────────────────────────────────────────────
  // Section headers are buffered and only emitted when at least one
  // data row follows them within the same section.
  const rows = [];
  let pendingSectionHeader = null;  // held until we know a data row follows

  for (const entry of descriptor) {
    // Section header sentinel — buffer it, don't emit yet
    if (entry.sectionHeader) {
      pendingSectionHeader = `<div class="kv-section-header">${escHtml(entry.sectionHeader)}</div>`;
      continue;
    }

    let cellHtml = '';

    if (entry.path) {
      // Simple single-path field
      const nodes = evalXPath(element, entry.path);
      if (!nodes.length) continue;
      const val = nodeText(nodes[0]);
      if (!val) continue;
      cellHtml = escHtml(val);

    } else if (entry.parentPath) {
      // Composite field — iterate parent nodes
      const parentNodes = evalXPath(element, entry.parentPath);
      if (!parentNodes.length) continue;

      const items = [];
      for (const pn of parentNodes) {
        let itemHtml = '';
        if (entry.rawFormat) {
          // Pass the entire parent node to a named KV_FORMAT renderer
          const fn = KV_FORMAT[entry.rawFormat];
          itemHtml = fn ? fn(pn) : '';
        } else {
          const val = assembleComposite(pn, entry.composite, entry.compositeSeparator);
          if (!val && !entry.children) continue;
          itemHtml = val ? escHtml(val) : '';
          if (entry.children) {
            itemHtml += renderChildren(pn, entry.children);
          }
        }
        if (itemHtml) items.push(itemHtml);

        if (!entry.multi) break;  // stop after first if not multi
      }
      if (!items.length) continue;
      cellHtml = items.join('<div style="height:6px"></div>');
    }

    if (!cellHtml) continue;

    // We have a real data row — flush any pending section header first
    if (pendingSectionHeader) {
      rows.push(pendingSectionHeader);
      pendingSectionHeader = null;
    }

    // Empty label → full-width block (used for interval tables and other
    // section-spanning content that shouldn't be indented by a key column).
    if (entry.label === '') {
      rows.push(`<div style="padding:2px 0">${cellHtml}</div>`);
    } else {
      rows.push(`
        <div class="kv-row">
          <span class="kv-key">${escHtml(entry.label)}</span>
          <span class="kv-val">${cellHtml}</span>
        </div>`);
    }
  }

  if (!rows.length) {
    return '<div style="color:var(--text-muted);font-size:12px;padding:8px 0">No additional metadata found.</div>';
  }
  return rows.join('');
}

/**
 * Render the project selector bar (pills ≤3 projects, dropdown ≥4).
 * Builds the project dropdown (always) and shows/hides the ⓘ info button.
 * "All Projects" is always the last option (value = '__all__').
 * Sets DIGGS_ACTIVE_PROJECT to the first project by default.
 */
function renderProjectSelector() {
  const bar = document.getElementById('project-bar');
  const sel = document.getElementById('project-dropdown');
  const btn = document.getElementById('project-info-btn');

  if (DIGGS_PROJECTS.length === 0) {
    bar.style.display = 'none';
    return;
  }

  bar.style.display = 'block';

  // Default to first real project
  DIGGS_ACTIVE_PROJECT = DIGGS_PROJECTS[0].id;

  // Build dropdown options: all projects first, then "All Projects" last
  sel.innerHTML = '';
  for (const proj of DIGGS_PROJECTS) {
    const opt = document.createElement('option');
    opt.value = proj.id;
    opt.textContent = proj.label;
    sel.appendChild(opt);
  }
  // "All Projects" sentinel always last
  const allOpt = document.createElement('option');
  allOpt.value = '__all__';
  allOpt.textContent = 'All Projects';
  sel.appendChild(allOpt);

  sel.value = DIGGS_ACTIVE_PROJECT;
  sel.style.display = '';

  _updateInfoBtn();
}

function _updateInfoBtn() {
  // Show/hide ⓘ info button based on whether active project has a Project element
  const btn  = document.getElementById('project-info-btn');
  const proj = DIGGS_PROJECTS.find(p => p.id === DIGGS_ACTIVE_PROJECT);
  const hasEl = !!(proj && proj.el);

  // Hide button when "All Projects" selected or no Project element in file
  if (!hasEl || DIGGS_ACTIVE_PROJECT === '__all__') {
    btn.style.display = 'none';
    return;
  }

  const pane   = document.getElementById('project-detail-pane');
  const isOpen = pane.classList.contains('open');

  btn.style.display = '';
  btn.className = 'project-info-btn' + (isOpen ? ' open' : '');
  btn.title     = isOpen ? 'Close project details' : 'View project details';
  btn.textContent = isOpen ? '▲ Close' : 'ⓘ Info';
}

/**
 * Toggle the inline project detail pane open/closed.
 */
function toggleProjectDetail(id) {
  const pane = document.getElementById('project-detail-pane');
  if (pane.classList.contains('open')) {
    pane.classList.remove('open');
    _updateInfoBtn();
    return;
  }
  // Build content then open
  pane.innerHTML = buildProjectDetailHTML(id);
  pane.classList.add('open');
  _updateInfoBtn();
}

/**
 * Build the HTML content for the project detail pane.
 * Renders the names header then delegates to renderKVTable()
 * with PROJECT_DETAIL_DESCRIPTOR.
 */
function buildProjectDetailHTML(id) {
  const proj = DIGGS_PROJECTS.find(p => p.id === id);
  if (!proj || !proj.el) return '';

  // Names header — pre-rendered HTML, not handled by the generic renderer
  const namesRow = proj.namesHtml
    ? `<div class="kv-row"><span class="kv-key">Name(s)</span><span class="kv-val">${proj.namesHtml}</span></div>`
    : '';

  return namesRow + renderKVTable(proj.el, PROJECT_DETAIL_DESCRIPTOR);
}

function selectProject(id) {
  DIGGS_ACTIVE_PROJECT = id;

  // Close project detail pane when switching projects
  const pane = document.getElementById('project-detail-pane');
  pane.classList.remove('open');
  pane.innerHTML = '';

  // Deselect any selected sampling feature before switching projects
  clearSelections();
  window._selectedFeatureId = null;
  document.getElementById('detail-content').innerHTML = '';
  document.getElementById('detail-content').style.display = 'none';
  document.getElementById('detail-placeholder').style.display = '';
  const _spPh = document.getElementById('assoc-placeholder');
  const _spHdr = document.getElementById('assoc-header');
  const _spCnt = document.getElementById('assoc-content');
  if (_spPh)  _spPh.style.display  = 'flex';
  if (_spHdr) { _spHdr.textContent = ''; _spHdr.style.display = 'none'; }
  if (_spCnt) { _spCnt.innerHTML   = ''; _spCnt.style.display = 'none'; }
  document.querySelectorAll('.assoc-badge').forEach(b => b.classList.remove('active'));

  // Keep static dropdown in sync (in case called programmatically)
  const sel = document.getElementById('project-dropdown');
  if (sel) sel.value = id;

  _updateInfoBtn();

  // Rebuild tabs/tables for the new project filter, then update map
  const showAll = (!id || id === '__all__');
  const proj    = showAll ? null : DIGGS_PROJECTS.find(p => p.id === id);
  const ids     = (proj && proj.featureIds) ? proj.featureIds : null;
  buildSFTabs(ids);
  filterByProject();
}

/**
 * Filter the bh-tbody, cpt-tbody, well-tbody rows to show only those
 * belonging to the active project. Rows without a data-sf-id that match
 * are hidden. If a project has featureIds = null (all), all rows are shown.
 */
/**
 * filterByProject(skipGeom)
 * Updates the MAP ONLY for the active project — tab/table rebuilding is handled
 * by buildSFTabs(ids) which must be called first on every project change.
 *
 * Shows/hides sfMarkers, re-renders project geometry, and fits bounds.
 * skipGeom=true skips geometry + fitBounds (used at initial load when
 * initMap/filterByProject(true) is called immediately after buildSFTabs).
 */
function filterByProject(skipGeom) {
  // '__all__' sentinel or null → show all features
  const showAll = (!DIGGS_ACTIVE_PROJECT || DIGGS_ACTIVE_PROJECT === '__all__');
  const proj = showAll ? null : DIGGS_PROJECTS.find(p => p.id === DIGGS_ACTIVE_PROJECT);
  const ids  = (proj && proj.featureIds) ? proj.featureIds : null;

  // Collapse any expanded MultiTrack sub-table (rows are being rebuilt anyway)
  if (_expandedMultiTrackId) {
    const prevHeader = document.getElementById(`sfrow-${_expandedMultiTrackId}`);
    if (prevHeader) prevHeader.classList.remove('expanded');
    const prevSub = document.getElementById(`mt-sub-${_expandedMultiTrackId}`);
    if (prevSub) prevSub.remove();
    _expandedMultiTrackId = null;
  }

  // ── Map markers ─────────────────────────────────────────────
  sfMarkers.forEach(({ mapObj }, sfId) => {
    if (!mapInstance) return;
    if (!ids || ids.has(sfId)) mapObj.addTo(mapInstance);
    else if (mapInstance.hasLayer(mapObj)) mapInstance.removeLayer(mapObj);
  });

  // ── Project geometry ─────────────────────────────────────────
  if (!skipGeom) renderProjectGeometry();

  // ── Fit map to visible markers ────────────────────────────────
  if (!skipGeom) {
    const visibleLatLngs = [];
    sfMarkers.forEach(({ mapObj, type }, sfId) => {
      if (!ids || ids.has(sfId)) {
        const geom = SF_TYPE_CONFIG[type] ? SF_TYPE_CONFIG[type].mapGeom : 'point';
        if ((geom === 'line' || geom === 'polygon') && typeof mapObj.getBounds === 'function') {
          const b = mapObj.getBounds();
          if (b.isValid()) { visibleLatLngs.push(b.getSouthWest(), b.getNorthEast()); }
        } else if (typeof mapObj.getLatLng === 'function') {
          visibleLatLngs.push(mapObj.getLatLng());
        }
      }
    });
    if (visibleLatLngs.length > 0 && mapInstance) {
      mapInstance.fitBounds(L.latLngBounds(visibleLatLngs), { padding: [40, 40], animate: true });
    }
  }
}

/**
 * Show the project info popup for the given project id.
 */

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/**
 * formatDiggsDate(str, includeTime)
 *
 * Parses an ISO 8601 date or datetime string and returns a formatted string.
 * Default format: mm/dd/yyyy
 * With includeTime=true: mm/dd/yyyy HH:MM (24h)
 *
 * If the string cannot be parsed, it is returned as-is.
 */
function formatDiggsDate(str, includeTime = false) {
  if (!str) return '';
  const s = str.trim();
  if (!s) return '';
  // Append T00:00:00 for date-only strings so they parse as local time, not UTC
  const isDateOnly = /^\d{4}-\d{2}-\d{2}$/.test(s);
  const d = new Date(isDateOnly ? s + 'T00:00:00' : s);
  if (isNaN(d.getTime())) return s;
  const mm   = String(d.getMonth() + 1).padStart(2, '0');
  const dd   = String(d.getDate()).padStart(2, '0');
  const yyyy = d.getFullYear();
  if (!includeTime) return `${mm}/${dd}/${yyyy}`;
  const HH = String(d.getHours()).padStart(2, '0');
  const MM = String(d.getMinutes()).padStart(2, '0');
  return `${mm}/${dd}/${yyyy} ${HH}:${MM}`;
}

/**
 * formatDiggsDateTime(str)
 *
 * Parses an ISO 8601 gml:TimePositionType value and returns:
 *   - MM/DD/YYYY, H:MM AM/PM  when a non-midnight time component is present
 *   - MM/DD/YYYY              for date-only values or midnight (T00:00:00)
 *
 * Used for elements typed as gml:TimePositionType (e.g. diggs:dateTime,
 * diggs:remarkDateTime) where a time component is meaningful.
 * Falls back to the raw string if parsing fails.
 */
function formatDiggsDateTime(str) {
  if (!str) return '';
  const s = str.trim();
  if (!s) return '';
  if (!s.includes('T')) return formatDiggsDate(s);
  const d = new Date(s);
  if (isNaN(d.getTime())) return s;
  const mm   = String(d.getMonth() + 1).padStart(2, '0');
  const dd   = String(d.getDate()).padStart(2, '0');
  const yyyy = d.getFullYear();
  const dateStr = `${mm}/${dd}/${yyyy}`;
  if (d.getHours() === 0 && d.getMinutes() === 0) return dateStr;
  let   hr   = d.getHours();
  const min  = String(d.getMinutes()).padStart(2, '0');
  const ampm = hr >= 12 ? 'PM' : 'AM';
  hr = hr % 12 || 12;
  return `${dateStr}, ${hr}:${min} ${ampm}`;
}

// ══════════════════════════════════════════════════════════════
//  DIGGS PARSING
// ══════════════════════════════════════════════════════════════
function loadDIGGS(doc, filename) {
  // ── CLEAR DETAIL PANE FROM PREVIOUS FILE ─────────
  document.getElementById('detail-content').innerHTML = '';
  document.getElementById('detail-content').style.display = 'none';
  document.getElementById('detail-placeholder').style.display = '';
  // Also clear the detail popup map to avoid stale keys
  _detailPopupMap.clear();
  _detailPopupSeq = 0;

  // ── DETECT DIGGS NAMESPACE ────────────────────────
  const detectedNS = detectDiggsNS(doc);

  // ── PROJECT INFO ─────────────────────────────────
  const created  = xText(doc, '//diggs:DocumentInformation/diggs:creationDate');
  // Collect all author names from DocumentInformation > BusinessAssociate
  const authorNodes = xNodes(doc, '//diggs:DocumentInformation//diggs:BusinessAssociate/gml:name');
  const authors = authorNodes.map(n => n.textContent.trim()).filter(Boolean);
  const authorStr = authors.join(', ');

  document.title = `DIGGS – ${filename}`;
  document.getElementById('hdr-project-name').textContent = filename;
  document.getElementById('hdr-project-meta').textContent =
    [created, authorStr].filter(Boolean).join(' · ');

  // ── BOREHOLES ────────────────────────────────────
  DIGGS_BH = [];
  for (const bh of xNodes(doc, '//diggs:samplingFeature/diggs:Borehole')) {
    DIGGS_BH.push(parseSamplingFeature(doc, bh, 'Borehole'));
  }

  // ── SOUNDINGS ────────────────────────────────────
  DIGGS_CPT = [];
  for (const s of xNodes(doc, '//diggs:samplingFeature/diggs:Sounding')) {
    DIGGS_CPT.push(parseSamplingFeature(doc, s, 'Sounding'));
  }

  // ── LITHOLOGY ────────────────────────────────────
  DIGGS_LITH = {};
  for (const ls of xNodes(doc, '//diggs:observation/diggs:LithologySystem')) {
    const href = xText(doc, 'diggs:samplingFeatureRef/@xlink:href', ls).replace('#','');
    if (!href) continue;
    const rows = [];
    for (const obs of xNodes(doc, './/diggs:LithologyObservation', ls)) {
      const leEl = xFirst(doc, 'diggs:location/diggs:LinearExtent', obs);
      const posListText = leEl ? xText(doc, 'gml:posList', leEl) : '';
      const tokens = posListText.trim().split(/\s+/);
      rows.push({
        from:    tokens[0] ?? '',
        to:      tokens[1] ?? '',
        srsName: leEl ? (leEl.getAttribute('srsName') || '') : '',
        code: xText(doc, 'diggs:primaryLithology/diggs:Lithology/diggs:legendCode', obs),
        desc: xText(doc, 'diggs:primaryLithology/diggs:Lithology/diggs:lithDescription', obs)
      });
    }
    DIGGS_LITH[href] = rows;
  }

  // ── SAMPLES (from SamplingActivity) ──────────────
  DIGGS_SAMPLES = {};
  for (const sa of xNodes(doc, '//diggs:samplingActivity/diggs:SamplingActivity')) {
    const href = xText(doc, 'diggs:samplingFeatureRef/@xlink:href', sa).replace('#','');
    if (!href) continue;
    // Primary: SampleProduced/location — reflects actual recovered sample position
    // (may differ from sampling interval when recovery is lost or sample expands)
    let sampLeEl = xFirst(doc, 'diggs:sampleProduced/diggs:SampleProduced/diggs:location/diggs:LinearExtent', sa);
    // Fallback: samplingLocation — the sampled interval
    if (!sampLeEl || !xText(doc, 'gml:posList', sampLeEl).trim()) {
      sampLeEl = xFirst(doc, 'diggs:samplingLocation/diggs:LinearExtent', sa);
    }
    const posListText = sampLeEl ? xText(doc, 'gml:posList', sampLeEl) : '';
    const tokens = posListText.trim().split(/\s+/);
    const sampSrsName = sampLeEl ? (sampLeEl.getAttribute('srsName') || '') : '';

    // Resolve sampling method: prefer embedded Specification/gml:name;
    // fall back to following xlink:href to the referenced procedure object's gml:name
    // or, if gml:name is absent, use the procedure element type name itself.
    let method = xText(doc, 'diggs:samplingMethod/diggs:Specification/gml:name', sa);
    if (!method) {
      const smEl = xFirst(doc, 'diggs:samplingMethod', sa);
      if (smEl) {
        const smHref = smEl.getAttributeNS(NS.xlink, 'href');
        if (smHref) {
          const targetId = smHref.replace(/^#/, '');
          const target = doc.querySelector(`[*|id="${targetId}"]`);
          if (target) {
            const nameEl = target.getElementsByTagNameNS(NS.gml, 'name')[0];
            method = (nameEl && nameEl.textContent.trim()) ||
                     target.localName;   // use element type (e.g. "DrivenPenetrationTest") as fallback
          }
        }
        // Also check for an embedded procedure object that isn't a Specification
        if (!method) {
          const firstChild = smEl.children[0];
          if (firstChild) {
            const nameEl = firstChild.getElementsByTagNameNS(NS.gml, 'name')[0];
            method = (nameEl && nameEl.textContent.trim()) || firstChild.localName;
          }
        }
      }
    }

    const entry = {
      name:    xText(doc, 'gml:name', sa),
      from:    tokens[0] ?? '',
      to:      tokens[1] ?? '',
      srsName: sampSrsName,
      method:  method || ''
    };
    if (!DIGGS_SAMPLES[href]) DIGGS_SAMPLES[href] = [];
    DIGGS_SAMPLES[href].push(entry);
  }

  // ── CPT DATA ─────────────────────────────────────
  DIGGS_CPT_DATA = {};
  for (const test of xNodes(doc, '//diggs:measurement/diggs:Test')) {
    // Only process StaticConePenetrationTest
    const scptEl = xFirst(doc, './/diggs:StaticConePenetrationTest', test);
    if (!scptEl) continue;
    const sfHref = xText(doc, 'diggs:samplingFeatureRef/@xlink:href', test).replace('#','');
    if (!sfHref) continue;

    // Collect procedure metadata fields
    function _cptAttr(el, path) {
      const node = xFirst(doc, path, el);
      return node ? { val: node.textContent.trim(), uom: node.getAttribute('uom') || '' } : null;
    }
    const procMeta = {
      procName:          'StaticConePenetrationTest',
      penetrometerType:  xText(doc, 'diggs:penetrometerType',      scptEl) || null,
      distTipToSleeve:   _cptAttr(scptEl, 'diggs:distanceTipToSleeve'),
      netAreaRatio:      xText(doc, 'diggs:netAreaRatioCorrection', scptEl) || null,
      penetrationRate:   _cptAttr(scptEl, 'diggs:penetrationRate'),
      tipArea:           _cptAttr(scptEl, 'diggs:tipArea'),
    };

    const rs = xFirst(doc, './/diggs:ResultSet', test);
    if (!rs) continue;

    // Property definitions
    const props = [];
    for (const p of xNodes(doc, './/diggs:Property', rs)) {
      props.push({
        name:     xText(doc, 'diggs:propertyName', p),
        uom:      xText(doc, 'diggs:uom', p),
        className:xText(doc, 'diggs:propertyClass', p),
        nullVal:  parseFloat(xText(doc, 'diggs:nullValue', p)) || 9999
      });
    }

    // Depths (MultiPointLocation posList)
    const depthText = xText(doc, './/diggs:MultiPointLocation/gml:posList', test);
    const depths = depthText.trim().split(/\s+/).map(Number);

    // Data values
    const dvEl = xFirst(doc, './/diggs:dataValues', rs);
    const cs = dvEl ? (dvEl.getAttribute('cs') || ',') : ',';
    const dvText = dvEl ? dvEl.textContent.trim() : '';
    const values = dvText.split(/\s+/).map(row =>
      row.split(cs).map(v => { const n = parseFloat(v); return isNaN(n) ? null : n; })
    );

    const _cptSnd = DIGGS_CPT.find(c => c.id === sfHref);
    DIGGS_CPT_DATA[sfHref] = { depths, props, values, depthUom: _cptSnd ? _cptSnd.depthUom : '', procMeta };
  }

  // ── BH MEASUREMENT DATA (Test/Monitor/MaterialTest/MeasurementWhileDrilling) ──
  DIGGS_BH_MEAS = {};
  const MEAS_TYPES = ['Test','Monitor','MaterialTest','MeasurementWhileDrilling'];
  for (const measType of MEAS_TYPES) {
    for (const measEl of xNodes(doc, `//diggs:measurement/diggs:${measType}`)) {
      const sfHref = xText(doc, 'diggs:samplingFeatureRef/@xlink:href', measEl).replace('#','');
      if (!sfHref) continue;

      // Resolve procedure object (embedded or by xlink:href reference)
      const procWrapper = xFirst(doc, 'diggs:procedure', measEl);
      let procObj = procWrapper && procWrapper.children[0] ? procWrapper.children[0] : null;
      if (!procObj && procWrapper) {
        const procHref = procWrapper.getAttributeNS(NS.xlink, 'href');
        if (procHref) {
          const targetId = procHref.replace(/^#/, '');
          procObj = doc.querySelector('[id="' + targetId + '"]') ||
                    doc.querySelector('[*|id="' + targetId + '"]');
        }
      }
      const procType = procObj ? procObj.localName : 'Unknown';
      // SCPT is handled separately by the CPT DATA loop above — skip here to avoid duplication
      if (procType === 'StaticConePenetrationTest') continue;

      // Collect TestResult rows from outcome
      const outcome = xFirst(doc, 'diggs:outcome', measEl);
      if (!outcome) continue;

      for (const tr of Array.from(outcome.getElementsByTagNameNS(NS.diggs, 'TestResult'))) {
        // Location: prefer LinearExtent posList (interval), else PointLocation pos (single)
        // Capture srsName from the parent geometry element for depth unit lookup.
        const locEl     = tr.getElementsByTagNameNS(NS.diggs, 'location')[0];
        const leEl2     = locEl ? (locEl.getElementsByTagNameNS(NS.diggs, 'LinearExtent')[0]
                                || locEl.getElementsByTagNameNS(NS.diggs, 'PointLocation')[0]) : null;
        const measSrsName = leEl2 ? (leEl2.getAttribute('srsName') || '') : '';
        const posListEl = tr.getElementsByTagNameNS(NS.gml, 'posList')[0];
        const posEl     = tr.getElementsByTagNameNS(NS.gml, 'pos')[0];
        let depthFrom = '', depthTo = '';
        if (posListEl) {
          const toks = posListEl.textContent.trim().split(/\s+/);
          depthFrom = toks[0] ?? ''; depthTo = toks[1] ?? '';
        } else if (posEl) {
          depthFrom = posEl.textContent.trim();
        }

        // Properties and data
        const props = [];
        const rs = tr.getElementsByTagNameNS(NS.diggs, 'ResultSet')[0];
        if (rs) {
          for (const p of Array.from(rs.getElementsByTagNameNS(NS.diggs, 'Property'))) {
            const pNameEl  = p.getElementsByTagNameNS(NS.diggs, 'propertyName')[0];
            const pClassEl = p.getElementsByTagNameNS(NS.diggs, 'propertyClass')[0];
            const pUomEl   = p.getElementsByTagNameNS(NS.diggs, 'uom')[0] ||
                             p.getElementsByTagNameNS(NS.diggs, 'unitOfMeasure')[0];
            const pName  = (pNameEl  && pNameEl.textContent.trim())  || '';
            const pClass = (pClassEl && pClassEl.textContent.trim()) || '';
            const pUom   = (pUomEl   && pUomEl.textContent.trim())   || '';
            props.push({ name: pName || pClass || '?', uom: pUom });
          }
        }

        // Data values: ts=space is the DIGGS convention but text values often contain spaces.
        // For borehole tests each TestResult is a single logical row; use full text split by cs.
        const dvEl = rs ? rs.getElementsByTagNameNS(NS.diggs, 'dataValues')[0] : null;
        const cs = dvEl ? (dvEl.getAttribute('cs') || ',') : ',';
        const ts = dvEl ? (dvEl.getAttribute('ts') || ' ') : ' ';
        const rawText = dvEl ? dvEl.textContent.trim() : '';
        let rowValues;
        if (!rawText) {
          rowValues = [[]];
        } else if (ts !== ' ' && ts !== '') {
          rowValues = rawText.split(ts).map(r => r.split(cs));
        } else {
          // ts is space — treat whole text content as one row (don't split on spaces)
          rowValues = [rawText.split(cs)];
        }

        // ── PPD TemporalResult (dissipation time-series) ──────────────────
        let ppdTimeSeries = null;
        if (procType === 'PorePressureDissipationTest' && procObj) {
          const trEl = procObj.getElementsByTagNameNS(NS.diggs, 'TemporalResult')[0];
          if (trEl) {
            // Time values — from TimeIntervalList/timeIntervalList (space-delimited)
            const tilEl = trEl.getElementsByTagNameNS(NS.diggs, 'TimeIntervalList')[0]
                       || trEl.getElementsByTagNameNS(NS.gml,   'TimeIntervalList')[0];
            const tilListEl = tilEl
              ? (tilEl.getElementsByTagNameNS(NS.diggs, 'timeIntervalList')[0]
              || tilEl.getElementsByTagNameNS(NS.gml,   'timeIntervalList')[0])
              : null;
            const timeUnit = tilEl ? (tilEl.getAttribute('unit') || 's') : 's';
            const timeToks = tilListEl
              ? tilListEl.textContent.trim().split(/\s+/).filter(Boolean).map(Number)
              : [];

            // Properties and values from inner ResultSet
            const trRs = trEl.getElementsByTagNameNS(NS.diggs, 'ResultSet')[0];
            const trProps = [];
            if (trRs) {
              for (const p of Array.from(trRs.getElementsByTagNameNS(NS.diggs, 'Property'))) {
                const nm  = (p.getElementsByTagNameNS(NS.diggs, 'propertyName')[0]  || {}).textContent || '';
                const uom = (p.getElementsByTagNameNS(NS.diggs, 'uom')[0]           || {}).textContent || '';
                const cls = (p.getElementsByTagNameNS(NS.diggs, 'propertyClass')[0] || {}).textContent || '';
                trProps.push({ name: nm.trim() || cls.trim() || '?', uom: uom.trim() });
              }
            }
            const trDvEl  = trRs ? trRs.getElementsByTagNameNS(NS.diggs, 'dataValues')[0] : null;
            const trToks  = trDvEl ? trDvEl.textContent.trim().split(/\s+/).filter(Boolean).map(Number) : [];

            // estimatedIr from procedure element
            const irEl  = procObj.getElementsByTagNameNS(NS.diggs, 'estimatedIr')[0];
            const irVal = irEl ? irEl.textContent.trim() : null;
            const irUom = irEl ? (irEl.getAttribute('uom') || '') : '';

            ppdTimeSeries = { timeToks, timeUnit, trProps, trToks, irVal, irUom };
          }
        }

        const entry = { depthFrom, depthTo, srsName: measSrsName, props, rowValues, procObj, ppdTimeSeries };

        // Route to CPT or BH dict based on which feature set owns sfHref
        const cptIds = new Set(DIGGS_CPT.map(s => s.id));
        const targetMeas = cptIds.has(sfHref) ? DIGGS_CPT_MEAS : DIGGS_BH_MEAS;

        if (!targetMeas[sfHref]) targetMeas[sfHref] = {};
        if (!targetMeas[sfHref][procType]) {
          targetMeas[sfHref][procType] = { procObj: null, rows: [] };
        }
        if (!targetMeas[sfHref][procType].procObj && procObj) {
          targetMeas[sfHref][procType].procObj = procObj;
        }
        targetMeas[sfHref][procType].rows.push(entry);
      }
    }
  }

  // ── WELLS ─────────────────────────────────────────
  DIGGS_WELL = [];
  DIGGS_WELL_DATA = {};
  for (const wellEl of xNodes(doc, '//diggs:samplingFeature/diggs:Well')) {
    // Shared sampling-feature fields (id, name, referencePoint, projectRefs, etc.)
    const sf = parseSamplingFeature(doc, wellEl, 'Well');

    // Well-specific: wellDepth
    const wdEl        = xFirst(doc, 'diggs:wellDepth', wellEl);
    const wellDepth    = wdEl ? parseFloat(wdEl.textContent) : null;
    const wellDepthUom = wdEl ? (wdEl.getAttribute('uom') || '') : '';

    // Well-specific: parent borehole reference
    const sfRefHref = xText(doc, 'diggs:samplingFeatureRef/@xlink:href', wellEl).replace('#','');

    // Well-specific: WellOpenings — collect all LinearExtent intervals
    const openings = [];
    for (const wo of xNodes(doc, 'diggs:opening/diggs:WellOpening', wellEl)) {
      const woId = wo.getAttribute('id') || wo.getAttributeNS(NS.gml, 'id') || '';
      const leEl = xFirst(doc, 'diggs:openInterval/diggs:LinearExtent', wo);
      if (leEl) {
        const posListText = xText(doc, 'gml:posList', leEl);
        const toks = posListText.trim().split(/\s+/).map(Number);
        const srsName = leEl.getAttribute('srsName') || '';
        openings.push({ id: woId, from: toks[0] ?? null, to: toks[1] ?? null, srsName });
      }
    }

    // Compute combined screen interval (min top → max bottom across all openings)
    let screenTop = null, screenBot = null;
    for (const o of openings) {
      if (o.from !== null && (screenTop === null || o.from < screenTop)) screenTop = o.from;
      if (o.to   !== null && (screenBot === null || o.to   > screenBot)) screenBot = o.to;
    }

    DIGGS_WELL.push({ ...sf, wellDepth, wellDepthUom, sfRefHref, openings, screenTop, screenBot });
  }

  // ── WELL MONITOR DATA ─────────────────────────────
  // Build lookup: opening LinearExtent gml:id -> well gml:id
  // Handles the common case where Monitor.monitorLocation refs a WellOpening interval
  const openingIdToWellId = {};
  for (const well of DIGGS_WELL) {
    for (const o of well.openings) {
      if (o.id) openingIdToWellId[o.id] = well.id;
    }
  }
  const wellIds = new Set(DIGGS_WELL.map(w => w.id));

  // Build a quick lookup of all known feature IDs (BH + CPT + Well)
  const bhIds  = new Set(DIGGS_BH.map(b => b.id));
  const cptIds = new Set(DIGGS_CPT.map(s => s.id));

  for (const monEl of xNodes(doc, '//diggs:measurement/diggs:Monitor')) {
    // Strategy 1: samplingFeatureRef directly references any known feature gml:id
    const sfHref = xText(doc, 'diggs:samplingFeatureRef/@xlink:href', monEl).replace('#','');
    // Strategy 2: monitorLocation references a WellOpening LinearExtent gml:id (Well-specific)
    const monLocHrefRaw = xText(doc, 'diggs:monitorLocation/@xlink:href', monEl).replace('#','');

    let sfHrefForKey = null;
    if (wellIds.has(sfHref))   sfHrefForKey = sfHref;       // points to a Well
    else if (bhIds.has(sfHref))  sfHrefForKey = sfHref;     // points to a Borehole
    else if (cptIds.has(sfHref)) sfHrefForKey = sfHref;     // points to a Sounding
    else sfHrefForKey = openingIdToWellId[monLocHrefRaw] || null; // WellOpening fallback
    if (!sfHrefForKey) continue;

    // Resolve procedure object
    const procWrapper = xFirst(doc, 'diggs:procedure', monEl);
    let procObj = procWrapper && procWrapper.children[0] ? procWrapper.children[0] : null;
    if (!procObj && procWrapper) {
      const procHref = procWrapper.getAttributeNS(NS.xlink, 'href');
      if (procHref) {
        const targetId = procHref.replace(/^#/, '');
        procObj = doc.querySelector('[id="' + targetId + '"]') ||
                  doc.querySelector('[*|id="' + targetId + '"]');
      }
    }
    const procType = procObj ? procObj.localName : 'Monitor';

    // monitorLocation (response zone href)
    const monLocHref = xText(doc, 'diggs:monitorLocation/@xlink:href', monEl).replace('#','');

    // Sensor/equipment metadata
    const sensors = [];
    for (const sensorEl of xNodes(doc, 'diggs:procedure//diggs:Sensor', monEl)) {
      const sClass = xText(doc, 'diggs:class', sensorEl) ||
                     xText(doc, 'diggs:sensorType', sensorEl) || '';
      const sId    = sensorEl.getAttribute('id') || sensorEl.getAttributeNS(NS.gml, 'id') || '';
      if (sClass || sId) sensors.push({ id: sId, class: sClass });
    }
    if (!sensors.length && procObj) {
      // Try fetching from procObj directly
      for (const sensorEl of Array.from(procObj.getElementsByTagNameNS(NS.diggs, 'Sensor'))) {
        const sClass = sensorEl.getElementsByTagNameNS(NS.diggs, 'class')[0]?.textContent?.trim() ||
                       sensorEl.getElementsByTagNameNS(NS.diggs, 'sensorType')[0]?.textContent?.trim() || '';
        const sId    = sensorEl.getAttribute('id') || sensorEl.getAttributeNS(NS.gml, 'id') || '';
        if (sClass || sId) sensors.push({ id: sId, class: sClass });
      }
    }

    // Parse TemporalResult
    const trEl = xFirst(doc, 'diggs:outcome/diggs:TemporalResult', monEl);
    if (!trEl) continue;

    // Time positions
    // timePositionList — search from trEl (TemporalResult) first, then monEl fallbacks
    const tplEl = xFirst(doc, 'diggs:timeDomain/diggs:TimePositionList/diggs:timePositionList', trEl)
                || xFirst(doc, 'diggs:timeDomain/diggs:TimePositionList/diggs:timePositionList', monEl)
                || xFirst(doc, 'diggs:outcome/diggs:TemporalResult/diggs:timeDomain/diggs:TimePositionList/diggs:timePositionList', monEl);
    const tplParent = xFirst(doc, 'diggs:timeDomain/diggs:TimePositionList', trEl)
                   || xFirst(doc, 'diggs:timeDomain/diggs:TimePositionList', monEl);
    const timeText = (tplEl ? tplEl.textContent : (tplParent ? tplParent.textContent : '')).trim();
    const times = timeText ? timeText.split(/\s+/).filter(t => /^\d{4}-\d{2}-\d{2}/.test(t)) : [];

    // Property definitions
    const props = [];
    for (const pEl of xNodes(doc, 'diggs:results/diggs:ResultSet/diggs:parameters/diggs:PropertyParameters/diggs:properties/diggs:Property', trEl)) {
      const pName = xText(doc, 'diggs:propertyName', pEl);
      const pUom  = xText(doc, 'diggs:uom', pEl);
      const pIdx  = parseInt(pEl.getAttribute('index') || '0', 10);
      props.push({ name: pName, uom: pUom, index: pIdx });
    }
    // Sort by index so columns align with data values
    props.sort((a, b) => a.index - b.index);

    // Data values (CSV rows, one per time step)
    // DIGGS defaults when attributes absent: cs=comma, ts=any whitespace, decimal=period
    const dvEl   = xFirst(doc, 'diggs:results/diggs:ResultSet/diggs:dataValues', trEl);
    const cs_raw = dvEl ? dvEl.getAttribute('cs') : null;
    const ts_raw = dvEl ? dvEl.getAttribute('ts') : null;
    const cs     = cs_raw !== null ? cs_raw : ',';
    const dvText = dvEl ? dvEl.textContent.trim() : '';
    let rows = [];
    if (dvText) {
      let rowTexts;
      if (ts_raw === null) {
        // DIGGS default: whitespace separates tuples; cs separates values within a tuple.
        rowTexts = dvText.split(/\s+/).filter(t => t.length > 0);
      } else {
        const splitRe = (ts_raw === '\n' || ts_raw === '\\n') ? /\r?\n/ : null;
        rowTexts = splitRe ? dvText.split(splitRe) : dvText.split(ts_raw);
      }
      rows = rowTexts
        .map(r => r.trim().split(cs).map(v => { const n = parseFloat(v); return isNaN(n) ? null : n; }))
        .filter(r => r.length > 0 && r.some(v => v !== null));
    }
    // Times in XML are newest-first; reverse both so index 0 = oldest.
    rows.reverse();
    const timesAsc = times.slice().reverse();

    const monitorObj = { procType, procObj, monLocHref, sensors, times: timesAsc, props, rows };
    if (!DIGGS_WELL_DATA[sfHrefForKey]) DIGGS_WELL_DATA[sfHrefForKey] = [];
    DIGGS_WELL_DATA[sfHrefForKey].push(monitorObj);
  }

  // ── GENERIC SF LOOP ───────────────────────────────
  // Populate DIGGS_SF by discovering EVERY SF type present in the document.
  // We do not rely on SF_TYPE_CONFIG's fixed type list — instead we walk every
  // child element of every <diggs:samplingFeature> wrapper and group by localName.
  // Types already fully parsed above (Borehole, Sounding, Well) are inserted
  // as-is so their extra type-specific fields (wellDepth, openings, etc.) are
  // preserved; all other types are parsed generically.
  DIGGS_SF = new Map();

  // Borehole, Sounding, Well already fully parsed — insert as-is.
  if (DIGGS_BH.length)   DIGGS_SF.set('Borehole', DIGGS_BH);
  if (DIGGS_CPT.length)  DIGGS_SF.set('Sounding', DIGGS_CPT);
  if (DIGGS_WELL.length) DIGGS_SF.set('Well', DIGGS_WELL);

  // Discover all SF types dynamically from the document.
  // Each <diggs:samplingFeature> wrapper holds exactly one typed child element.
  const LEGACY_TYPES = new Set(['Borehole', 'Sounding', 'Well']);
  const sfWrappers = xNodes(doc, '//diggs:samplingFeature');
  for (const wrapper of sfWrappers) {
    // Find the first element child — that is the typed SF element.
    const sfEl = [...wrapper.childNodes].find(n => n.nodeType === 1);
    if (!sfEl) continue;
    const sfType = sfEl.localName;
    if (LEGACY_TYPES.has(sfType)) continue;  // already handled above

    if (!DIGGS_SF.has(sfType)) DIGGS_SF.set(sfType, []);
    DIGGS_SF.get(sfType).push(parseSamplingFeature(doc, sfEl, sfType));
    const parsedSF = DIGGS_SF.get(sfType)[DIGGS_SF.get(sfType).length - 1];

    // GP_MultiTrack: inline GP_Trackline children are not top-level samplingFeature
    // wrappers, so parse them here and register into DIGGS_SF('GP_Trackline').
    if (sfType === 'GP_MultiTrack') {
      if (!DIGGS_SF.has('GP_Trackline')) DIGGS_SF.set('GP_Trackline', []);
      const tlArr = DIGGS_SF.get('GP_Trackline');
      const registeredIds = new Set(tlArr.map(s => s.id));
      // Each diggs:trackline child may hold an inline GP_Trackline element
      for (const tlWrapper of sfEl.childNodes) {
        if (tlWrapper.nodeType !== 1 || tlWrapper.localName !== 'trackline') continue;
        for (const child of tlWrapper.childNodes) {
          if (child.nodeType !== 1 || child.localName !== 'GP_Trackline') continue;
          const inlineId = child.getAttributeNS(NS.gml, 'id') || child.getAttribute('gml:id') || '';
          if (!inlineId || registeredIds.has(inlineId)) continue;
          tlArr.push(parseSamplingFeature(doc, child, 'GP_Trackline'));
          // Mark as a MultiTrack member so it's excluded from the standalone Tracklines tab
          // and so map clicks can route back to the correct GP_MultiTrack row.
          tlArr[tlArr.length - 1].multiTrackMember = true;
          tlArr[tlArr.length - 1].multiTrackParentId = parsedSF.id;
          registeredIds.add(inlineId);
        }
      }
    }
  }

  // Back-fill legacy aliases so existing code keeps working.
  DIGGS_BH   = DIGGS_SF.get('Borehole') ?? [];
  DIGGS_CPT  = DIGGS_SF.get('Sounding') ?? [];
  DIGGS_WELL = DIGGS_SF.get('Well')     ?? [];

  // ── CHILDREFS BACK-FILL ───────────────────────────
  // For each SF that has a parentRef, push its id into the parent's childRefs array.
  // This enables parent→children navigation (e.g. Borehole → installed Wells).
  {
    // Build a flat id→SF lookup across all types.
    const sfById = new Map();
    for (const arr of DIGGS_SF.values()) {
      for (const sf of arr) sfById.set(sf.id, sf);
    }
    for (const arr of DIGGS_SF.values()) {
      for (const sf of arr) {
        if (sf.parentRef && sfById.has(sf.parentRef)) {
          const parent = sfById.get(sf.parentRef);
          if (!parent.childRefs.includes(sf.id)) parent.childRefs.push(sf.id);
        }
        // Mark externally-referenced GP_Tracklines as MultiTrack members
        if (sf.type === 'GP_MultiTrack' && sf.memberRefs) {
          for (const ref of sf.memberRefs) {
            const member = sfById.get(ref);
            if (member) {
              member.multiTrackMember = true;
              member.multiTrackParentId = sf.id;
            }
          }
        }
      }
    }
  }

  // ── UPDATE UI ────────────────────────────────────
  // ── Header SF badges — dynamic, one per type present in file ────
  {
    const badgeContainer = document.getElementById('hdr-sf-badges');
    badgeContainer.innerHTML = '';
    for (const [type, arr] of DIGGS_SF) {
      const visibleCount = type === 'GP_Trackline'
        ? arr.filter(sf => !sf.multiTrackMember).length
        : arr.length;
      if (!visibleCount) continue;
      const label = sfTabLabel(type);
      const badge = document.createElement('div');
      badge.className = 'header-badge';
      badge.innerHTML = `${esc(label)}\u00a0<span>${visibleCount}</span>`;
      badgeContainer.appendChild(badge);
    }
  }

  // ── PROJECT RESOLUTION ───────────────────────────
  parseProjects(doc);
  renderProjectSelector();

  // Build dynamic SF tabs + unified tables scoped to the initial active project.
  // renderProjectSelector() has already set DIGGS_ACTIVE_PROJECT to the first project.
  {
    const _initShowAll = (!DIGGS_ACTIVE_PROJECT || DIGGS_ACTIVE_PROJECT === '__all__');
    const _initProj    = _initShowAll ? null : DIGGS_PROJECTS.find(p => p.id === DIGGS_ACTIVE_PROJECT);
    const _initIds     = (_initProj && _initProj.featureIds) ? _initProj.featureIds : null;
    buildSFTabs(_initIds);
  }

  // Show shell FIRST so the map container has real dimensions before Leaflet measures it
  document.getElementById('load-screen').style.display  = 'none';
  document.getElementById('app-shell').style.display    = 'flex';

  // Asynchronously enrich elevation units and water strike depth UOMs.
  // Both run in background — UI is not blocked; cells update when ready.
  enrichElevUnits();
  enrichLsrUoms(doc);

  // Wait two animation frames: first for display:flex to apply, second for layout reflow
  requestAnimationFrame(() => requestAnimationFrame(() => initMap()));
}

/** Async post-pass: look up elevation units for features that have a vertEPSG. */
async function enrichElevUnits() {
  // Collect all SF objects from the unified registry.
  const allFeatures = [];
  for (const arr of DIGGS_SF.values()) allFeatures.push(...arr);

  // Collect unique vertical CRS codes that need lookup
  const codes = [...new Set(allFeatures
    .filter(f => f.vertEPSG && !f.elevUnit)
    .map(f => f.vertEPSG))];

  for (const code of codes) {
    const info = await getVertCRSInfo(code);
    if (!info) continue;
    // Apply to all features using this vertical CRS
    allFeatures.forEach(f => {
      if (f.vertEPSG === code) {
        f.elevUnit = info.unit;
        f.vertCRSName = info.name;
        // Refresh table elevation cell — elevation is no longer in the unified table
        // (col 3 was elevation in the old per-type tables; unified table has no elev col)
        // Just refresh the open detail panel if needed (handled below).
        // Refresh open detail panel if this feature is currently displayed
        if (window._selectedFeatureId === f.id) {
          showSFDetail(f);
        }
      }
    });
  }
}

// ── Cache for remote LRM dictionaries (URL → parsed XMLDocument) ─────────────
const LRM_DOC_CACHE = {};

/**
 * Extract the 'units' text from a LinearReferencingMethod element.
 * Works regardless of whether child elements use glr: or diggs: namespace
 * by matching on local name only.
 */
function lrmUnits(lrmEl) {
  if (!lrmEl) return '';
  for (const child of lrmEl.children) {
    if (child.localName === 'units') return child.textContent.trim();
  }
  return '';
}

/**
 * Given a LinearSpatialReferenceSystem element, find the lrm child
 * (by local name, regardless of namespace prefix), then:
 *   - If it embeds a LinearReferencingMethod child → extract units directly.
 *   - If it carries xlink:href → fetch the remote dictionary, find the
 *     LinearReferencingMethod by gml:id fragment, extract units.
 * Returns a Promise<string> (the UOM string, or '' on failure).
 */
async function resolveLsrUom(lsrEl) {
  if (!lsrEl) return '';

  // Find the lrm wrapper element by local name (glr:lrm or diggs:lrm)
  let lrmWrapper = null;
  for (const child of lsrEl.children) {
    if (child.localName === 'lrm') { lrmWrapper = child; break; }
  }
  if (!lrmWrapper) return '';

  // Case 1: external reference via xlink:href
  const href = lrmWrapper.getAttributeNS('http://www.w3.org/1999/xlink', 'href')
            || lrmWrapper.getAttribute('xlink:href') || '';
  if (href) {
    const hashIdx = href.indexOf('#');
    const url      = hashIdx >= 0 ? href.slice(0, hashIdx)  : href;
    const fragment = hashIdx >= 0 ? href.slice(hashIdx + 1) : '';
    if (!url) return '';
    try {
      let dictDoc = LRM_DOC_CACHE[url];
      if (!dictDoc) {
        const resp = await fetch(url);
        if (!resp.ok) return '';
        const text = await resp.text();
        dictDoc = new DOMParser().parseFromString(text, 'application/xml');
        LRM_DOC_CACHE[url] = dictDoc;
      }
      // Find the LinearReferencingMethod with matching gml:id
      const lrmEl = fragment
        ? dictDoc.querySelector(`[*|id="${fragment}"]`)
        : dictDoc.getElementsByTagNameNS('*', 'LinearReferencingMethod')[0];
      return lrmUnits(lrmEl);
    } catch { return ''; }
  }

  // Case 2: embedded LinearReferencingMethod child (glr: or diggs: namespace)
  for (const child of lrmWrapper.children) {
    if (child.localName === 'LinearReferencingMethod') return lrmUnits(child);
  }
  return '';
}

// Global map: srsName string → resolved UOM string.
// Populated by enrichLsrUoms(); used by all depth display code.
const LSR_UOM = {};

/**
 * Resolve a srsName string to a UOM string.
 * Handles:
 *   '#fragment'          → local document lookup by gml:id
 *   'https://...#frag'   → fetch remote doc, find element by gml:id fragment
 *   'https://...'        → fetch remote doc, use first LinearSpatialReferenceSystem
 * Results are cached in LRM_DOC_CACHE (remote) and LSR_UOM (all).
 */
async function resolveSrsNameUom(doc, srsName) {
  if (!srsName) return '';
  if (LSR_UOM[srsName] !== undefined) return LSR_UOM[srsName];

  // EPSG CRS identifiers (any form: URN, HTTP URI, plain "EPSG:nnnn") are coordinate
  // reference systems, not LSR dictionary URLs — skip them immediately.
  if (parseEPSG(srsName).horiz !== null) { LSR_UOM[srsName] = ''; return ''; }

  let uom = '';
  if (srsName.startsWith('#')) {
    // Local fragment → find LSR element in the current document by gml:id
    const lsrId = srsName.slice(1);
    const lsrEl = doc.querySelector(`[*|id="${CSS.escape(lsrId)}"]`)
               || doc.querySelector(`[id="${lsrId}"]`);
    uom = await resolveLsrUom(lsrEl);
  } else {
    // Absolute URI — may have a #fragment identifying the LSR element
    const hashIdx = srsName.indexOf('#');
    const url      = hashIdx >= 0 ? srsName.slice(0, hashIdx) : srsName;
    const fragment = hashIdx >= 0 ? srsName.slice(hashIdx + 1) : '';
    try {
      let remoteDoc = LRM_DOC_CACHE[url];
      if (!remoteDoc) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('fetch failed');
        const text = await resp.text();
        remoteDoc = new DOMParser().parseFromString(text, 'application/xml');
        LRM_DOC_CACHE[url] = remoteDoc;
      }
      const lsrEl = fragment
        ? (remoteDoc.querySelector(`[*|id="${CSS.escape(fragment)}"]`)
           || remoteDoc.querySelector(`[id="${fragment}"]`))
        : remoteDoc.getElementsByTagNameNS('*', 'LinearSpatialReferenceSystem')[0];
      uom = await resolveLsrUom(lsrEl);
    } catch { uom = ''; }
  }

  LSR_UOM[srsName] = uom;
  return uom;
}

/**
 * Async post-pass: resolve UOM for every unique srsName that appears on any
 * depth value (lith, samples, measurements, water strike) across all boreholes.
 * Populates LSR_UOM, patches the water-strike table column, and refreshes the
 * open detail panel.  Replaces enrichWaterDepthUoms().
 */
async function enrichLsrUoms(doc) {
  // Collect all unique srsNames across every parsed data store
  const allSrsNames = new Set();

  for (const bh of DIGGS_BH) {
    if (bh.waterLsrSrsName) allSrsNames.add(bh.waterLsrSrsName);
  }
  for (const well of DIGGS_WELL) {
    for (const o of well.openings) if (o.srsName) allSrsNames.add(o.srsName);
  }
  for (const rows of Object.values(DIGGS_LITH)) {
    for (const r of rows) if (r.srsName) allSrsNames.add(r.srsName);
  }
  for (const entries of Object.values(DIGGS_SAMPLES)) {
    for (const e of entries) if (e.srsName) allSrsNames.add(e.srsName);
  }
  for (const byProc of Object.values(DIGGS_BH_MEAS)) {
    for (const { rows } of Object.values(byProc)) {
      for (const r of rows) if (r.srsName) allSrsNames.add(r.srsName);
    }
  }

  if (!allSrsNames.size) return;

  // Resolve each unique srsName once (resolveSrsNameUom caches results in LSR_UOM)
  await Promise.all([...allSrsNames].map(sn => resolveSrsNameUom(doc, sn)));

  // (Elevation/water-depth/screen-interval cell patches removed — the unified
  //  SF table no longer has those columns. UOM data is still resolved and stored
  //  on the SF objects so the detail panel re-render below picks them up.)

  // Refresh open detail panel so depth columns pick up the newly resolved UOMs
  if (window._selectedFeatureId) {
    const allSFs = [...DIGGS_SF.values()].flat();
    const sf = allSFs.find(s => s.id === window._selectedFeatureId);
    if (sf) showSFDetail(sf);
  }
}

function parseSamplingFeature(doc, el, type) {
  const id   = el.getAttribute('id') || el.getAttributeNS(NS.gml, 'id') || '';
  const name = xText(doc, 'gml:name', el);
  // referencePoint may be inline (contains diggs:PointLocation) or an xlink href
  // pointing to a PointLocation defined elsewhere in the document.
  // Try inline first; if not found, resolve the xlink href by gml:id lookup.
  let pl = xFirst(doc, 'diggs:referencePoint/diggs:PointLocation', el);
  if (!pl) {
    const rpEl = xFirst(doc, 'diggs:referencePoint', el);
    if (rpEl) {
      const href = rpEl.getAttributeNS(NS.xlink, 'href') || rpEl.getAttribute('xlink:href') || '';
      const frag = href.replace(/^#/, '').trim();
      if (frag) {
        // getElementById is most efficient; fall back to querySelector for gml:id
        const target = doc.getElementById(frag)
          || doc.querySelector(`[*|id="${frag}"]`)
          || (() => {
               const all = doc.getElementsByTagName('*');
               for (const n of all) {
                 if ((n.getAttribute('id') || n.getAttributeNS(NS.gml, 'id')) === frag) return n;
               }
               return null;
             })();
        // target may be the PointLocation itself or a wrapper containing it
        if (target) {
          pl = (target.localName === 'PointLocation') ? target
             : target.getElementsByTagNameNS(NS.diggs, 'PointLocation')[0] || null;
        }
      }
    }
  }
  let lat = null, lon = null, elev = null, elevUom = '';
  let crsInfo = { horizEPSG: null, vertEPSG: null, transformed: false, warning: null };
  // rawPos: native coords as parsed (for display in detail tables - NOT transformed)
  let rawPos = null, rawSrsName = '', rawSrsDimension = 2;
  if (pl) {
    const srsName   = pl.getAttribute('srsName') || '';
    const posText   = xText(doc, 'gml:pos', pl);
    const uomLabels = (pl.getAttribute('uomLabels') || '').trim().split(/\s+/);
    const tokens    = posText.trim().split(/\s+/).map(Number);
    if (tokens.length >= 2) {
      rawPos = tokens;
      rawSrsName = srsName;
      rawSrsDimension = parseInt(pl.getAttribute('srsDimension') || String(tokens.length)) || tokens.length;
      const geo = toWGS84(tokens, srsName);
      lat     = geo.lat;
      lon     = geo.lon;
      elev    = geo.elev;
      elevUom = uomLabels[2] || uomLabels[0] || '';
      crsInfo = geo;
    }
  }
  const _depthPath = (SF_TYPE_CONFIG[type] && SF_TYPE_CONFIG[type].depthPath)
    ? SF_TYPE_CONFIG[type].depthPath : 'diggs:totalMeasuredDepth';
  const depthEl  = xFirst(doc, _depthPath, el);
  const depth    = depthEl ? parseFloat(depthEl.textContent) : null;
  const depthUom = depthEl ? (depthEl.getAttribute('uom') || '') : '';
  const bhType   = type === 'Borehole' ? xText(doc, 'diggs:boreholeType', el) : '';

  // ── Water strike (Borehole only) ─────────────────────────────────────────
  // Depth value extracted sync; UOM resolved async by enrichWaterDepthUoms()
  // because lrm may reference an external dictionary requiring a fetch.
  let waterDepth = null, waterDepthUom = '', waterLsrSrsName = '';
  if (type === 'Borehole') {
    const wsPos = xFirst(doc, 'diggs:waterStrike/diggs:WaterStrike/diggs:waterStrikeReadings/diggs:WaterStrikeReading/diggs:waterLocation/diggs:PointLocation/gml:pos', el);
    if (wsPos) {
      const wsPosVal = parseFloat(wsPos.textContent.trim());
      if (!isNaN(wsPosVal)) {
        waterDepth = wsPosVal;
        const wsPlEl = wsPos.parentNode;
        waterLsrSrsName = wsPlEl ? (wsPlEl.getAttribute('srsName') || '') : '';
      }
    }
  }

  // ── Project references ────────────────────────────────────────────────────
  const projRefEls = el.getElementsByTagNameNS(NS.diggs, 'projectRef');
  const projectRefs = [];
  for (const prEl of projRefEls) {
    const href = prEl.getAttributeNS(NS.xlink, 'href') || prEl.getAttribute('xlink:href') || '';
    const frag = href.replace(/^#/, '').trim();
    if (frag) projectRefs.push(frag);
  }

  // ── Purpose ──────────────────────────────────────────────────────────────
  // Purpose: search for any direct child element whose localName ends with
  // 'Purpose' (case-insensitive). This covers boreholePurpose, soundingPurpose,
  // wellPurpose, trialPitPurpose, transectPurpose, trenchPurpose, etc. without
  // needing to hard-code each type's element name.
  let purpose = '';
  for (const child of el.childNodes) {
    if (child.nodeType === 1 && /purpose$/i.test(child.localName)) {
      purpose = child.textContent.trim();
      break;
    }
  }

  // ── Linear extent (for line/trackline geometry) ───────────────────────────
  // Capture the centerLine or LinearExtent so the map renderer can draw polylines.
  let linearExtentLatLngs = null;
  let linearExtentLen     = null;
  let leAxisSwapped       = false;   // true if any centerLine point triggered axis swap
  {
    // Try centerLine first (GP_Trackline), then featureExtent/LinearExtent
    const leEl = xFirst(doc, 'diggs:centerLine/diggs:LinearExtent', el)
              || xFirst(doc, 'diggs:linearExtent/diggs:LinearExtent', el)
              || xFirst(doc, 'diggs:featureExtent/diggs:LinearExtent', el);
    if (leEl) {
      const posListText   = xText(doc, 'gml:posList', leEl);
      const srsDimension  = leEl.getAttribute('srsDimension') || '2';
      const srsNameLE     = leEl.getAttribute('srsName') || '';
      if (posListText.trim()) {
        const rawLls = posListToLatLngs(posListText, srsDimension);
        if (rawLls.length >= 2) {
          // Transform each point to WGS84 so map renderer can use directly.
          // Capture any axis-swap correction so it can surface on the map warning.
          const wgsLls = [];
          for (const pair of rawLls) {
            const geo = toWGS84(pair, srsNameLE);
            if (geo.lat !== null && geo.lon !== null && !isNaN(geo.lat) && !isNaN(geo.lon)) {
              wgsLls.push([geo.lat, geo.lon]);
              if (geo.axisSwapped) leAxisSwapped = true;
            }
          }
          if (wgsLls.length >= 2) linearExtentLatLngs = wgsLls;
        }
      }
      // Optionally compute length from posList tokens
      const lengthEl = xFirst(doc, 'diggs:length', leEl) || xFirst(doc, 'diggs:totalLength', el);
      if (lengthEl) {
        const lv = parseFloat(lengthEl.textContent);
        if (!isNaN(lv)) linearExtentLen = lv;
      }
    }
  }

  // ── Polygon extent (for planar SF types — GP_ArealSurvey etc.) ──────────────
  // diggs:featureExtent holds either diggs:PlanarSurface or diggs:MultiPlanarSurface,
  // both of which inherit from gml:AbstractSurfaceType and carry srsName/srsDimension.
  //
  // Per GML, each surface patch may have:
  //   gml:exterior / gml:LinearRing / gml:posList   — one exterior boundary ring
  //   gml:interior / gml:LinearRing / gml:posList   — zero or more hole rings
  //
  // MultiPlanarSurface may contain multiple patches (surfaceMember elements), each
  // with its own exterior and optional interior rings.
  //
  // Leaflet L.polygon ring layout: [[exteriorRing], [holeRing1], [holeRing2], ...]
  // where each ring is [[lat,lon], ...].  A single exterior-only ring may be passed flat.
  //
  // Strategy: for each surface patch, collect its exterior ring first, then any interior
  // rings — preserving patch-interior ordering so Leaflet renders holes correctly.
  let polygonLatLngs = null;
  {
    const feExtEl = xFirst(doc, 'diggs:featureExtent', el);
    if (feExtEl) {
      // Helper: extract a WGS84 [[lat,lon],...] ring from a gml:exterior or gml:interior
      // wrapper element, given the srsName already resolved from the DIGGS surface object.
      const extractRing = (wrapperEl, srsNameSurface, dimSurface) => {
        const lrEl = findByLocalName(wrapperEl, 'LinearRing');
        if (!lrEl) return null;
        let plEl = null;
        for (const child of lrEl.childNodes) {
          if (child.nodeType === 1 && child.localName === 'posList') { plEl = child; break; }
        }
        if (!plEl) return null;
        // srsDimension may be overridden on posList itself; fall back to surface-level value
        const dim = parseInt(plEl.getAttribute('srsDimension') || dimSurface || '2');
        const rawLls = posListToLatLngs(plEl.textContent, dim);
        if (rawLls.length < 3) return null;
        const wgsRing = [];
        for (const pair of rawLls) {
          const geo = toWGS84(pair, srsNameSurface);
          if (geo.lat !== null && geo.lon !== null && !isNaN(geo.lat) && !isNaN(geo.lon)
              && geo.lat >= -90 && geo.lat <= 90 && geo.lon >= -180 && geo.lon <= 180) {
            wgsRing.push([geo.lat, geo.lon]);
          }
        }
        // If fewer than 3 valid WGS84 points, the CRS was unresolvable (local, fragment ref, etc.)
        // Return null so the caller falls back to point rendering via referencePoint.
        return wgsRing.length >= 3 ? wgsRing : null;
      };

      // DIGGS convention: srsName and srsDimension are attributes of the surface object
      // (diggs:PlanarSurface or diggs:MultiPlanarSurface), not on the GML geometry elements
      // nested inside them.  Walk the direct children of featureExtent to find surface objects,
      // then read CRS from the surface element before descending into its rings.
      //
      // Structure (PlanarSurface):
      //   diggs:featureExtent
      //     diggs:PlanarSurface  srsName="EPSG:32617" srsDimension="2"
      //       gml:exterior
      //         gml:LinearRing
      //           gml:posList
      //       gml:interior          ← optional holes
      //         gml:LinearRing
      //           gml:posList
      //
      // Structure (MultiPlanarSurface):
      //   diggs:featureExtent
      //     diggs:MultiPlanarSurface  srsName="..." srsDimension="..."
      //       diggs:surfaceMember (or similar)
      //         diggs:PlanarSurface   ← may also carry srsName; inherit parent if absent
      //           gml:exterior / gml:LinearRing / gml:posList
      const allRings = [];

      // Collect all diggs:PlanarSurface and diggs:MultiPlanarSurface elements under featureExtent.
      // srsName/srsDimension are attributes of the DIGGS surface object per DIGGS convention.
      const surfaceEls = findAllByLocalName(feExtEl, 'PlanarSurface')
        .concat(findAllByLocalName(feExtEl, 'MultiPlanarSurface'));

      for (const surfEl of surfaceEls) {
        // getAttribute('srsName') returns null on some browsers for elements in a
        // namespace even though srsName is an unqualified attribute.
        // Try getAttributeNS(null,...) and getAttributeNS('',…) as well.
        // Final fallback: rawSrsName from the referencePoint — same physical CRS.
        const srsNameSurf = surfEl.getAttribute('srsName')
          || surfEl.getAttributeNS(null, 'srsName')
          || surfEl.getAttributeNS('', 'srsName')
          || rawSrsName || '';
        const dimSurf = surfEl.getAttribute('srsDimension')
          || surfEl.getAttributeNS(null, 'srsDimension')
          || surfEl.getAttributeNS('', 'srsDimension')
          || rawSrsDimension || '2';

        const exteriorEls = findAllByLocalName(surfEl, 'exterior');
        for (const extEl of exteriorEls) {
          const patchEl = extEl.parentNode;
          // A nested PlanarSurface inside MultiPlanarSurface may carry its own srsName;
          // inherit the parent surface's if not present.
          const srsNamePatch = patchEl.getAttribute('srsName')
            || patchEl.getAttributeNS(null, 'srsName')
            || srsNameSurf;
          const dimPatch = patchEl.getAttribute('srsDimension')
            || patchEl.getAttributeNS(null, 'srsDimension')
            || dimSurf;

          const extRing = extractRing(extEl, srsNamePatch, dimPatch);
          if (!extRing) continue;
          allRings.push(extRing);

          // Interior (hole) rings — siblings of exterior under the same patch element
          for (const child of patchEl.childNodes) {
            if (child.nodeType === 1 && child.localName === 'interior') {
              const holeRing = extractRing(child, srsNamePatch, dimPatch);
              if (holeRing) allRings.push(holeRing);
            }
          }
        }
      }

      if (allRings.length === 1) {
        polygonLatLngs = allRings[0];   // single exterior ring — pass flat to L.polygon
      } else if (allRings.length > 1) {
        polygonLatLngs = allRings;      // multi-ring (holes or multi-patch) — [[ext],[hole],...]
      }

    }
  }

  // ── Parent SF reference ────────────────────────────────────────────────────
